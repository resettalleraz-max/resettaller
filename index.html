<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Taller - Catálogo Digital</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        .card-img-top { height: 200px; object-fit: cover; }
        .navbar { background-color: #0d6efd; }
    </style>
</head>
<body class="bg-light">

    <nav class="navbar navbar-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="#">Reset Taller</a>
        </div>
    </nav>

    <div class="container">
        <div class="row" id="contenedor-productos">
            </div>
    </div>

    <script src="datos.js"></script>
    <script>
        const contenedor = document.getElementById('contenedor-productos');
        
        productos.forEach(p => {
            contenedor.innerHTML += `
                <div class="col-md-4 mb-4">
                    <div class="card h-100 shadow-sm">
                        <div class="card-body">
                            <h5 class="card-title">${p.nombre}</h5>
                            <p class="card-text text-muted">${p.descripcion}</p>
                            <h6 class="text-primary">Precio: ₡${p.precio}</h6>
                            <span class="badge ${p.stock ? 'bg-success' : 'bg-danger'}">
                                ${p.stock ? 'Disponible' : 'Agotado'}
                            </span>
                        </div>
                    </div>
                </div>
            `;
        });
    </script>
</body>
</html>
