<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Taller - San Carlos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style> 
        :root { --tecnico: #38bdf8; --verde-precio: #22c55e; }
        .rotate-icon { transform: rotate(135deg); color: #ef4444 !important; }
        .icon-plus { transition: all 0.3s ease; }
        
        /* Portada con Imagen Profesional */
        .bg-portada { 
            background-image: linear-gradient(rgba(15, 23, 42, 0.8), rgba(15, 23, 42, 0.9)), 
            url('https://images.unsplash.com/photo-1550009158-9ebf69173e03?q=80&w=1000&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
        }

        /* Estilo de Etiquetas (Grid) */
        .tag-repuesto { 
            background: rgba(30, 41, 59, 0.6);
            border: 1px solid rgba(51, 65, 85, 0.5);
            transition: all 0.2s;
        }
        .tag-repuesto:active { transform: scale(0.95); border-color: var(--verde-precio); }

        /* Modo Claro */
        body.modo-claro { background-color: #f8fafc; color: #1e293b; }
        .modo-claro header { background-image: none; background-color: #ffffff; border-bottom: 2px solid #e2e8f0; }
        .modo-claro .tag-repuesto { background: #ffffff; border-color: #e2e8f0; color: #1e293b; }
        .modo-claro .btn-categoria { background: #ffffff; border-color: #cbd5e1; color: #1e293b; }
    </style>
</head>
<body id="cuerpo" class="bg-slate-950 text-white min-h-screen pb-10 transition-colors duration-500 font-sans">

    <header class="relative p-10 text-center border-b border-slate-800 bg-portada mb-6 rounded-b-[3.5rem] shadow-2xl">
        <button onclick="cambiarModo()" class="absolute top-6 right-6 p-2 rounded-full border border-slate-700 bg-slate-800/50 text-[var(--tecnico)]">
            <i id="icono-modo" class="fa fa-moon text-lg"></i>
        </button>

        <div class="relative z-10">
            <img src="WhatsApp Image 2026-03-30 at 8.47.32 PM.jpeg" alt="Reset Taller" 
                class="w-28 h-28 mx-auto rounded-full border-4 border-[var(--tecnico)] mb-4 object-cover shadow-2xl">
            
            <h1 class="text-3xl font-black italic text-[var(--tecnico)] uppercase tracking-tighter">RESET TALLER</h1>
            <p class="text-slate-300 text-[11px] font-bold tracking-widest uppercase">San Carlos, Aguas Zarcas</p>
            
            <p class="text-slate-400 text-xs italic mt-3 px-6 leading-relaxed">
                "Todo lo puedo en Cristo que me fortalece." <br>
                <span class="text-[10px] not-italic font-bold text-slate-500">- Filipenses 4:13 -</span>
            </p>
            
            <div class="w-20 h-1 bg-[var(--tecnico)] mx-auto mt-4 rounded-full opacity-50"></div>
        </div>
    </header>

    <div class="px-4 mb-6">
        <div class="relative">
            <i class="fa fa-search absolute left-4 top-3.5 text-slate-500"></i>
            <input type="text" id="buscador" placeholder="Busca tu modelo..." 
                class="w-full bg-slate-900 border border-slate-800 rounded-2xl py-3.5 pl-12 pr-4 text-sm outline-none focus:border-[var(--tecnico)] shadow-inner">
        </div>
    </div>

    <main id="lista-repuestos" class="px-4 space-y-4"></main>

    <script src="datos.js"></script>
    <script>
        const contenedor = document.getElementById('lista-repuestos');
        const buscador = document.getElementById('buscador');
        const cuerpo = document.body;

        function cambiarModo() {
            cuerpo.classList.toggle('modo-claro');
            const esClaro = cuerpo.classList.contains('modo-claro');
            document.getElementById('icono-modo').className = esClaro ? 'fa fa-sun text-lg' : 'fa fa-moon text-lg';
            renderizar(buscador.value);
        }

        function getIcono(nombre) {
            const n = nombre.toUpperCase();
            if (n.includes("IPHONE")) return '<i class="fab fa-apple"></i>';
            if (n.includes("SAMSUNG")) return '<i class="fa fa-mobile-screen-button"></i>';
            if (n.includes("HUAWEI")) return '<i class="fa fa-microchip"></i>';
            if (n.includes("XIAOMI")) return '<i class="fa fa-bolt-lightning"></i>';
            if (n.includes("MOTOROLA")) return '<i class="fa fa-m"></i>';
            if (n.includes("BATER")) return '<i class="fa fa-battery-three-quarters"></i>';
            if (n.includes("FLEX")) return '<i class="fa fa-usb"></i>';
            return '<i class="fa fa-box-open"></i>';
        }

        function renderizar(filtro = '') {
            contenedor.innerHTML = '';
            const todasLasListas = [...PANTALLAS];
            if (typeof HERRAMIENTAS !== 'undefined') todasLasListas.push(...HERRAMIENTAS);

            let estructura = [];
            let mainFolder = null;
            let subFolder = null;

            todasLasListas.forEach((item) => {
                const [tipo, valor] = item;
                if (tipo === "TITULO") {
                    mainFolder = { nombre: valor, items: [], contador: 0 };
                    estructura.push(mainFolder);
                } else if (tipo !== "SUBTITULO") {
                    if (tipo.toLowerCase().includes(filtro.toLowerCase())) {
                        if (mainFolder) { mainFolder.items.push(item); mainFolder.contador++; }
                    }
                }
            });

            const esClaro = cuerpo.classList.contains('modo-claro');

            estructura.forEach((main, mIdx) => {
                if (main.contador === 0 && filtro !== '') return;
                const mId = `m-${mIdx}`;
                const mDiv = document.createElement('div');
                mDiv.innerHTML = `
                    <button onclick="toggle('${mId}')" class="btn-categoria w-full ${esClaro ? 'bg-white text-slate-800' : 'bg-slate-900 text-white'} p-4.5 rounded-2xl flex justify-between items-center shadow-lg border border-slate-800 transition-all">
                        <div class="flex items-center gap-3.5">
                            <span class="text-[var(--tecnico)] text-2xl">${getIcono(main.nombre)}</span>
                            <span class="font-black uppercase text-base tracking-tighter">${main.nombre}</span>
                        </div>
                        <div class="flex items-center gap-3">
                            <span class="text-xs opacity-50 font-bold">${main.contador}</span>
                            <i id="icon-${mId}" class="fa fa-plus text-slate-600 text-sm icon-plus"></i>
                        </div>
                    </button>
                    <div id="${mId}" class="hidden mt-3 grid grid-cols-2 gap-2.5 pb-6"></div>
                `;
                contenedor.appendChild(mDiv);
                const mContent = mDiv.querySelector(`#${mId}`);

                main.items.forEach(repuesto => {
                    const [nombre, precio] = repuesto;
                    const card = document.createElement('a');
                    card.href = `https://wa.me/50661073855?text=Consulta: ${nombre}`;
                    card.className = `tag-repuesto p-4 rounded-2xl flex flex-col items-center text-center justify-between shadow-sm`;
                    card.innerHTML = `
                        <span class="text-[10px] font-bold uppercase mb-2 opacity-90 leading-tight">${nombre}</span>
                        <span class="text-[var(--verde-precio)] font-black text-xs tracking-tight">${precio}</span>
                    `;
                    mContent.appendChild(card);
                });
            });
        }

        function toggle(id) {
            document.getElementById(id).classList.toggle('hidden');
            document.getElementById(`icon-${id}`).classList.toggle('rotate-icon');
        }
        buscador.addEventListener('input', (e) => renderizar(e.target.value));
        renderizar();
    </script>
</body>
</html>
