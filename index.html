body { font-family: 'Poppins', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 10px; transition: 0.3s; }

#buscador { width: 100%; padding: 15px; border-radius: 30px; border: 2px solid var(--neon); box-sizing: border-box; font-weight: 600; background: #fff; color: #000; margin-bottom: 20px; outline: none; }
.acordeon { background: var(--card); color: var(--neon); cursor: pointer; padding: 15px; width: 100%; border: 1px solid rgba(56,189,248,0.2); text-align: left; font-weight: 700; border-radius: 12px; margin-top: 10px; display: flex; justify-content: space-between; align-items: center; }
.panel { padding: 0 5px; max-height: 0; overflow: hidden; transition: max-height 0.3s ease-out; background: var(--panel-bg); }
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; padding: 15px 5px; }
.caja { background: var(--card); padding: 12px; border-radius: 15px; text-align: center; display: flex; flex-direction: column; justify-content: space-between; border: 1px solid rgba(255,255,255,0.05); }
.caja h3 { font-size: 0.7em; margin: 0; color: var(--text); text-transform: uppercase; }
.precio { color: var(--green); font-size: 1.15em; font-weight: 800; margin: 8px 0; }
.btn-wa { background: var(--green); color: #fff; text-decoration: none; padding: 10px; border-radius: 8px; font-size: 0.75em; font-weight: 700; }
.badge { background: #ffd700; color: #000; font-size: 0.6em; padding: 2px 5px; border-radius: 4px; font-weight: 900; margin-left: 3px; }
.acordeon:after { content: '\002B'; } .active:after { content: "\2212"; }
