<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Taller - Inventario</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style> 
        :root { --tecnico: #a5f3fc; --verde-repuesto: #22c55e; }
        .rotate-icon { transform: rotate(135deg); color: #ef4444 !important; }
        .icon-plus { transition: transform 0.3s ease; }
        
        body.modo-claro { background-color: #f8fafc; color: #1e293b; }
        .modo-claro .tag-repuesto { background-color: #ffffff; border-color: #e2e8f0; color: #1e293b; }
        .modo-claro .btn-categoria { background-color: #ffffff; border-color: #e2e8f0; color: #1e293b; }
        .modo-claro .banner-info { background-color: #f0fdf4; border-color: #bbf7d0; color: #166534; }
        
        .tag-repuesto { 
            background: rgba(30, 41, 59, 0.6);
            border: 1px solid rgba(51, 65, 85, 0.5);
            transition: all 0.2s;
        }
        .tag-repuesto:active { transform: scale(0.95); border-color: var(--verde-repuesto); }
        
        /* Estilo del Banner */
        .banner-info {
            background: rgba(22, 101, 52, 0.2);
            border: 1px solid rgba(34, 197, 94, 0.3);
        }
    </style>
</head>
<body id="cuerpo" class="bg-[#0b1120] text-white min-h-screen pb-10 transition-colors duration-500 font-sans">

    <header class="relative p-10 text-center border-b border-slate-800 bg-[#0f172a]/80 rounded-b-[3rem]">
        <button onclick="cambiarModo()" class="absolute top-6 right-6 p-2 rounded-full border border-slate-700 bg-slate-800/50">
            <i id="icono-modo" class="fa fa-moon text-lg text-slate-400"></i>
        </button>
        <div class="relative z-10">
            <img src="WhatsApp Image 2026-03-30 at 8.47.32 PM.jpeg" alt="Reset Taller" 
                class="w-32 h-32 mx-auto rounded-full border-4 border-[var(--tecnico)] mb-4 object-cover shadow-2xl">
            <h1 class="text-4xl font-black italic text-[var(--tecnico)] uppercase tracking-tighter">RESET TALLER</h1>
            <p class="text-slate-400 text-[10px] font-bold tracking-widest uppercase mt-1">San Carlos, Aguas Zarcas</p>
        </div>
    </header>

    <div class="px-4 mt-6">
        <div class="banner-info p-4 rounded-2xl flex items-center gap-4 shadow-lg">
            <div class="bg-green-500/20 p-3 rounded-xl border border-green-500/40 text-green-500">
                <i class="fa fa-screwdriver-wrench text-xl"></i>
            </div>
            <div>
                <h4 class="font-black text-xs uppercase tracking-tight">Precios Finales</h4>
                <p class="text-[10px] opacity-80 leading-tight">El costo indicado ya incluye el **repuesto** y la **mano de obra**. ¡Sin cargos extra!</p>
                <span class="text-[9px] font-bold text-green-500 uppercase mt-1 inline-block">✅ Trabajo 100% Garantizado</span>
            </div>
        </div>
    </div>

    <div class="px-4 mt-6 mb-6">
        <div class="relative">
            <i class="fa fa-search absolute left-4 top-3.5 text-slate-500"></i>
            <input type="text" id="buscador" placeholder="¿Qué modelo buscas?" 
                class="w-full bg-[#0f172a] border border-slate-800 rounded-xl py-3.5 px-11 text-sm outline-none focus:border-[var(--tecnico)] transition-all">
        </div>
    </div>

    <main id="lista-repuestos" class="px-4 space-y-4"></main>

    <script src="datos.js"></script>
    <script>
        const contenedor = document.getElementById('lista-repuestos');
        const buscador = document.getElementById('buscador');
        const cuerpo = document.body;

        function cambiarModo() {
            cuerpo.classList.toggle('modo-claro');
            const esClaro = cuerpo.classList.contains('modo-claro');
            document.getElementById('icono-modo').className = esClaro ? 'fa fa-sun text-lg' : 'fa fa-moon text-lg';
            renderizar(buscador.value);
        }

        function getIcono(nombre) {
            const n = nombre.toUpperCase();
            if (n.includes("IPHONE")) return '<i class="fab fa-apple"></i>';
            if (n.includes("SAMSUNG")) return '<i class="fa fa-mobile-screen-button"></i>';
            if (n.includes("BATER")) return '<i class="fa fa-battery-three-quarters"></i>';
            if (n.includes("FLEX")) return '<i class="fa fa-usb"></i>';
            return '<i class="fa fa-box-open"></i>';
        }

        function renderizar(filtro = '') {
            contenedor.innerHTML = '';
            let totalGeneral = 0;
            let estructura = [];
            const todasLasListas = [...PANTALLAS];

            let mainFolder = null;
            let subFolder = null;

            todasLasListas.forEach((item) => {
                const [tipo, valor] = item;
                if (tipo === "TITULO") {
                    mainFolder = { nombre: valor, subs: [], items: [], contador: 0 };
                    estructura.push(mainFolder);
                    subFolder = null;
                } else if (tipo === "SUBTITULO") {
                    subFolder = { nombre: valor, items: [], contador: 0 };
                    if (mainFolder) mainFolder.subs.push(subFolder);
                } else {
                    if (tipo.toLowerCase().includes(filtro.toLowerCase())) {
                        totalGeneral++;
                        if (subFolder) { subFolder.items.push(item); subFolder.contador++; mainFolder.contador++; }
                        else if (mainFolder) { mainFolder.items.push(item); mainFolder.contador++; }
                    }
                }
            });

            const esClaro = cuerpo.classList.contains('modo-claro');

            estructura.forEach((main, mIdx) => {
                if (main.contador === 0 && filtro !== '') return;
                const mId = `m-${mIdx}`;
                const mDiv = document.createElement('div');
                mDiv.innerHTML = `
                    <button onclick="toggle('${mId}')" class="btn-categoria w-full ${esClaro ? 'bg-white text-slate-800 border-slate-200' : 'bg-[#0f172a] text-slate-100 border-slate-800'} p-4 rounded-2xl flex justify-between items-center mb-2 shadow-lg border">
                        <div class="flex items-center gap-3.5">
                            <span class="text-[var(--tecnico)] text-2xl">${getIcono(main.nombre)}</span>
                            <span class="font-black uppercase text-lg italic">${main.nombre}</span>
                        </div>
                        <i id="icon-${mId}" class="fa fa-plus text-slate-600 text-base icon-plus"></i>
                    </button>
                    <div id="${mId}" class="hidden space-y-4 pb-6"></div>
                `;
                contenedor.appendChild(mDiv);
                const mContent = mDiv.querySelector(`#${mId}`);

                main.subs.forEach(sub => {
                    if (sub.contador === 0) return;
                    const subDiv = document.createElement('div');
                    subDiv.innerHTML = `
                        <h3 class="text-[10px] font-black text-slate-500 uppercase tracking-[0.2em] mb-2 px-2">${sub.nombre}</h3>
                        <div class="grid grid-cols-2 gap-2.5"></div>
                    `;
                    mContent.appendChild(subDiv);
                    const grid = subDiv.querySelector('div');
                    sub.items.forEach(item => grid.appendChild(crearCard(item, esClaro)));
                });

                if (main.items.length > 0) {
                    const extraGrid = document.createElement('div');
                    extraGrid.className = "grid grid-cols-2 gap-2.5";
                    mContent.appendChild(extraGrid);
                    main.items.forEach(item => extraGrid.appendChild(crearCard(item, esClaro)));
                }
            });
        }

        function crearCard(item, esClaro) {
            const [nombre, precio] = item;
            const card = document.createElement('a');
            card.href = `https://wa.me/50661073855?text=Consulta: ${nombre}`;
            card.className = `tag-repuesto p-4 rounded-xl flex flex-col items-center text-center justify-between shadow-sm transition active:scale-95`;
            card.innerHTML = `
                <span class="text-[10px] font-bold uppercase mb-2 opacity-90 leading-tight">${nombre}</span>
                <div class="flex items-center gap-3">
                    <span class="text-[var(--verde-repuesto)] font-black text-xs tracking-tight">${precio}</span>
                    <i class="fab fa-whatsapp text-green-500 text-sm"></i>
                </div>
            `;
            return card;
        }

        function toggle(id) {
            document.getElementById(id).classList.toggle('hidden');
            document.getElementById(`icon-${id}`).classList.toggle('rotate-icon');
        }
        buscador.addEventListener('input', (e) => renderizar(e.target.value));
        renderizar();
    </script>
</body>
</html>
