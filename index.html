<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RESET TALLER - Catálogo Oficial</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --neon-cyan: #00ffff; /* Celeste Neón */
            --emerald-green: #25d366; /* Verde Esmeralda */
            --bg-dark: #0a0e17;
            --card-bg: rgba(255,255,255,0.03);
            --text-white: #ffffff;
        }

        body { background-color: var(--bg-dark); font-family: 'Segoe UI', sans-serif; color: var(--text-white); padding-bottom: 90px; }
        
        /* --- Portada --- */
        .hero-section {
            background-image: linear-gradient(rgba(0, 0, 0, 0.8), rgba(10, 14, 23, 1)), 
                              url('https://images.unsplash.com/photo-1597733336794-12d05021d510?q=80&w=1974&auto=format&fit=crop');
            background-size: cover; background-position: center; padding: 50px 0 30px; text-align: center;
        }

        .hero-logo {
            width: 130px; height: 130px; border-radius: 50%; border: 4px solid var(--neon-cyan);
            box-shadow: 0 0 20px var(--neon-cyan); object-fit: cover; margin-bottom: 15px; cursor: pointer;
        }

        .hero-title { font-size: 3.5rem; font-weight: 900; color: var(--neon-cyan); text-shadow: 0 0 15px var(--neon-cyan); margin: 0; }
        .hero-subtitle { font-size: 1.2rem; font-weight: 500; color: white; margin-bottom: 10px; }
        .hero-divider { width: 150px; height: 4px; background: var(--neon-cyan); margin: 15px auto; border-radius: 10px; box-shadow: 0 0 15px var(--neon-cyan); }
        .hero-bible { font-size: 0.95rem; font-style: italic; opacity: 0.8; margin: 15px auto; max-width: 600px; }
        .hero-address { font-size: 0.8rem; opacity: 0.6; text-transform: uppercase; letter-spacing: 2px; }

        /* Botón Verde Esmeralda */
        .btn-catalog { background-color: var(--emerald-green); color: white; font-weight: bold; padding: 12px 30px; border-radius: 50px; text-decoration: none; display: inline-flex; align-items: center; gap: 10px; margin-top: 20px; box-shadow: 0 4px 15px rgba(37, 211, 102, 0.4); }

        /* --- Buscador Inteligente --- */
        .search-box { background: rgba(255,255,255,0.05); border-radius: 15px; padding: 10px; margin-bottom: 30px; border: 1px solid rgba(0,255,255,0.1); }
        .search-input { background: transparent !important; color: white !important; border: none !important; }
        .btn-home { background: #0d6efd; color: white; border-radius: 10px; border: none; width: 45px; height: 45px; }

        /* --- Acordeones y Contadores --- */
        .accordion-item { border: none; background: var(--card-bg); margin-bottom: 10px; border-radius: 15px !important; border: 1px solid rgba(0,255,255,0.1); }
        .accordion-button { font-weight: 700; color: white; background: transparent; padding: 18px; }
        .accordion-button:not(.collapsed) { background-color: #1e293b; color: var(--neon-cyan); }
        .badge-count { background: rgba(0,255,255,0.1); color: var(--neon-cyan); padding: 4px 12px; border-radius: 20px; font-size: 0.75rem; margin-left: auto; border: 1px solid var(--neon-cyan); }

        /* Sub-acordeón Huawei */
        .sub-accordion .accordion-item { background: rgba(255,255,255,0.05); margin-top: 5px; border: 1px solid rgba(255,255,255,0.1); }

        /* --- Productos --- */
        .card-prod { background: rgba(0,255,255,0.03); border-radius: 12px; padding: 15px; margin-bottom: 10px; border: 1px solid rgba(0,255,255,0.05); }
        .precio-tag { color: var(--neon-cyan); font-weight: 800; font-size: 1.3rem; }
        .btn-pedir { background: var(--emerald-green); color: white; border-radius: 8px; font-size: 0.8rem; padding: 8px 15px; text-decoration: none; font-weight: bold; }

        /* Barra Inferior */
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; height: 75px; background: #0f172a; display: flex; justify-content: space-around; align-items: center; border-top: 2px solid var(--neon-cyan); z-index: 1000; }
        .nav-item { text-align: center; color: white; text-decoration: none; flex: 1; border: none; background: none; }
        .nav-item i { font-size: 1.3rem; color: var(--neon-cyan); display: block; }
        .nav-item span { font-size: 0.65rem; font-weight: bold; text-transform: uppercase; color: #94a3b8; }
    </style>
</head>
<body>

<div class="container hero-section">
    <img src="WhatsApp Image 2026-03-30 at 8.47.32 PM.jpeg" class="hero-logo" onclick="location.reload()">
    <h1 class="hero-title">RESET TALLER</h1>
    <p class="hero-subtitle">Servicio Técnico Profesional</p>
    <div class="hero-divider"></div>
    <p class="hero-bible">"Mira que te mando que te esfuerces y seas valiente..." - Josué 1:9</p>
    <p class="hero-address">Alajuela, San Carlos, Aguas Zarcas</p>
    <a href="https://wa.me/50661073855" class="btn-catalog" target="_blank"><i class="fab fa-whatsapp"></i> VER CATÁLOGO CON FOTOS</a>
</div>

<div class="container my-4">
    <div class="search-box d-flex gap-2">
        <input type="text" id="bus" class="form-control search-input" placeholder="Busca tu modelo (ej: G7, P30)..." onkeyup="buscar()">
        <button class="btn-home" onclick="location.reload()"><i class="fas fa-home"></i></button>
    </div>
    <div class="accordion" id="mainAcc"></div>
</div>

<div class="bottom-nav">
    <div class="nav-item"><i class="fas fa-box-open"></i><span id="txtItems">0 Items</span></div>
    <a href="https://wa.me/50661073855" class="nav-item" target="_blank"><i class="fab fa-whatsapp"></i><span>WhatsApp</span></a>
    <div class="nav-item"><i class="fas fa-moon"></i><span>Noche</span></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="datos.js"></script>
<script>
    const whatsapp = "50661073855";
    const cats = ["HUAWEI", "SAMSUNG", "IPHONE", "MOTOROLA", "XIAOMI", "HONOR"];

    function buscar() {
        const q = document.getElementById('bus').value.trim().toUpperCase();
        const f = productos.filter(p => p.modelo.toUpperCase().includes(q) || p.categoria.toUpperCase().includes(q));
        render(f, q !== "");
    }

    function render(lista, expandir) {
        const h = document.getElementById('mainAcc');
        h.innerHTML = "";
        document.getElementById('txtItems').innerText = productos.length + " Items";

        cats.forEach((c, i) => {
            const prods = lista.filter(p => p.categoria === c);
            if(prods.length > 0) {
                const id = "cat" + i;
                const sinMarco = prods.filter(p => p.subcategoria === "SIN MARCO");
                const conMarco = prods.filter(p => p.subcategoria === "CON MARCO");
                const otros = prods.filter(p => p.subcategoria !== "SIN MARCO" && p.subcategoria !== "CON MARCO");

                let subHtml = "";
                if(sinMarco.length > 0 || conMarco.length > 0) {
                    subHtml = `<div class="accordion sub-accordion">
                        ${genSub(i, "sin", "PANTALLAS SIN MARCO", sinMarco, expandir)}
                        ${genSub(i, "con", "PANTALLAS CON MARCO", conMarco, expandir)}
                        ${otros.length > 0 ? `<div class="row pt-3">${otros.map(p => card(p)).join('')}</div>` : ''}
                    </div>`;
                } else {
                    subHtml = `<div class="row">${prods.map(p => card(p)).join('')}</div>`;
                }

                h.innerHTML += `
                <div class="accordion-item shadow-sm">
                    <h2 class="accordion-header">
                        <button class="accordion-button ${expandir ? '' : 'collapsed'}" type="button" data-bs-toggle="collapse" data-bs-target="#${id}">
                            <span><i class="fas fa-tools me-2 text-primary"></i> ${c}</span>
                            <span class="badge-count">${prods.length}</span>
                        </button>
                    </h2>
                    <div id="${id}" class="accordion-collapse collapse ${expandir ? 'show' : ''}" data-bs-parent="#mainAcc">
                        <div class="accordion-body">${subHtml}</div>
                    </div>
                </div>`;
            }
        });
    }

    function genSub(idx, tipo, tit, lista, expandir) {
        if(lista.length === 0) return "";
        const id = `s${idx}${tipo}`;
        return `
        <div class="accordion-item border-0">
            <h2 class="accordion-header">
                <button class="accordion-button ${expandir ? '' : 'collapsed'} py-2" style="font-size:0.85rem" type="button" data-bs-toggle="collapse" data-bs-target="#${id}">
                    <span>${tit}</span><span class="badge-count">${lista.length}</span>
                </button>
            </h2>
            <div id="${id}" class="accordion-collapse collapse ${expandir ? 'show' : ''}">
                <div class="accordion-body bg-dark bg-opacity-25"><div class="row">${lista.map(p => card(p)).join('')}</div></div>
            </div>
        </div>`;
    }

    function card(p) {
        return `<div class="col-12 col-md-6 px-1"><div class="card-prod d-flex justify-content-between align-items-center mb-2">
            <div><div class="fw-bold" style="font-size:0.9rem">${p.modelo}</div><div class="precio-tag">₡${p.precio}</div></div>
            <a href="https://wa.me/${whatsapp}?text=Cotizar: ${p.modelo}" class="btn-pedir" target="_blank">PEDIR</a>
        </div></div>`;
    }

    window.onload = () => render(productos, false);
</script>
</body>
</html>
