<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Taller</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style> 
        .rotate-180 { transform: rotate(180deg); } 
        :root { --tecnico: #38bdf8; }
        .modo-claro { background-color: #f1f5f9; color: #1e293b; }
        .modo-claro .bg-header { background-color: #ffffff; border-color: #e2e8f0; }
        .modo-claro .bg-card { background-color: #ffffff; border-color: #e2e8f0; }
        .modo-claro input { background-color: #ffffff; color: #1e293b; border: 1px solid #cbd5e1; }
        .text-versiculo { color: #94a3b8; font-style: italic; }
    </style>
</head>
<body id="cuerpo" class="bg-slate-950 text-white min-h-screen pb-20 transition-colors duration-300">

    <header id="header" class="relative p-10 text-center border-b border-slate-800 mb-6 rounded-b-3xl shadow-2xl overflow-hidden">
        <div class="absolute inset-0 z-0 opacity-20">
            <img src="https://images.unsplash.com/photo-1581092918056-0c4c3acd3789?q=80&w=600&auto=format&fit=crop" class="w-full h-full object-cover">
        </div>
        
        <div class="relative z-10 flex flex-col items-center">
            <div class="-mt-6 mb-4 relative">
                <img src="https://raw.githubusercontent.com/resettalleraz-max/resettaller/main/WhatsApp%20Image%202026-03-30%20at%208.47.32%20PM.jpeg" 
                     alt="Logo Reset Taller" 
                     class="w-24 h-24 rounded-full border-4 border-[var(--tecnico)] shadow-[0_0_20px_rgba(56,189,248,0.6)] object-cover bg-slate-900">
            </div>
            
            <h1 class="text-4xl font-black italic text-[var(--tecnico)] uppercase tracking-tighter">RESET TALLER</h1>
            <p class="text-slate-300 text-xs font-bold tracking-[0.2em] uppercase mt-2">Servicio Técnico Profesional</p>
            
            <div class="w-20 h-1 bg-[var(--tecnico)] mx-auto mt-4 rounded-full shadow-[0_0_10px_#38bdf8]"></div>
            
            <p class="text-versiculo text-[11px] mt-3 max-w-xs mx-auto px-4">
                "Mira que te mando que te esfuerces y seas valiente; no temas ni desmayes, porque Jehová tu Dios estará contigo en dondequiera que vayas." <br><b>Josué 1:9</b>
            </p>
            
            <p class="text-slate-500 text-[10px] font-mono mt-2 italic uppercase tracking-widest">
                Alajuela, San Carlos, Aguas Zarcas
            </p>
        </div>
    </header>

    <div class="px-4 mb-3">
        <div class="relative">
            <i class="fa fa-search absolute left-4 top-3.5 text-slate-500"></i>
            <input type="text" id="buscador" placeholder="Busca tu modelo o herramienta..." 
                class="w-full bg-slate-800 rounded-2xl py-3 pl-12 pr-4 text-sm outline-none focus:ring-2 focus:ring-[var(--tecnico)] shadow-lg transition-colors">
        </div>
    </div>

    <div class="px-4 mb-6">
        <div class="bg-slate-900 border border-slate-800 p-2 rounded-xl text-center shadow-md">
            <p class="text-[var(--tecnico)] font-bold text-xs uppercase tracking-wider">
                ⚡ EL PRECIO INCLUYE LA REPARACIÓN 🛠️
            </p>
        </div>
    </div>

    <main id="lista-repuestos" class="px-4 space-y-3"></main>

    <nav class="fixed bottom-0 left-0 right-0 bg-slate-900/95 backdrop-blur-md border-t border-slate-800 flex justify-around items-center py-2 text-[9px] font-bold text-slate-400 shadow-2xl rounded-t-xl transition-colors z-50">
        <div class="text-center text-[var(--tecnico)] w-1/3">
            <i class="fa fa-box-open text-lg mb-0.5"></i><br>
            <span id="contador-items">0 Total</span>
        </div>
        <div class="w-1/3 flex justify-center border-x border-slate-800/50">
            <a href="https://wa.me/50661073855" class="text-center hover:text-green-400 transition">
                <i class="fab fa-whatsapp text-xl mb-0.5 text-green-500"></i><br>WHATSAPP
            </a>
        </div>
        <div class="w-1/3 flex justify-center">
            <button onclick="cambiarModo()" class="text-center hover:text-[var(--tecnico)] transition">
                <i id="icono-modo" class="fa fa-moon text-lg mb-0.5"></i><br>MODO
            </button>
        </div>
    </nav>

    <script src="datos.js"></script>
    <script>
        const contenedor = document.getElementById('lista-repuestos');
        const buscador = document.getElementById('buscador');
        const cuerpo = document.getElementById('cuerpo');
        const iconoModo = document.getElementById('icono-modo');

        function cambiarModo() {
            cuerpo.classList.toggle('modo-claro');
            const esClaro = cuerpo.classList.contains('modo-claro');
            iconoModo.className = esClaro ? 'fa fa-sun text-lg mb-0.5' : 'fa fa-moon text-lg mb-0.5';
            renderizar(buscador.value);
        }

        function renderizar(filtro = '') {
            contenedor.innerHTML = '';
            let totalGeneral = 0;
            let estructura = [];

            const todasLasListas = [...PANTALLAS];
            if (typeof HERRAMIENTAS !== 'undefined') todasLasListas.push(...HERRAMIENTAS);

            let mainFolder = null;
            let subFolder = null;

            todasLasListas.forEach((item) => {
                const [tipo, valor] = item;
                if (tipo === "TITULO") {
                    mainFolder = { nombre: valor, subs: [], items: [], contador: 0 };
                    estructura.push(mainFolder);
                    subFolder = null;
                } else if (tipo === "SUBTITULO") {
                    subFolder = { nombre: valor, items: [], contador: 0 };
                    if (mainFolder) mainFolder.subs.push(subFolder);
                } else {
                    if (tipo.toLowerCase().includes(filtro.toLowerCase())) {
                        totalGeneral++;
                        if (subFolder) {
                            subFolder.items.push(item);
                            subFolder.contador++;
                            mainFolder.contador++;
                        } else if (mainFolder) {
                            mainFolder.items.push(item);
                            mainFolder.contador++;
                        }
                    }
                }
            });

            const esClaro = cuerpo.classList.contains('modo-claro');

            estructura.forEach((main, mIdx) => {
                if (main.contador === 0 && filtro !== '') return;
                const mId = `m-${mIdx}`;
                const mDiv = document.createElement('div');
                mDiv.innerHTML = `
                    <button onclick="toggle('${mId}')" class="w-full ${esClaro ? 'bg-white' : 'bg-slate-900'} p-5 rounded-2xl flex justify-between items-center mb-2 border-l-4 border-[var(--tecnico)] shadow-lg transition-colors">
                        <span class="font-black uppercase ${esClaro ? 'text-slate-800' : 'text-slate-100'} text-sm tracking-wider">${main.nombre} <span class="text-[var(--tecnico)] ml-2">${main.contador}</span></span>
                        <i id="icon-${mId}" class="fa fa-chevron-down text-[var(--tecnico)] transition-transform"></i>
                    </button>
                    <div id="${mId}" class="hidden space-y-2 mb-4 px-1"></div>
                `;
                contenedor.appendChild(mDiv);
                const mContent = mDiv.querySelector(`#${mId}`);

                main.subs.forEach((sub, sIdx) => {
                    if (sub.contador === 0 && filtro !== '') return;
                    const sId = `s-${mIdx}-${sIdx}`;
                    const sDiv = document.createElement('div');
                    sDiv.innerHTML = `
                        <button onclick="toggle('${sId}')" class="w-full ${esClaro ? 'bg-slate-200' : 'bg-slate-800'} p-3 rounded-xl flex justify-between items-center mb-1 border ${esClaro ? 'border-slate-300' : 'border-slate-700'}">
                            <span class="font-bold ${esClaro ? 'text-slate-600' : 'text-slate-300'} text-xs uppercase">${sub.nombre} <span class="text-slate-500 ml-1">${sub.contador}</span></span>
                            <i id="icon-${sId}" class="fa fa-plus text-[10px] text-slate-500 transition-transform"></i>
                        </button>
                        <div id="${sId}" class="hidden space-y-1 mt-1 ml-3 border-l-2 border-slate-400 pl-3"></div>
                    `;
                    mContent.appendChild(sDiv);
                    const sContent = sDiv.querySelector(`#${sId}`);
                    sub.items.forEach(repuesto => sContent.appendChild(crearCard(repuesto, esClaro)));
                });

                main.items.forEach(repuesto => {
                    if (!main.subs.some(s => s.items.includes(repuesto))) {
                        mContent.appendChild(crearCard(repuesto, esClaro));
                    }
                });
            });
            document.getElementById('contador-items').innerText = `${totalGeneral} Total`;
        }

        function crearCard(item, esClaro) {
            const [tipo, valor] = item;
            const card = document.createElement('div');
            card.className = `${esClaro ? 'bg-white border-slate-200' : 'bg-slate-800/40 border-slate-700/50'} p-3 rounded-xl flex justify-between items-center border mx-1 shadow-sm transition-colors`;
            card.innerHTML = `
                <span class="text-xs font-semibold ${esClaro ? 'text-slate-700' : 'text-slate-200'} uppercase">${tipo}</span>
                <div class="flex items-center gap-3">
                    <span class="text-[var(--tecnico)] font-black text-sm tracking-tight">${valor}</span>
                    <a href="https://wa.me/50661073855?text=Consulta: ${tipo.replace(/<[^>]*>?/gm, '')}" class="bg-green-600 p-2 rounded-lg text-white shadow-md active:scale-90 transition"><i class="fab fa-whatsapp text-sm"></i></a>
                </div>`;
            return card;
        }

        function toggle(id) {
            document.getElementById(id).classList.toggle('hidden');
            document.getElementById(`icon-${id}`).classList.toggle('rotate-180');
        }
        buscador.addEventListener('input', (e) => renderizar(e.target.value));
        renderizar();
    </script>
</body>
</html>
