<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RESET TALLER - Catálogo Oficial</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --neon-cyan: #00ffff; --emerald-green: #25d366; --bg-dark: #0a0e17; --text-white: #ffffff; }
        body { background-color: var(--bg-dark); font-family: 'Segoe UI', sans-serif; color: var(--text-white); padding-bottom: 90px; }
        
        .hero-section { padding: 50px 0 30px; text-align: center; background: linear-gradient(rgba(0,0,0,0.8), var(--bg-dark)); }
        .hero-logo { width: 120px; height: 120px; border-radius: 50%; border: 4px solid var(--neon-cyan); box-shadow: 0 0 20px var(--neon-cyan); object-fit: cover; margin-bottom: 15px; }
        .hero-title { font-size: 3.5rem; font-weight: 900; color: var(--neon-cyan); text-shadow: 0 0 15px var(--neon-cyan); margin: 0; }
        .hero-divider { width: 150px; height: 4px; background: var(--neon-cyan); margin: 15px auto; box-shadow: 0 0 15px var(--neon-cyan); }
        .btn-catalog { background-color: var(--emerald-green); color: white; font-weight: bold; padding: 12px 30px; border-radius: 50px; text-decoration: none; display: inline-flex; align-items: center; gap: 10px; margin-top: 15px; }

        /* --- Acordeones y Contadores --- */
        .accordion-item { border: none; background: rgba(255,255,255,0.03); margin-bottom: 10px; border-radius: 12px !important; border: 1px solid rgba(0,255,255,0.1); }
        .accordion-button { font-weight: 700; color: var(--text-white); background: transparent; padding: 18px; display: flex; justify-content: space-between; align-items: center; width: 100%; }
        .accordion-button:not(.collapsed) { background-color: #1e293b; color: var(--neon-cyan); }
        .accordion-button::after { margin-left: 15px; filter: invert(1); }
        
        /* El monto a la derecha */
        .badge-count { background: rgba(0,255,255,0.1); color: var(--neon-cyan); padding: 4px 12px; border-radius: 20px; font-size: 0.8rem; margin-left: auto; border: 1px solid var(--neon-cyan); }

        /* Sub-acordeón para Huawei */
        .sub-accordion .accordion-item { background: rgba(255,255,255,0.05); margin-top: 5px; border: 1px solid rgba(255,255,255,0.1); }
        .sub-accordion .accordion-button { font-size: 0.85rem; color: #cbd5e1; }

        /* --- Tarjetas de Producto --- */
        .card-prod { background: rgba(255,255,255,0.04); border-radius: 12px; padding: 15px; margin-bottom: 10px; border: 1px solid rgba(255,255,255,0.05); }
        .precio-tag { color: var(--neon-cyan); font-weight: 800; font-size: 1.2rem; }
        .btn-ws { background-color: var(--emerald-green); color: white; border-radius: 8px; padding: 6px 15px; text-decoration: none; font-weight: bold; font-size: 0.8rem; }

        /* Barra Inferior Fija */
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; height: 75px; background: #0f172a; display: flex; justify-content: space-around; align-items: center; border-top: 2px solid var(--neon-cyan); z-index: 1000; }
        .nav-item { text-align: center; color: white; text-decoration: none; flex: 1; border: none; background: none; }
        .nav-item i { font-size: 1.3rem; color: var(--neon-cyan); display: block; }
        .nav-item span { font-size: 0.65rem; font-weight: bold; text-transform: uppercase; color: #94a3b8; }
    </style>
</head>
<body>

<div class="container hero-section">
    <img src="WhatsApp Image 2026-03-30 at 8.47.32 PM.jpeg" class="hero-logo">
    <h1 class="hero-title">RESET TALLER</h1>
    <div class="hero-divider"></div>
    <p class="hero-bible">"Mira que te mando que te esfuerces y seas valiente..." - Josué 1:9</p>
    <a href="https://wa.me/50661073855" class="btn-catalog" target="_blank"><i class="fab fa-whatsapp"></i> VER CATÁLOGO CON FOTOS</a>
</div>

<div class="container mt-4 mb-5" id="mainAcc"></div>

<div class="bottom-nav">
    <div class="nav-item"><i class="fas fa-box-open"></i><span id="totalItems">0 Items</span></div>
    <a href="https://wa.me/50661073855" class="nav-item" target="_blank"><i class="fab fa-whatsapp"></i><span>WhatsApp</span></a>
    <div class="nav-item"><i class="fas fa-moon"></i><span>Noche</span></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="datos.js"></script>
<script>
    const categoriasBase = ["HUAWEI", "SAMSUNG", "IPHONE", "MOTOROLA", "XIAOMI"];

    function render() {
        const contenedor = document.getElementById('mainAcc');
        contenedor.innerHTML = "";
        document.getElementById('totalItems').innerText = productos.length + " Items";

        categoriasBase.forEach((cat, i) => {
            const items = productos.filter(p => p.categoria === cat);
            if(items.length > 0) {
                const id = "cat" + i;
                const sinMarco = items.filter(p => p.subcategoria === "SIN MARCO");
                const conMarco = items.filter(p => p.subcategoria === "CON MARCO");

                let subHtml = "";
                // Crear las dos subcarpetas dentro de Huawei o la marca que sea
                if(sinMarco.length > 0 || conMarco.length > 0) {
                    subHtml = `<div class="accordion sub-accordion">
                        ${generarSub(i, "sin", "PANTALLAS SIN MARCO", sinMarco)}
                        ${generarSub(i, "con", "PANTALLAS CON MARCO", conMarco)}
                    </div>`;
                } else {
                    subHtml = `<div class="row">${items.map(p => card(p)).join('')}</div>`;
                }

                contenedor.innerHTML += `
                <div class="accordion-item shadow-sm">
                    <h2 class="accordion-header">
                        <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#${id}">
                            <span>${cat}</span>
                            <span class="badge-count">${items.length}</span>
                        </button>
                    </h2>
                    <div id="${id}" class="accordion-collapse collapse" data-bs-parent="#mainAcc">
                        <div class="accordion-body">${subHtml}</div>
                    </div>
                </div>`;
            }
        });
    }

    function generarSub(idx, tipo, tit, lista) {
        if(lista.length === 0) return "";
        const id = `sub${idx}${tipo}`;
        return `
        <div class="accordion-item border-0">
            <h2 class="accordion-header">
                <button class="accordion-button collapsed py-2" type="button" data-bs-toggle="collapse" data-bs-target="#${id}">
                    <span>${tit}</span>
                    <span class="badge-count">${lista.length}</span>
                </button>
            </h2>
            <div id="${id}" class="accordion-collapse collapse">
                <div class="accordion-body bg-dark bg-opacity-25">
                    <div class="row">${lista.map(p => card(p)).join('')}</div>
                </div>
            </div>
        </div>`;
    }

    function card(p) {
        return `<div class="col-12 col-md-6 mb-2">
            <div class="card-prod d-flex justify-content-between align-items-center">
                <div>
                    <div class="fw-bold" style="font-size:0.95rem">${p.modelo}</div>
                    <div class="precio-tag">₡${p.precio}</div>
                </div>
                <a href="https://wa.me/50661073855?text=Consulta: ${p.modelo}" class="btn-ws" target="_blank">PEDIR</a>
            </div>
        </div>`;
    }

    window.onload = render;
</script>
</body>
</html>
