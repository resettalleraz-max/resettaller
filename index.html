<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Taller</title>
    <link rel="apple-touch-icon" href="https://raw.githubusercontent.com/resettalleraz-max/resettaller/main/WhatsApp%20Image%202026-03-30%20at%208.47.32%20PM.jpeg">
    <link rel="icon" href="https://raw.githubusercontent.com/resettalleraz-max/resettaller/main/WhatsApp%20Image%202026-03-30%20at%208.47.32%20PM.jpeg">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style> 
        .rotate-180 { transform: rotate(180deg); } 
        :root { --tecnico: #38bdf8; }
        .modo-claro { background-color: #f1f5f9; color: #1e293b; }
        .modo-claro input { background-color: #ffffff; color: #1e293b; border: 1px solid #cbd5e1; }
        .text-versiculo { color: #94a3b8; font-style: italic; }
        .titulo-seccion { font-size: 24px; font-weight: 900; text-align: left; padding: 30px 10px 10px 5px; letter-spacing: 1px; color: white; text-transform: uppercase; }
        .modo-claro .titulo-seccion { color: #0f172a; }
        .btn-home { background-color: #38bdf8; color: #0f172a; width: 45px; height: 45px; border-radius: 15px; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 15px rgba(56, 189, 248, 0.4); transition: all 0.2s; }
    </style>
</head>
<body id="cuerpo" class="bg-slate-950 text-white min-h-screen pb-24 transition-colors duration-300">

    <header id="header" class="relative p-10 text-center border-b border-slate-800 mb-6 rounded-b-3xl shadow-2xl overflow-hidden">
        <div class="absolute inset-0 z-0 opacity-20">
            <img src="https://images.unsplash.com/photo-1581092918056-0c4c3acd3789?q=80&w=600&auto=format&fit=crop" class="w-full h-full object-cover">
        </div>
        <div class="relative z-10 flex flex-col items-center">
            <div onclick="irAlInicio()" class="cursor-pointer flex flex-col items-center">
                <div class="-mt-6 mb-4 relative">
                    <img src="https://raw.githubusercontent.com/resettalleraz-max/resettaller/main/WhatsApp%20Image%202026-03-30%20at%208.47.32%20PM.jpeg" 
                         class="w-24 h-24 rounded-full border-4 border-[var(--tecnico)] shadow-[0_0_20px_rgba(56,189,248,0.6)] object-cover bg-slate-900">
                </div>
                <h1 class="text-4xl font-black italic text-[var(--tecnico)] uppercase tracking-tighter">RESET TALLER</h1>
                <p class="text-slate-300 text-xs font-bold tracking-[0.2em] uppercase mt-2">Servicio Técnico Profesional</p>
            </div>
            <p class="text-versiculo text-[11px] mt-3 px-4 italic">"Mira que te mando que te esfuerces y seas valiente..." <br><b>Josué 1:9</b></p>
            <p class="text-slate-500 text-[10px] font-mono mt-2 italic uppercase tracking-widest mb-6 text-center">Alajuela, San Carlos, Aguas Zarcas</p>

            <a href="https://wa.me/c/50661073855" target="_blank" class="bg-green-600 hover:bg-green-700 text-white text-[11px] font-black py-3 px-6 rounded-full shadow-[0_0_20px_rgba(22,163,74,0.5)] flex items-center gap-2 transition-all active:scale-95 uppercase tracking-wider">
                <i class="fab fa-whatsapp text-lg"></i> Ver Catálogo con Fotos
            </a>
        </div>
    </header>

    <div class="px-4 mb-3 flex gap-2">
        <div class="relative flex-grow">
            <i class="fa fa-search absolute left-4 top-3.5 text-slate-500"></i>
            <input type="text" id="buscador" placeholder="Busca tu modelo..." 
                class="w-full bg-slate-800 rounded-2xl py-3 pl-12 pr-4 text-sm outline-none focus:ring-2 focus:ring-[var(--tecnico)]">
        </div>
        <button onclick="irAlInicio()" class="btn-home"><i class="fa fa-home text-xl"></i></button>
    </div>

    <div class="px-4 mb-6 text-center">
        <div class="bg-slate-900 border border-slate-800 p-2 rounded-xl shadow-md">
            <p class="text-[var(--tecnico)] font-bold text-xs uppercase tracking-wider">⚡ EL PRECIO INCLUYE LA REPARACIÓN 🛠️</p>
        </div>
    </div>

    <main id="lista-repuestos" class="px-4 space-y-3"></main>

    <nav class="fixed bottom-0 left-0 right-0 bg-slate-900/95 backdrop-blur-sm border-t border-slate-800 flex justify-around items-center py-3 text-[10px] font-bold text-slate-400 z-50">
        <div class="text-center text-[var(--tecnico)] w-1/3">
            <i class="fa fa-box-open text-xl mb-1"></i><br>
            <span id="contador-items">0 Total</span>
        </div>
        <div class="w-1/3 flex justify-center border-x border-slate-800/30">
            <a href="https://wa.me/50661073855" class="text-center">
                <i class="fab fa-whatsapp text-2xl mb-1 text-green-500"></i><br>WHATSAPP
            </a>
        </div>
        <div class="w-1/3 flex justify-center">
            <button onclick="cambiarModo()" class="text-center">
                <i id="icono-modo" class="fa fa-moon text-xl mb-1"></i><br>MODO
            </button>
        </div>
    </nav>

    <script src="datos.js"></script>
    <script>
        const contenedor = document.getElementById('lista-repuestos');
        const buscador = document.getElementById('buscador');
        const cuerpo = document.getElementById('cuerpo');

        function irAlInicio() { buscador.value = ''; renderizar(''); window.scrollTo({ top: 0, behavior: 'smooth' }); }
        function cambiarModo() { cuerpo.classList.toggle('modo-claro'); const esClaro = cuerpo.classList.contains('modo-claro'); document.getElementById('icono-modo').className = esClaro ? 'fa fa-sun text-xl mb-1' : 'fa fa-moon text-xl mb-1'; renderizar(buscador.value); }
        function obtenerNombreCorto(nombre) { return "PANTALLAS"; }

        function renderizar(filtro = '') {
            contenedor.innerHTML = '';
            let totalGeneral = 0;
            // Verificamos que PANTALLAS exista en datos.js
            const todasLasListas = (typeof PANTALLAS !== 'undefined') ? [...PANTALLAS] : [];
            
            let estructura = [];
            let mainFolder = null;
            let subFolder = null;

            todasLasListas.forEach((item) => {
                const [tipo, valor] = item;
                if (tipo === "TITULO") {
                    mainFolder = { nombre: valor, subs: [], items: [], contador: 0 };
                    estructura.push(mainFolder);
                    subFolder = null;
                } else if (tipo === "SUBTITULO") {
                    subFolder = { nombre: valor, items: [], contador: 0 };
                    if (mainFolder) mainFolder.subs.push(subFolder);
                } else {
                    if (tipo.toLowerCase().includes(filtro.toLowerCase()) || (mainFolder && mainFolder.nombre.toLowerCase().includes(filtro.toLowerCase()))) {
                        totalGeneral++; 
                        if (subFolder) { subFolder.items.push(item); subFolder.contador++; mainFolder.contador++; }
                        else if (mainFolder) { mainFolder.items.push(item); mainFolder.contador++; }
                    }
                }
            });

            const esClaro = cuerpo.classList.contains('modo-claro');
            estructura.forEach((main, mIdx) => {
                if (main.contador === 0) return;
                const mId = `m-${mIdx}`;
                const mDiv = document.createElement('div');
                const estaAbierto = filtro !== '' ? '' : 'hidden';
                const rotacion = filtro !== '' ? 'rotate-180' : '';

                mDiv.innerHTML = `
                    <button onclick="toggle('${mId}')" class="w-full ${esClaro ? 'bg-white border-slate-200' : 'bg-slate-900 border-slate-800'} p-5 rounded-2xl flex justify-between items-center mb-2 border-l-4 border-[var(--tecnico)] border shadow-md">
                        <span class="font-black uppercase ${esClaro ? 'text-slate-800' : 'text-slate-100'} text-sm tracking-wider">${main.nombre} <span class="text-[var(--tecnico)] ml-2">${main.contador}</span></span>
                        <i id="icon-${mId}" class="fa fa-chevron-down text-[var(--tecnico)] transition-transform ${rotacion}"></i>
                    </button>
                    <div id="${mId}" class="${estaAbierto} space-y-2 mb-4 px-1"></div>
                `;
                contenedor.appendChild(mDiv);
                const mContent = mDiv.querySelector(`#${mId}`);

                main.subs.forEach((sub, sIdx) => {
                    if (sub.contador === 0) return;
                    const sId = `s-${mIdx}-${sIdx}`;
                    const sDiv = document.createElement('div');
                    sDiv.innerHTML = `
                        <button onclick="toggle('${sId}')" class="w-full ${esClaro ? 'bg-slate-200' : 'bg-slate-800'} p-3 rounded-xl flex justify-between items-center mb-1 border border-slate-700">
                            <span class="font-bold text-xs uppercase">${sub.nombre}</span>
                            <i id="icon-${sId}" class="fa fa-plus text-[10px] text-slate-500"></i>
                        </button>
                        <div id="${sId}" class="hidden space-y-1 mt-1 ml-3 border-l-2 border-slate-400 pl-3"></div>
                    `;
                    mContent.appendChild(sDiv);
                    sub.items.forEach(repuesto => sDiv.querySelector(`#${sId}`).appendChild(crearCard(repuesto, esClaro, "PANTALLA")));
                });
                main.items.forEach(repuesto => { if (!main.subs.some(s => s.items.includes(repuesto))) mContent.appendChild(crearCard(repuesto, esClaro, "PANTALLA")); });
            });
            document.getElementById('contador-items').innerText = `${totalGeneral} Total`;
        }

        function crearCard(item, esClaro, cat) {
            const [tipo, valor] = item;
            const card = document.createElement('div');
            card.className = `${esClaro ? 'bg-white border-slate-200' : 'bg-slate-800/40 border-slate-700/50'} p-4 rounded-xl flex flex-col gap-2 border shadow-sm`;
            card.innerHTML = `
                <div class="flex justify-between items-start">
                    <div class="flex flex-col">
                        <span class="text-[10px] font-bold text-[var(--tecnico)] uppercase tracking-widest mb-1">REPUESTO DISPONIBLE:</span>
                        <span class="text-sm font-black uppercase leading-tight">${tipo}</span>
                    </div>
                    <span class="text-[var(--tecnico)] font-black text-lg tracking-tighter">${valor}</span>
                </div>
                <div class="flex justify-between items-center mt-2 pt-2 border-t border-slate-700/30">
                    <span class="text-[9px] text-slate-500 font-bold uppercase italic">Incluye Reparación 🛠️</span>
                    <a href="https://wa.me/50661073855?text=Ocupo disponibilidad para: ${tipo}" class="bg-green-600 px-4 py-1.5 rounded-lg text-white text-[10px] font-bold active:scale-95 transition-all">PEDIR AHORA</a>
                </div>`;
            return card;
        }

        function toggle(id) { document.getElementById(id).classList.toggle('hidden'); document.getElementById(`icon-${id}`).classList.toggle('rotate-180'); }
        buscador.addEventListener('input', (e) => renderizar(e.target.value));
        renderizar();
    </script>
</body>
</html>
