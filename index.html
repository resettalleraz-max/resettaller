<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Taller - Catálogo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-900 text-gray-100 font-sans min-h-screen">
    <div class="max-w-md mx-auto p-4 pb-24">
        <div class="text-center mb-6">
            <h1 class="text-3xl font-extrabold text-yellow-500 tracking-tighter">RESET TALLER</h1>
            <p class="text-gray-400 text-sm">Reparación Profesional de Electrónica</p>
        </div>

        <div class="relative mb-6">
            <i class="fas fa-search absolute left-4 top-3.5 text-gray-500"></i>
            <input type="text" id="buscador" placeholder="Buscar modelo (ej: iPhone 11)..." 
                class="w-full bg-gray-800 border-none rounded-2xl py-3 pl-12 pr-4 text-white focus:ring-2 focus:ring-yellow-500 shadow-xl outline-none">
        </div>

        <div id="lista-productos" class="space-y-3">
            </div>
    </div>

    <div class="fixed bottom-0 left-0 right-0 bg-gray-800 border-t border-gray-700 p-4 shadow-2xl z-50">
        <div class="max-w-md mx-auto flex justify-between items-center text-xs text-gray-400">
            <div class="text-center flex-1">
                <i class="fas fa-mobile-alt text-lg text-yellow-500 block mb-1"></i>
                <span id="contador">0</span> Repuestos
            </div>
            <div class="text-center flex-1 border-x border-gray-700">
                <a href="https://wa.me/50661073855" class="block">
                    <i class="fab fa-whatsapp text-lg text-green-500 block mb-1"></i>
                    WhatsApp
                </a>
            </div>
            <div class="text-center flex-1">
                <i class="fas fa-tools text-lg text-blue-500 block mb-1"></i>
                Reset Taller
            </div>
        </div>
    </div>

    <script src="datos.js"></script>
    <script>
        const lista = document.getElementById('lista-productos');
        const buscador = document.getElementById('buscador');
        const contador = document.getElementById('contador');

        function mostrarProductos(filtro = '') {
            lista.innerHTML = '';
            let total = 0;
            
            PANTALLAS.forEach(p => {
                if (p[0] === "TITULO") {
                    if (!filtro) {
                        lista.innerHTML += `<h2 class="text-yellow-500 font-bold text-sm uppercase tracking-widest mt-6 mb-2 border-b border-gray-800 pb-1">${p[1]}</h2>`;
                    }
                } else {
                    if (p[0].toLowerCase().includes(filtro.toLowerCase())) {
                        total++;
                        lista.innerHTML += `
                            <div class="bg-gray-800 p-4 rounded-xl flex justify-between items-center border border-gray-700 hover:border-yellow-500 transition-all">
                                <span class="font-medium text-gray-200">${p[0]}</span>
                                <span class="text-yellow-500 font-bold text-lg">${p[1]}</span>
                            </div>`;
                    }
                }
            });
            contador.innerText = total;
        }

        buscador.addEventListener('input', (e) => mostrarProductos(e.target.value));
        window.onload = () => mostrarProductos();
    </script>
</body>
</html>
