<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Taller - Catálogo Oficial</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary-blue: #0d6efd; --secondary-green: #25d366; --bg-dark: #0f172a; }
        body { background-color: var(--bg-dark); font-family: 'Segoe UI', sans-serif; color: #fff; }
        
        /* --- Portada --- */
        .hero-section { padding: 40px 0; text-align: center; background: linear-gradient(0deg, var(--bg-dark) 0%, rgba(13,110,253,0.1) 100%); }
        .hero-logo { width: 120px; height: 120px; border-radius: 50%; border: 3px solid var(--primary-blue); cursor: pointer; object-fit: cover; margin-bottom: 15px; box-shadow: 0 0 20px rgba(13,110,253,0.3); }
        .hero-title { font-size: 2.5rem; font-weight: 800; text-transform: uppercase; color: #fff; margin:0; }
        .hero-subtitle { font-size: 1.1rem; color: var(--primary-blue); font-weight: 600; margin-bottom: 15px; }
        .hero-bible { font-size: 0.9rem; font-style: italic; opacity: 0.8; margin-bottom: 10px; color: #cbd5e1; }
        .hero-address { font-size: 0.8rem; opacity: 0.5; text-transform: uppercase; letter-spacing: 2px; }

        .btn-catalog { background-color: var(--secondary-green); color: white; font-weight: bold; padding: 12px 25px; border-radius: 50px; text-decoration: none; display: inline-flex; align-items: center; gap: 10px; margin-top: 20px; transition: 0.3s; }

        /* --- Buscador --- */
        .search-box { background: rgba(255,255,255,0.05); border-radius: 15px; padding: 10px; margin-bottom: 30px; border: 1px solid rgba(255,255,255,0.1); }
        .btn-home { background: var(--primary-blue); color: white; border-radius: 10px; border: none; width: 45px; }

        /* --- Acordeones --- */
        .accordion-item { border: none; background: rgba(255,255,255,0.03); margin-bottom: 10px; border-radius: 12px !important; overflow: hidden; }
        .accordion-button { font-weight: 700; color: white; background: transparent; padding: 18px; font-size: 0.9rem; display: flex; align-items: center; justify-content: space-between; width: 100%; }
        .accordion-button:not(.collapsed) { background: var(--primary-blue); color: white; }
        .accordion-button::after { filter: invert(1); margin-left: 10px; }

        /* Sub-Acordeón */
        .sub-accordion .accordion-item { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); margin-bottom: 5px; }
        .sub-accordion .accordion-button { font-size: 0.8rem; color: #94a3b8; padding: 12px 18px; }
        .sub-accordion .accordion-button:not(.collapsed) { background: #1e293b; color: var(--primary-blue); }

        /* --- Badge de Cantidad (Numerito a la derecha) --- */
        .badge-count { background: rgba(255,255,255,0.1); color: #fff; padding: 2px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: bold; margin-left: auto; border: 1px solid rgba(255,255,255,0.2); }
        .accordion-button:not(.collapsed) .badge-count { background: white; color: var(--primary-blue); }

        /* --- Productos --- */
        .card-prod { background: rgba(255,255,255,0.04); border-radius: 12px; padding: 15px; border: 1px solid rgba(255,255,255,0.05); transition: 0.3s; margin-bottom: 10px; }
        .precio { color: var(--primary-blue); font-weight: 800; font-size: 1.2rem; }
        .btn-pedir { background: var(--secondary-green); color: white; border-radius: 8px; font-size: 0.8rem; font-weight: bold; padding: 8px 15px; text-decoration: none; }
    </style>
</head>
<body>

<div class="container hero-section">
    <img src="WhatsApp Image 2026-03-30 at 8.47.32 PM.jpeg" class="hero-logo" onclick="location.reload()">
    <h1 class="hero-title">Reset Taller</h1>
    <p class="hero-subtitle">Servicio Técnico Profesional</p>
    <p class="hero-bible">"Mira que te mando que te esfuerces y seas valiente..." - Josué 1:9</p>
    <p class="hero-address">Alajuela, San Carlos, Aguas Zarcas</p>
    <a href="https://wa.me/50661073855" class="btn-catalog" target="_blank"><i class="fab fa-whatsapp"></i> VER CATÁLOGO CON FOTOS</a>
</div>

<div class="container pb-5">
    <div class="search-box d-flex gap-2 shadow-sm">
        <input type="text" id="bus" class="form-control bg-transparent text-white border-0" placeholder="Busca tu modelo..." onkeyup="buscar()">
        <button class="btn-home" onclick="location.reload()"><i class="fas fa-home"></i></button>
    </div>

    <div class="accordion" id="mainAcc"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="datos.js"></script>
<script>
    const whatsapp = "50661073855";
    const cats = ["HUAWEI","SAMSUNG","IPHONE","MOTOROLA","XIAOMI","HONOR","TACTIL","RAM CARGA","TARJETA CARGA","FLEX PRINCIPAL","CARGADORES","AUDIFONOS","TAPAS"];

    function pintar(lista) {
        const h = document.getElementById('mainAcc');
        h.innerHTML = "";

        cats.forEach((c, i) => {
            const prods = lista.filter(p => p.categoria === c);
            if(prods.length > 0) {
                const sinMarco = prods.filter(p => p.subcategoria === "SIN MARCO");
                const conMarco = prods.filter(p => p.subcategoria === "CON MARCO");
                const otros = prods.filter(p => p.subcategoria !== "SIN MARCO" && p.subcategoria !== "CON MARCO");

                let subHtml = "";
                
                if(sinMarco.length > 0 || conMarco.length > 0) {
                    subHtml = `<div class="accordion sub-accordion" id="sub${i}">`;
                    if(sinMarco.length > 0) {
                        subHtml += generarBloqueSub(i, "SIN", "PANTALLAS SIN MARCO", sinMarco);
                    }
                    if(conMarco.length > 0) {
                        subHtml += generarBloqueSub(i, "CON", "PANTALLAS CON MARCO", conMarco);
                    }
                    if(otros.length > 0) {
                        subHtml += `<div class="row mt-3">${otros.map(p => card(p)).join('')}</div>`;
                    }
                    subHtml += `</div>`;
                } else {
                    subHtml = `<div class="row">${prods.map(p => card(p)).join('')}</div>`;
                }

                h.innerHTML += `
                <div class="accordion-item shadow-sm">
                    <h2 class="accordion-header">
                        <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#c${i}">
                            <span><i class="fas fa-microchip me-2 text-primary"></i> ${c}</span>
                            <span class="badge-count">${prods.length}</span>
                        </button>
                    </h2>
                    <div id="c${i}" class="accordion-collapse collapse" data-bs-parent="#mainAcc">
                        <div class="accordion-body p-2 p-md-3">${subHtml}</div>
                    </div>
                </div>`;
            }
        });
    }

    function generarBloqueSub(idx, tipo, titulo, data) {
        return `
        <div class="accordion-item shadow-none border-0 mb-1">
            <h2 class="accordion-header">
                <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#s${idx}${tipo}">
                    <span>${titulo}</span>
                    <span class="badge-count">${data.length}</span>
                </button>
            </h2>
            <div id="s${idx}${tipo}" class="accordion-collapse collapse">
                <div class="accordion-body pt-2 bg-dark bg-opacity-25">
                    <div class="row">${data.map(p => card(p)).join('')}</div>
                </div>
            </div>
        </div>`;
    }

    function card(p) {
        return `
        <div class="col-12 col-md-6 px-1">
            <div class="card-prod d-flex justify-content-between align-items-center mb-2">
                <div>
                    <div class="fw-bold" style="font-size:0.9rem; color:#e2e8f0">${p.modelo}</div>
                    <div class="precio">₡${p.precio}</div>
                </div>
                <a href="https://wa.me/${whatsapp}?text=Hola Reset Taller, consulto por: ${p.modelo} (${p.subcategoria})" class="btn-pedir" target="_blank">PEDIR</a>
            </div>
        </div>`;
    }

    function buscar() {
        const q = document.getElementById('bus').value.toUpperCase();
        const f = productos.filter(p => p.modelo.toUpperCase().includes(q) || p.categoria.toUpperCase().includes(q));
        pintar(f);
    }

    window.onload = () => pintar(productos);
</script>
</body>
</html>
