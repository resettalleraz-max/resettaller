<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RESET TALLER</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<style>
/* Aquí va todo el diseño neón que ya conocés (lo recorto para que no pese) */
:root { --bg: #0a0f18; --card: #161e2d; --neon: #38bdf8; --green: #22c55e; --text: #f8fafc; }
body { font-family: 'Poppins', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 10px; }
.header { text-align: center; padding: 20px; background: var(--card); border-bottom: 4px solid var(--neon); border-radius: 0 0 25px 25px; }
.logo-img { width: 100px; height: 100px; border-radius: 50%; border: 3px solid var(--neon); margin-bottom: 12px; }
#buscador { width: 100%; padding: 15px; border-radius: 30px; border: 2px solid var(--neon); margin: 20px 0; outline: none; }
.acordeon { background: var(--card); color: var(--neon); cursor: pointer; padding: 18px; width: 100%; border: 1px solid rgba(56,189,248,0.2); border-radius: 12px; margin-top: 10px; font-weight: 700; }
.panel { padding: 0 5px; max-height: 0; overflow: hidden; transition: 0.3s; background: rgba(0,0,0,0.1); }
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; padding: 15px 5px; }
.caja { background: var(--card); padding: 12px; border-radius: 15px; text-align: center; }
.precio { color: var(--green); font-weight: 800; display: block; margin: 8px 0; }
.btn-wa { background: var(--green); color: #fff; text-decoration: none; padding: 8px; border-radius: 8px; font-size: 0.7em; display: block; }
</style>
</head>
<body>
<div class="header">
  <img src="WhatsApp Image 2026-03-30 at 8.47.32 PM.jpeg" class="logo-img">
  <h1>RESET TALLER</h1>
  <p>6107-3855</p>
  <span style="font-size:0.8em; color:#eab308">"Pon en manos del Señor todas tus obras..."</span>
</div>

<input type="text" id="buscador" onkeyup="buscar()" placeholder="🔍 BUSCAR MODELO...">

<button class="acordeon" onclick="toggle(this)">📱 IPHONE</button>
<div class="panel"><div class="grid" id="ip"></div></div>

<button class="acordeon" onclick="toggle(this)">📱 SAMSUNG</button>
<div class="panel"><div class="grid" id="sa"></div></div>

<script src="datos.js"></script>

<script>
const fill=(d,id)=>{const c=document.getElementById(id);let h='';d.forEach(i=>{h+=`<div class="caja producto"><h3>${i[0]}</h3><span class="precio">${i[1]}</span><a href="https://wa.me/50661073855?text=Reparar+${i[0]}" class="btn-wa">REPARAR</a></div>`});c.innerHTML=h};

// Llenamos las carpetas con la info que hay en datos.js
fill(IPHONE, 'ip');
fill(SAMSUNG, 'sa');

function toggle(b){b.classList.toggle("active");const p=b.nextElementSibling;p.style.maxHeight=p.style.maxHeight?null:p.scrollHeight+"px"}
function buscar(){ /* código de búsqueda */ }
</script>
</body>
</html>
