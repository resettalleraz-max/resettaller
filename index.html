<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Taller - Catálogo Oficial</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-blue: #0d6efd;
            --secondary-green: #25d366;
            --bg-dark: #121212;
            --text-light: #ffffff;
        }

        body { background-color: var(--bg-dark); font-family: 'Segoe UI', sans-serif; color: var(--text-light); }
        
        /* --- Sección de Portada (Hero) --- */
        .hero-section {
            padding: 50px 0 30px;
            text-align: center;
        }

        .hero-logo {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            border: 4px solid var(--primary-blue);
            cursor: pointer; /* Logo activo */
            object-fit: cover;
            margin-bottom: 20px;
            transition: 0.3s;
        }
        .hero-logo:hover { transform: scale(1.05); }

        .hero-title { font-size: 2.8rem; font-weight: 800; text-transform: uppercase; color: var(--primary-blue); letter-spacing: 2px; }
        .hero-subtitle { font-size: 1.2rem; font-weight: 400; opacity: 0.9; margin-bottom: 20px; text-transform: uppercase; }
        .hero-bible { font-size: 1rem; font-style: italic; opacity: 0.7; margin: 15px auto; max-width: 600px; }
        .hero-address { font-size: 0.9rem; font-weight: 300; opacity: 0.6; text-transform: uppercase; letter-spacing: 1px; }

        /* --- Botón Ver Catálogo con Fotos --- */
        .btn-catalog { background-color: var(--secondary-green); color: white; font-weight: bold; padding: 12px 30px; border-radius: 30px; border: none; font-size: 1.1rem; text-decoration: none; display: inline-flex; align-items: center; gap: 10px; transition: 0.3s; margin-top: 25px; }
        .btn-catalog:hover { background-color: #128c7e; color: white; transform: scale(1.05); box-shadow: 0 4px 15px rgba(37, 211, 102, 0.4); }

        /* --- Buscador y Inicio --- */
        .search-container { background: rgba(255,255,255,0.05); border-radius: 15px; padding: 15px; margin-bottom: 30px; }
        .search-input { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: white; border-radius: 10px; padding: 12px; }
        .search-input::placeholder { color: rgba(255,255,255,0.5); }
        .btn-home { background: var(--primary-blue); color: white; border-radius: 10px; border: none; width: 50px; height: 50px; font-size: 1.3rem; display: flex; align-items: center; justify-content: center; }
        .btn-home:hover { background: #0b5ed7; }

        /* --- Acordeón Estilo Oscuro --- */
        .accordion-item { border: none; background: rgba(255,255,255,0.03); margin-bottom: 12px; border-radius: 15px !important; overflow: hidden; }
        .accordion-button { font-weight: 700; text-transform: uppercase; color: white; padding: 20px; background: transparent; font-size: 0.95rem; }
        .accordion-button::after { filter: invert(1); } /* Flecha blanca */
        .accordion-button:not(.collapsed) { background-color: var(--primary-blue); color: white; }

        /* --- Tarjetas de Productos --- */
        .card-producto { border: none; border-radius: 12px; background: rgba(255,255,255,0.05); transition: 0.3s; margin-bottom: 15px; }
        .card-producto:hover { background: rgba(255,255,255,0.08); transform: translateY(-3px); }
        .badge-subcat { background-color: rgba(13, 110, 253, 0.15); color: var(--primary-blue); font-size: 0.7rem; font-weight: 700; padding: 5px 10px; border-radius: 6px; margin-bottom: 10px; display: inline-block; text-transform: uppercase; }
        .precio-tag { font-size: 1.4rem; color: var(--primary-blue); font-weight: 800; display: block; }
        
        .btn-ws { background-color: var(--secondary-green); color: white; font-weight: bold; border-radius: 20px; font-size: 0.85rem; padding: 8px 18px; text-decoration: none; display: inline-flex; align-items: center; gap: 8px; border: none; }
        .btn-ws:hover { background-color: #128c7e; color: white; }

        footer { background: rgba(255,255,255,0.02); color: rgba(255,255,255,0.6); padding: 40px 0; margin-top: 50px; text-align: center; }
    </style>
</head>
<body>

<div class="container hero-section">
    <img src="image.jpeg" alt="Logo Reset Taller" class="hero-logo" onclick="irAInicio()">
    <h1 class="hero-title">Reset Taller</h1>
    <p class="hero-subtitle">Servicio Técnico Profesional</p>
    
    <p class="hero-bible">
        "Mira que te mando que te esfuerces y seas valiente..."<br>
        <strong>Josué 1:9</strong>
    </p>
    
    <p class="hero-address">
        Alajuela, San Carlos, Aguas Zarcas
    </p>

    <a href="https://wa.me/50661073855?text=Hola Reset Taller, me gustaría ver el catálogo con fotos." 
       class="btn-catalog" target="_blank">
        <i class="fab fa-whatsapp"></i> VER CATÁLOGO CON FOTOS
    </a>
</div>

<div class="container my-5">
    
    <div class="search-container shadow">
        <div class="d-flex gap-2">
            <input type="text" id="searchInput" class="form-control search-input" 
                   placeholder="Busca tu modelo (ej: Huawei, Smart)..." onkeyup="filtrarCatalogo()">
            <button class="btn-home shadow-sm" onclick="irAInicio()">
                <i class="fas fa-home"></i>
            </button>
        </div>
    </div>
    
    <div class="accordion" id="catPrincipal"></div>
</div>

<footer>
    <div class="container">
        <p>&copy; 2026 Reset Taller. Especialistas en reparación de celulares.</p>
        <p class="small opacity-75">San Carlos, Costa Rica.</p>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="datos.js"></script>
<script>
    const whatsappNum = "50661073855";
    
    const categoriasBase = [
        "HUAWEI", "SAMSUNG", "IPHONE", "MOTOROLA", "XIAOMI", "HONOR", 
        "TACTIL", "RAM CARGA", "TARJETA CARGA", "FLEX PRINCIPAL", 
        "FLEX ANTENA", "TIMBRE Y MICROFONO", "AURICULAR", "FLEX AUDIO", 
        "FLEX DE ENCENDIDO", "BOTONES", "HUELLAS", "CONECTOR FPC", 
        "CARGADORES", "CUBOS", "CABLES", "CARGADOR Y SINTONIZADOR DE CARRO", 
        "AUDIFONOS", "RELOJ", "TAPAS", "CAMARA Y PORTA SIM", 
        "LENTES CAMARA", "GOMAS Y OTROS", "HERRAMIENTA Y OTROS"
    ];

    // Función para recargar todo al inicio
    function irAInicio() {
        document.getElementById('searchInput').value = ""; // Limpiar buscador
        cargarCatalogo(productos); // Recargar productos originales
    }

    // Buscador Inteligente
    function filtrarCatalogo() {
        const query = document.getElementById('searchInput').value.toUpperCase();
        
        // Filtramos la lista de productos basada en la búsqueda
        const productosFiltrados = productos.filter(p => {
            return p.modelo.toUpperCase().includes(query) || 
                   p.categoria.toUpperCase().includes(query) ||
                   (p.subcategoria && p.subcategoria.toUpperCase().includes(query));
        });

        cargarCatalogo(productosFiltrados, true); // Recargar con los filtrados
    }

    // Función principal para cargar el catálogo
    function cargarCatalogo(listaDeProductos, esBusqueda = false) {
        const contenedor = document.getElementById('catPrincipal');
        if(!contenedor) return;
        contenedor.innerHTML = ""; 

        // Solo cargamos las categorías que tengan productos filtrados
        const categoriasConFiltro = esBusqueda 
            ? [...new Set(listaDeProductos.map(p => p.categoria))] // Sacar categorías únicas
            : categoriasBase;

        categoriasConFiltro.forEach((cat, index) => {
            const idCat = "collapse" + index;
            // Filtramos los productos que pertenecen a esta categoría dentro de la lista actual
            const itemsHtmlList = listaDeProductos.filter(p => p.categoria === cat);
            
            if (itemsHtmlList.length > 0) {
                let itemsHtml = itemsHtmlList.map(p => `
                    <div class="col-12 col-md-6 mb-3">
                        <div class="card card-producto p-4 shadow-sm h-100 border-0">
                            <div class="d-flex justify-content-between align-items-start gap-3">
                                <div class="flex-grow-1">
                                    <span class="badge-subcat">${p.subcategoria || 'Repuesto'}</span>
                                    <h5 class="mb-1 fw-bold text-light" style="font-size: 1.1rem;">${p.modelo}</h5>
                                    <p class="small text-muted mb-2">Instalación incluida</p>
                                    <span class="precio-tag">₡${p.precio}</span>
                                </div>
                                <div class="text-end">
                                    <a href="https://wa.me/${whatsappNum}?text=Hola Reset Taller, me interesa cotizar: ${p.modelo} (${p.categoria}/${p.subcategoria || ''})" 
                                       target="_blank" class="btn btn-ws shadow-sm">
                                       <i class="fab fa-whatsapp"></i> Pedir
                                    </a>
                                </div>
                            </div>
                        </div>
                    </div>
                `).join('');

                const accordionClass = esBusqueda ? "show" : ""; // Si es búsqueda, abrir carpetas
                const btnClass = esBusqueda ? "" : "collapsed"; // Si es búsqueda, abrir carpetas

                contenedor.innerHTML += `
                    <div class="accordion-item shadow-sm border border-light border-opacity-10">
                        <h2 class="accordion-header">
                            <button class="accordion-button ${btnClass}" type="button" data-bs-toggle="collapse" data-bs-target="#${idCat}">
                                <i class="fas fa-tools me-3 text-primary"></i> ${cat} 
                                <span class="badge bg-white text-dark ms-auto rounded-pill px-3">${itemsHtmlList.length}</span>
                            </button>
                        </h2>
                        <div id="${idCat}" class="accordion-collapse collapse ${accordionClass}" data-bs-parent="#catPrincipal">
                            <div class="accordion-body p-3 p-md-4">
                                <div class="row">${itemsHtml}</div>
                            </div>
                        </div>
                    </div>`;
            }
        });
    }

    // Ejecutar al cargar la página por primera vez
    window.onload = irAInicio;
</script>
</body>
</html>
