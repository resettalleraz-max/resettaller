<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Taller | Inventario</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style> 
        :root { --accent: #22d3ee; --price: #4ade80; --bg: #0b1120; }
        body { background-color: var(--bg); }
        .glass { background: rgba(30, 41, 59, 0.5); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .rotate-icon { transform: rotate(135deg); color: #f87171 !important; }
        .icon-plus { transition: transform 0.3s ease; }
        .tag-repuesto { transition: all 0.2s; border: 1px solid rgba(255, 255, 255, 0.05); }
        .tag-repuesto:active { transform: scale(0.96); border-color: var(--accent); background: rgba(34, 211, 238, 0.1); }
    </style>
</head>
<body class="text-slate-200 min-h-screen pb-12 font-sans">

    <header class="p-10 text-center border-b border-white/5 bg-slate-900/20 mb-6">
        <img src="WhatsApp Image 2026-03-30 at 8.47.32 PM.jpeg" alt="Reset Taller" 
            class="w-28 h-28 mx-auto rounded-full border-4 border-[var(--accent)] mb-4 object-cover shadow-2xl">
        <h1 class="text-4xl font-black tracking-tighter text-white uppercase italic">RESET TALLER</h1>
        <p class="text-[var(--accent)] text-[10px] font-bold tracking-[0.3em] uppercase mt-1">San Carlos, Aguas Zarcas</p>
        
        <div class="mt-6 inline-flex items-center gap-3 px-5 py-2 rounded-2xl border border-green-500/30 bg-green-500/10">
            <i class="fa fa-screwdriver-wrench text-green-400 text-sm"></i>
            <p class="text-[10px] text-green-400 font-black uppercase tracking-wider">
                Precio Incluye Repuesto + Mano de Obra
            </p>
        </div>
    </header>

    <div class="px-6 mb-8">
        <div class="relative">
            <i class="fa fa-search absolute left-4 top-4 text-slate-500"></i>
            <input type="text" id="buscador" placeholder="Busca tu modelo..." 
                class="w-full bg-slate-900/80 border border-white/10 rounded-2xl py-4 pl-12 pr-4 text-sm outline-none focus:border-[var(--accent)] transition-all shadow-inner">
        </div>
    </div>

    <main id="lista-repuestos" class="px-6 space-y-4"></main>

    <script src="datos.js"></script>
    <script>
        const contenedor = document.getElementById('lista-repuestos');
        const buscador = document.getElementById('buscador');

        function renderizar(filtro = '') {
            contenedor.innerHTML = '';
            let estructura = [];
            // Aquí cargamos todas las variables que definamos en datos.js
            const listas = (typeof PANTALLAS !== 'undefined') ? PANTALLAS : [];

            let mainFolder = null;
            let subFolder = null;

            listas.forEach((item) => {
                const [tipo, valor] = item;
                if (tipo === "TITULO") {
                    mainFolder = { nombre: valor, subs: [], items: [], contador: 0 };
                    estructura.push(mainFolder);
                    subFolder = null;
                } else if (tipo === "SUBTITULO") {
                    subFolder = { nombre: valor, items: [], contador: 0 };
                    if (mainFolder) mainFolder.subs.push(subFolder);
                } else if (tipo.toLowerCase().includes(filtro.toLowerCase())) {
                    if (subFolder) { subFolder.items.push(item); subFolder.contador++; mainFolder.contador++; }
                    else if (mainFolder) { mainFolder.items.push(item); mainFolder.contador++; }
                }
            });

            estructura.forEach((main, mIdx) => {
                if (main.contador === 0 && filtro !== '') return;
                const mId = `m-${mIdx}`;
                const mDiv = document.createElement('div');
                mDiv.innerHTML = `
                    <button onclick="toggle('${mId}')" class="glass w-full p-5 rounded-2xl flex justify-between items-center mb-3 shadow-xl">
                        <span class="font-black text-lg tracking-tight uppercase italic text-white">${main.nombre}</span>
                        <div class="flex items-center gap-4">
                            <span class="text-[10px] font-bold text-[var(--accent)] bg-[var(--accent)]/10 px-2 py-1 rounded-lg">${main.contador}</span>
                            <i id="icon-${mId}" class="fa fa-plus text-slate-500 text-sm icon-plus"></i>
                        </div>
                    </button>
                    <div id="${mId}" class="hidden space-y-6 pb-8"></div>
                `;
                contenedor.appendChild(mDiv);
                const mContent = mDiv.querySelector(`#${mId}`);

                main.subs.forEach(sub => {
                    if (sub.contador === 0) return;
                    const subDiv = document.createElement('div');
                    subDiv.innerHTML = `<h3 class="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-3 px-2">${sub.nombre}</h3>
                                      <div class="grid grid-cols-2 gap-3"></div>`;
                    mContent.appendChild(subDiv);
                    sub.items.forEach(item => subDiv.querySelector('div').appendChild(crearCard(item)));
                });

                if (main.items.length > 0) {
                    const extraGrid = document.createElement('div');
                    extraGrid.className = "grid grid-cols-2 gap-3";
                    mContent.appendChild(extraGrid);
                    main.items.forEach(item => extraGrid.appendChild(crearCard(item)));
                }
            });
        }

        function crearCard(item) {
            const [nombre, precio] = item;
            const card = document.createElement('a');
            card.href = `https://wa.me/50661073855?text=Consulta por: ${nombre}`;
            card.className = `tag-repuesto glass p-4 rounded-2xl flex flex-col items-center text-center justify-between`;
            card.innerHTML = `
                <span class="text-[10px] font-bold uppercase mb-3 text-slate-300 leading-tight">${nombre}</span>
                <div class="w-full pt-3 border-t border-white/5 flex items-center justify-center gap-2">
                    <span class="text-[var(--price)] font-black text-sm tracking-tighter">${precio}</span>
                    <i class="fab fa-whatsapp text-green-500"></i>
                </div>`;
            return card;
        }

        function toggle(id) {
            document.getElementById(id).classList.toggle('hidden');
            document.getElementById(`icon-${id}`).classList.toggle('rotate-icon');
        }
        buscador.addEventListener('input', (e) => renderizar(e.target.value));
        renderizar();
    </script>
</body>
</html>
