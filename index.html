<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RESET TALLER - Catálogo Oficial</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --neon-cyan: #8899a6; /* 🩶 COLOR MUY SUAVE, GRIS-AZULADO */
            --emerald-green: #25d366; 
            --bg-color: #0a0e17; 
            --text-color: #ffffff;
            --card-bg: rgba(255,255,255,0.04);
            --border-color: rgba(136, 153, 166, 0.3);
        }
        
        /* MODO DÍA: TODO BLANCO Y BRILLANTE */
        body.modo-dia { 
            --bg-color: #f8fafc; 
            --text-color: #0f172a;
            --card-bg: #ffffff;
            --border-color: #e2e8f0;
        }

        body { background-color: var(--bg-color); font-family: 'Segoe UI', sans-serif; color: var(--text-color); padding-bottom: 90px; transition: background-color 0.5s, color 0.5s; }
        
        /* 🆕 IMAGEN DE FONDO: TEMA ELECTRÓNICA / REPARACIÓN */
        .hero-section { padding: 50px 0 30px; text-align: center; background-image: linear-gradient(rgba(0,0,0,0.85), var(--bg-color)), url('https://images.unsplash.com/photo-1558346490-a72e53ae2d4f?q=80&w=2070&auto=format&fit=crop'); background-size: cover; background-position: center; }
        
        /* 🟢 LOGO ARREGLADO AL 100% */
        .hero-logo { 
            width: 120px; 
            height: 120px; 
            border-radius: 50%; 
            border: 4px solid var(--neon-cyan); 
            box-shadow: none; /* 🚫 QUITÉ EL BRILLO */
            object-fit: cover; 
            margin-bottom: 15px; 
        }
        
        .hero-title { font-size: 3.5rem; font-weight: 900; color: var(--neon-cyan); text-shadow: none; margin: 0; }
        .hero-divider { width: 150px; height: 4px; background: var(--neon-cyan); margin: 15px auto; box-shadow: none; border-radius: 10px; }
        .hero-bible { font-size: 0.95rem; font-style: italic; opacity: 0.8; margin-bottom: 10px; }
        .hero-address { font-size: 0.8rem; opacity: 0.6; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 20px; }

        .btn-catalog { background-color: var(--emerald-green); color: white; font-weight: bold; padding: 12px 25px; border-radius: 50px; text-decoration: none; display: inline-flex; align-items: center; gap: 10px; box-shadow: 0 4px 15px rgba(37, 211, 102, 0.4); }

        .search-box { background: rgba(255,255,255,0.05); border-radius: 15px; padding: 10px; margin: 25px 0; border: 1px solid var(--border-color); }
        .btn-home { background: #0d6efd; color: white; border-radius: 10px; border: none; width: 45px; height: 45px; }

        .accordion-item { border: none; background: var(--card-bg); margin-bottom: 10px; border-radius: 15px !important; border: 1px solid var(--border-color); }
        .accordion-button { font-weight: 700; text-transform: uppercase; color: var(--text-color); background: transparent; padding: 18px; display: flex; align-items: center; width: 100%; position: relative; }
        .accordion-button:not(.collapsed) { background-color: #1e293b; color: var(--neon-cyan); }
        body.modo-dia .accordion-button:not(.collapsed) { background-color: #e2e8f0; color: #0d6efd; }

        /* 👉 NÚMEROS A LA DERECHA */
        .badge-count { 
            position: absolute; 
            right: 20px; 
            background: rgba(136, 153, 166, 0.1); 
            color: var(--neon-cyan); 
            padding: 4px 12px; 
            border-radius: 20px; 
            font-size: 0.8rem; 
            font-weight: bold; 
            border: 1px solid var(--neon-cyan); 
        }

        .card-prod { background: var(--card-bg); border-radius: 12px; padding: 15px; margin-bottom: 10px; border: 1px solid var(--border-color); }
        .precio-tag { color: var(--neon-cyan); font-weight: 800; font-size: 1.3rem; }
        .btn-ws { background-color: var(--emerald-green); color: white; border-radius: 8px; padding: 8px 15px; text-decoration: none; font-weight: bold; font-size: 0.85rem; }

        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; height: 75px; background: #0f172a; display: flex; justify-content: space-around; align-items: center; border-top: 2px solid var(--neon-cyan); z-index: 1000; }
        .nav-item { text-align: center; color: white; text-decoration: none; flex: 1; border: none; background: none; cursor: default; }
        .nav-item.clickable { cursor: pointer; }
        .nav-item i { font-size: 1.3rem; color: var(--neon-cyan); display: block; }
        .nav-item span { font-size: 0.65rem; font-weight: bold; text-transform: uppercase; color: #94a3b8; }
    </style>
</head>
<body>

<div class="container hero-section">
    <img src="WhatsApp Image 2026-03-30 at 8.47.32 PM.jpeg" class="hero-logo" onclick="location.reload()">
    <h1 class="hero-title">RESET TALLER</h1>
    <div class="hero-divider"></div>
    <p class="hero-bible">"Mira que te mando que te esfuerces y seas valiente..." - Josué 1:9</p>
    <p class="hero-address">Alajuela, San Carlos, Aguas Zarcas</p>
    <a href="https://wa.me/50661073855" class="btn-catalog" target="_blank"><i class="fab fa-whatsapp"></i> VER CATÁLOGO CON FOTOS</a>
</div>

<div class="container my-4">
    <div class="search-box d-flex gap-2">
        <input type="text" id="bus" class="form-control bg-transparent text-white border-0" placeholder="Escribí modelo (G7, P30, Pantalla)..." onkeyup="buscar()">
        <button class="btn-home" onclick="location.reload()"><i class="fas fa-home"></i></button>
    </div>
    <div class="accordion" id="mainAcc"></div>
</div>

<div class="bottom-nav">
    <div class="nav-item">
        <i class="fas fa-box-open"></i><span id="txtItems">Cargando...</span>
    </div>
    <a href="https://wa.me/50661073855" class="nav-item clickable" target="_blank">
        <i class="fab fa-whatsapp"></i><span>WhatsApp</span>
    </a>
    <div class="nav-item clickable" onclick="cambiarModo()">
        <i id="iconoModo" class="fas fa-moon"></i><span id="txtModo">Noche</span>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="datos.js"></script>
<script>
    const whatsapp = "50661073855";
    const categoriasBase = ["HUAWEI", "SAMSUNG", "IPHONE", "MOTOROLA", "XIAOMI", "HONOR", "TACTIL", "RAM CARGA", "TARJETA CARGA", "FLEX PRINCIPAL", "CARGADORES", "AUDIFONOS", "TAPAS"];

    // FUNCIÓN PARA CAMBIAR SOL / LUNA
    function cambiarModo() {
        document.body.classList.toggle('modo-dia');
        const icono = document.getElementById('iconoModo');
        const texto = document.getElementById('txtModo');

        if(document.body.classList.contains('modo-dia')) {
            icono.classList.remove('fa-moon');
            icono.classList.add('fa-sun');
            texto.innerText = "Día";
        } else {
            icono.classList.remove('fa-sun');
            icono.classList.add('fa-moon');
            texto.innerText = "Noche";
        }
    }

    function buscar() {
        const q = document.getElementById('bus').value.trim().toUpperCase();
        // BUSCADOR POTENTE: Busca en Marca, Modelo y Tipo
        const f = datos.filter(p => (`${p.categoria} ${p.modelos} ${p.subcategoria}`).toUpperCase().includes(q));
        render(f, q !== "");
    }

    function render(lista, expandir) {
        const h = document.getElementById('mainAcc');
        h.innerHTML = "";
        document.getElementById('txtItems').innerText = datos.length + " Items";

        categoriasBase.forEach((c, i) => {
            const items = lista.filter(p => p.categoria === c);
            if(items.length > 0) {
                const id = "cat" + i;
                const sinM = items.filter(p => p.subcategoria === "SIN MARCO");
                const conM = items.filter(p => p.subcategoria === "CON MARCO");
                const otros = items.filter(p => p.subcategoria !== "SIN MARCO" && p.subcategoria !== "CON MARCO");

                let subHtml = "";
                if(sinM.length > 0 || conM.length > 0) {
                    subHtml = `<div class="accordion sub-accordion">
                        ${genSub(i, "sin", "PANTALLAS SIN MARCO", sinM, expandir)}
                        ${genSub(i, "con", "PANTALLAS CON MARCO", conM, expandir)}
                        ${otros.length > 0 ? `<div class="row pt-2">${otros.map(p => card(p)).join('')}</div>` : ''}
                    </div>`;
                } else {
                    subHtml = `<div class="row">${items.map(p => card(p)).join('')}</div>`;
                }

                h.innerHTML += `
                <div class="accordion-item shadow-sm">
                    <h2 class="accordion-header">
                        <button class="accordion-button ${expandir ? '' : 'collapsed'}" type="button" data-bs-toggle="collapse" data-bs-target="#${id}">
                            <span>${c}</span>
                            <span class="badge-count">${items.length}</span>
                        </button>
                    </h2>
                    <div id="${id}" class="accordion-collapse collapse ${expandir ? 'show' : ''}" data-bs-parent="#mainAcc">
                        <div class="accordion-body">${subHtml}</div>
                    </div>
                </div>`;
            }
        });
    }

    function genSub(idx, tipo, tit, lista, exp) {
        if(lista.length === 0) return "";
        const id = `s${idx}${tipo}`;
        return `
        <div class="accordion-item border-0">
            <h2 class="accordion-header">
                <button class="accordion-button ${exp ? '' : 'collapsed'} py-2" style="font-size:0.85rem" type="button" data-bs-toggle="collapse" data-bs-target="#${id}">
                    <span>${tit}</span><span class="badge-count">${lista.length}</span>
                </button>
            </h2>
            <div id="${id}" class="accordion-collapse collapse ${exp ? 'show' : ''}">
                <div class="accordion-body bg-dark bg-opacity-25"><div class="row">${lista.map(p => card(p)).join('')}</div></div>
            </div>
        </div>`;
    }

    function card(p) {
        return `<div class="col-12 col-md-6 px-1"><div class="card-prod d-flex justify-content-between align-items-center mb-2">
            <div><div class="fw-bold" style="font-size:0.9rem; color:var(--text-color)">${p.modelos}</div><div class="precio-tag">₡${p.precios}</div></div>
            <a href="https://wa.me/${whatsapp}?text=Hola Reset Taller, consulto por: ${p.modelos}" class="btn-ws" target="_blank">PEDIR</a>
        </div></div>`;
    }

    window.onload = () => render(datos, false);
</script>
</body>
</html>
