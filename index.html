<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RESET TALLER - Catálogo Oficial</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-red: #ff3b3b;
            --primary-blue: #0d6efd;
            --secondary-green: #25d366;
            --bg-dark: #0a0e17;
        }

        body { background-color: var(--bg-dark); font-family: 'Segoe UI', sans-serif; color: white; }
        
        /* --- Portada RESET TALLER --- */
        .hero-section {
            background-image: linear-gradient(rgba(0, 0, 0, 0.8), rgba(10, 14, 23, 1)), 
                              url('https://images.unsplash.com/photo-1597733336794-12d05021d510?q=80&w=1974&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            padding: 50px 0 30px;
            text-align: center;
        }

        .hero-logo {
            width: 120px; height: 120px; border-radius: 50%; border: 4px solid var(--primary-blue);
            box-shadow: 0 0 20px rgba(13, 110, 253, 0.5); cursor: pointer; object-fit: cover; margin-bottom: 20px;
        }

        .hero-title { font-size: 3.5rem; font-weight: 900; text-transform: uppercase; color: var(--primary-red); margin: 0; letter-spacing: 2px; }
        .hero-subtitle { font-size: 1.2rem; font-weight: 500; color: white; margin-bottom: 10px; text-transform: uppercase; }
        .hero-divider { width: 100px; height: 3px; background: var(--primary-blue); margin: 10px auto; box-shadow: 0 0 10px var(--primary-blue); }
        .hero-bible { font-size: 0.95rem; font-style: italic; opacity: 0.8; margin: 15px auto; max-width: 600px; color: #cbd5e1; }
        .hero-address { font-size: 0.8rem; opacity: 0.5; text-transform: uppercase; letter-spacing: 2px; }

        .btn-catalog { background-color: var(--secondary-green); color: white; font-weight: bold; padding: 12px 25px; border-radius: 50px; text-decoration: none; display: inline-flex; align-items: center; gap: 10px; margin-top: 20px; }

        /* --- Buscador e Inicio --- */
        .search-container { background: rgba(255,255,255,0.05); border-radius: 15px; padding: 15px; margin-bottom: 30px; border: 1px solid rgba(255,255,255,0.1); }
        .search-input { background: rgba(255,255,255,0.1) !important; border: 1px solid rgba(255,255,255,0.2) !important; color: white !important; border-radius: 10px; padding: 12px; }
        .btn-home { background: var(--primary-blue); color: white; border-radius: 10px; border: none; width: 50px; height: 50px; font-size: 1.3rem; transition: 0.3s; }

        /* --- Acordeones --- */
        .accordion-item { border: none; background: rgba(255,255,255,0.02); margin-bottom: 10px; border-radius: 15px !important; overflow: hidden; }
        .accordion-button { font-weight: 700; text-transform: uppercase; color: white; padding: 18px; background: transparent; font-size: 0.9rem; }
        .accordion-button::after { filter: invert(1); }
        .accordion-button:not(.collapsed) { background-color: var(--primary-blue); color: white; }

        .badge-count { background: rgba(255,255,255,0.1); color: #fff; padding: 4px 12px; border-radius: 20px; font-size: 0.75rem; margin-left: auto; font-weight: bold; }

        /* --- Productos --- */
        .card-producto { border: none; border-radius: 12px; background: rgba(255,255,255,0.04); transition: 0.3s; margin-bottom: 10px; padding: 15px; border: 1px solid rgba(255,255,255,0.05); }
        .precio-tag { font-size: 1.3rem; color: var(--primary-blue); font-weight: 800; display: block; }
        .btn-ws { background-color: var(--secondary-green); color: white; font-weight: bold; border-radius: 15px; font-size: 0.8rem; padding: 8px 15px; text-decoration: none; border: none; }

        footer { padding: 40px 0; text-align: center; opacity: 0.5; font-size: 0.8rem; }
    </style>
</head>
<body>

<div class="container hero-section">
    <img src="WhatsApp Image 2026-03-30 at 8.47.32 PM.jpeg" class="hero-logo" onclick="location.reload()">
    <h1 class="hero-title">RESET TALLER</h1>
    <p class="hero-subtitle">Servicio Técnico Profesional</p>
    <div class="hero-divider"></div>
    <p class="hero-bible">"Mira que te mando que te esfuerces y seas valiente..."<br><strong>Josué 1:9</strong></p>
    <p class="hero-address">Alajuela, San Carlos, Aguas Zarcas</p>
    <a href="https://wa.me/50661073855" class="btn-catalog" target="_blank"><i class="fab fa-whatsapp"></i> VER CATÁLOGO CON FOTOS</a>
</div>

<div class="container my-4">
    <div class="search-container d-flex gap-2 shadow-lg">
        <input type="text" id="searchInput" class="form-control search-input" placeholder="Escribí modelo (G7, P30, Pantalla)..." onkeyup="filtrar()">
        <button class="btn-home" onclick="location.reload()" title="Inicio"><i class="fas fa-home"></i></button>
    </div>
    
    <div class="accordion" id="catPrincipal"></div>
</div>

<footer>
    <p>&copy; 2026 RESET TALLER | San Carlos, Costa Rica</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="datos.js"></script>
<script>
    const whatsappNum = "50661073855";
    const categoriasBase = ["HUAWEI", "SAMSUNG", "IPHONE", "MOTOROLA", "XIAOMI", "HONOR", "TACTIL", "RAM CARGA", "TARJETA CARGA", "FLEX PRINCIPAL", "CARGADORES", "AUDIFONOS", "TAPAS"];

    function filtrar() {
        const query = document.getElementById('searchInput').value.trim().toUpperCase();
        if (query === "") {
            render(productos, false);
            return;
        }
        const filtrados = productos.filter(p => 
            p.modelo.toUpperCase().includes(query) || 
            (p.subcategoria && p.subcategoria.toUpperCase().includes(query)) ||
            p.categoria.toUpperCase().includes(query)
        );
        render(filtrados, true); 
    }

    function render(lista, expandir) {
        const h = document.getElementById('catPrincipal');
        h.innerHTML = ""; 

        categoriasBase.forEach((cat, index) => {
            const items = lista.filter(p => p.categoria === cat);
            if (items.length > 0) {
                const id = "c" + index;
                const show = expandir ? "show" : "";
                const btn = expandir ? "" : "collapsed";

                const sinM = items.filter(p => p.subcategoria === "SIN MARCO");
                const conM = items.filter(p => p.subcategoria === "CON MARCO");
                const otros = items.filter(p => p.subcategoria !== "SIN MARCO" && p.subcategoria !== "CON MARCO");

                let subHtml = "";
                if (sinM.length > 0 || conM.length > 0) {
                    subHtml = `<div class="accordion">`;
                    if (sinM.length > 0) subHtml += subBloque(index, "SIN", "PANTALLAS SIN MARCO", sinM, expandir);
                    if (conM.length > 0) subHtml += subBloque(index, "CON", "PANTALLAS CON MARCO", conM, expandir);
                    if (otros.length > 0) subHtml += `<div class="row pt-2">${otros.map(p => card(p)).join('')}</div>`;
                    subHtml += `</div>`;
                } else {
                    subHtml = `<div class="row">${items.map(p => card(p)).join('')}</div>`;
                }

                h.innerHTML += `
                    <div class="accordion-item shadow-sm">
                        <h2 class="accordion-header">
                            <button class="accordion-button ${btn}" type="button" data-bs-toggle="collapse" data-bs-target="#${id}">
                                <span><i class="fas fa-tools me-2 text-primary"></i> ${cat}</span>
                                <span class="badge-count">${items.length}</span>
                            </button>
                        </h2>
                        <div id="${id}" class="accordion-collapse collapse ${show}" data-bs-parent="#catPrincipal">
                            <div class="accordion-body p-3">${subHtml}</div>
                        </div>
                    </div>`;
            }
        });
    }

    function subBloque(idx, tipo, tit, data, exp) {
        const id = `s${idx}${tipo}`;
        const s = exp ? "show" : "";
        const b = exp ? "" : "collapsed";
        return `
            <div class="accordion-item border-0 mb-2" style="background: rgba(255,255,255,0.05)">
                <h2 class="accordion-header">
                    <button class="accordion-button ${b} py-2" style="font-size:0.85rem" type="button" data-bs-toggle="collapse" data-bs-target="#${id}">
                        ${tit} <span class="badge-count">${data.length}</span>
                    </button>
                </h2>
                <div id="${id}" class="accordion-collapse collapse ${s}">
                    <div class="accordion-body"><div class="row">${data.map(p => card(p)).join('')}</div></div>
                </div>
            </div>`;
    }

    function card(p) {
        return `
            <div class="col-12 col-md-6 px-1">
                <div class="card-producto d-flex justify-content-between align-items-center">
                    <div>
                        <h6 class="mb-0 fw-bold" style="font-size:0.9rem; color:#e2e8f0">${p.modelo}</h6>
                        <span class="precio-tag">₡${p.precio}</span>
                    </div>
                    <a href="https://wa.me/${whatsappNum}?text=Hola Reset Taller, consulto por: ${p.modelo}" target="_blank" class="btn-ws">PEDIR</a>
                </div>
            </div>`;
    }

    window.onload = () => render(productos, false);
</script>
</body>
</html>
