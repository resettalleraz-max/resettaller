<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Taller - San Carlos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style> 
        /* Nuevo color: Celeste Mate, suave y profesional */
        :root { --tecnico: #a5f3fc; --bg-oscuro: #0f172a; --borde-oscuro: #334155; --verde-repuesto: #22c55e; }
        .rotate-icon { transform: rotate(135deg); color: #ef4444 !important; }
        .icon-plus { transition: transform 0.3s ease; }
        
        /* Estilos para el Modo Claro */
        body.modo-claro { background-color: #f8fafc; color: #1e293b; }
        .modo-claro header { background-color: #ffffff; border-bottom-color: #e2e8f0; }
        .modo-claro .tag-repuesto { background-color: #ffffff; border-color: #e2e8f0; color: #1e293b; shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); }
        .modo-claro .btn-categoria { background-color: #ffffff; border-color: #e2e8f0; color: #1e293b; shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.03); }
        .modo-claro input { background-color: #ffffff; border-color: #e2e8f0; color: #1e293b; }
        .modo-claro #icono-modo { color: #f59e0b; } /* Sol Amarillo */
        .modo-claro .btn-modo { background-color: #f1f5f9; border-color: #e2e8f0; }

        /* Brillo sutil y limpio para la foto de perfil */
        .local-glow { filter: drop-shadow(0 0 10px rgba(165, 243, 252, 0.5)); border: 3px solid var(--tecnico); }
        
        /* Efecto de Etiqueta */
        .tag-repuesto { 
            background: rgba(30, 41, 59, 0.6);
            border: 1px solid rgba(51, 65, 85, 0.5);
            transition: all 0.2s;
        }
        .tag-repuesto:active { transform: scale(0.95); border-color: var(--verde-repuesto); }
    </style>
</head>
<body id="cuerpo" class="bg-[#0b1120] text-white min-h-screen pb-10 transition-colors duration-500 font-sans">

    <header class="relative p-10 text-center border-b border-slate-800 mb-6 rounded-b-[3rem] shadow-2xl overflow-hidden bg-[#0f172a]/80">
        
        <button onclick="cambiarModo()" class="btn-modo absolute top-6 right-6 z-20 bg-slate-800 p-3 rounded-full border border-slate-700 hover:scale-110 transition active:scale-90">
            <i id="icono-modo" class="fa fa-moon text-lg text-slate-400"></i>
        </button>

        <div class="relative z-10">
            <img src="WhatsApp Image 2026-03-30 at 8.47.32 PM.jpeg" alt="Reset Taller" 
                class="w-32 h-32 mx-auto rounded-full local-glow mb-5 object-cover shadow-2xl">
            
            <h1 class="text-4xl font-black italic text-[var(--tecnico)] uppercase tracking-tighter drop-shadow-md">RESET TALLER</h1>
            <p class="text-slate-400 text-[10px] font-bold tracking-[0.3em] uppercase mt-1">San Carlos, Aguas Zarcas</p>
            <div class="w-24 h-1 bg-gradient-to-r from-transparent via-[var(--tecnico)] to-transparent mx-auto mt-4 rounded-full shadow-[0_0_10px_rgba(165,243,252,0.4)]"></div>
        </div>
    </header>

    <div class="px-4 mb-6">
        <div class="relative mb-2 group">
            <i class="fa fa-search absolute left-4 top-3.5 text-slate-600 group-focus-within:text-[var(--tecnico)] transition-colors"></i>
            <input type="text" id="buscador" placeholder="Busca tu repuesto..." 
                class="w-full bg-[#0f172a] border border-slate-800 rounded-xl py-3.5 pl-11 pr-4 text-sm outline-none focus:border-[var(--tecnico)] transition-all shadow-inner">
        </div>
        <div class="text-right px-1">
            <span id="contador-items" class="text-[9px] font-black text-slate-500 bg-slate-800/50 px-3 py-1.5 rounded-full border border-slate-700 uppercase tracking-widest">0 Total Repuestos</span>
        </div>
    </div>

    <main id="lista-repuestos" class="px-4 space-y-4"></main>

    <script src="datos.js"></script>
    <script>
        const contenedor = document.getElementById('lista-repuestos');
        const buscador = document.getElementById('buscador');
        const cuerpo = document.body;
        const iconoModo = document.getElementById('icono-modo');

        function cambiarModo() {
            cuerpo.classList.toggle('modo-claro');
            const esClaro = cuerpo.classList.contains('modo-claro');
            iconoModo.className = esClaro ? 'fa fa-sun text-lg' : 'fa fa-moon text-lg';
            renderizar(buscador.value);
        }

        // ICONOS AUTOMÁTICOS POR MARCA
        function getIcono(nombre) {
            const n = nombre.toUpperCase();
            if (n.includes("IPHONE")) return '<i class="fab fa-apple"></i>';
            if (n.includes("SAMSUNG")) return '<i class="fa fa-mobile-screen-button"></i>';
            if (n.includes("HUAWEI")) return '<i class="fa fa-microchip"></i>';
            if (n.includes("XIAOMI")) return '<i class="fa fa-bolt-lightning"></i>';
            if (n.includes("MOTOROLA") || n.includes("MOTO ")) return '<i class="fa fa-m"></i>';
            if (n.includes("HONOR")) return '<i class="fa fa-medal"></i>';
            if (n.includes("BATER")) return '<i class="fa fa-battery-three-quarters"></i>';
            if (n.includes("FLEX") || n.includes("PIN ")) return '<i class="fa fa-usb"></i>';
            if (n.includes("TAPA")) return '<i class="fa fa-clone"></i>';
            if (n.includes("TABLET")) return '<i class="fa fa-tablet-screen-button"></i>';
            if (n.includes("INSUMO") || n.includes("HERRAMIENTA")) return '<i class="fa fa-screwdriver-wrench"></i>';
            if (n.includes("ACCESORIO") || n.includes("CARGA")) return '<i class="fa fa-headset"></i>';
            if (n.includes("WATCH") || n.includes("RELOJ")) return '<i class="fa fa-clock"></i>';
            if (n.includes("SERVICIOS")) return '<i class="fa fa-gears"></i>';
            return '<i class="fa fa-folder-open"></i>';
        }

        function renderizar(filtro = '') {
            contenedor.innerHTML = '';
            let totalGeneral = 0;
            let estructura = [];
            const todasLasListas = [...PANTALLAS];
            if (typeof HERRAMIENTAS !== 'undefined') todasLasListas.push(...HERRAMIENTAS);

            let mainFolder = null;
            let subFolder = null;

            todasLasListas.forEach((item) => {
                const [tipo, valor] = item;
                if (tipo === "TITULO") {
                    mainFolder = { nombre: valor, subs: [], items: [], contador: 0 };
                    estructura.push(mainFolder);
                    subFolder = null;
                } else if (tipo === "SUBTITULO") {
                    subFolder = { nombre: valor, items: [], contador: 0 };
                    if (mainFolder) mainFolder.subs.push(subFolder);
                } else {
                    if (tipo.toLowerCase().includes(filtro.toLowerCase())) {
                        totalGeneral++;
                        if (subFolder) {
                            subFolder.items.push(item);
                            subFolder.contador++;
                            mainFolder.contador++;
                        } else if (mainFolder) {
                            mainFolder.items.push(item);
                            mainFolder.contador++;
                        }
                    }
                }
            });

            const esClaro = cuerpo.classList.contains('modo-claro');

            estructura.forEach((main, mIdx) => {
                if (main.contador === 0 && filtro !== '') return;
                const mId = `m-${mIdx}`;
                const mDiv = document.createElement('div');
                mDiv.innerHTML = `
                    <button onclick="toggle('${mId}')" class="btn-categoria w-full ${esClaro ? 'bg-white border-slate-200 text-slate-800' : 'bg-[#0f172a] border-slate-800 text-slate-100'} p-4 rounded-2xl flex justify-between items-center mb-2.5 shadow-lg transition-colors hover:border-slate-700 active:scale-95">
                        <div class="flex items-center gap-3.5">
                            <span class="text-[var(--tecnico)] text-2xl drop-shadow-[0_0_5px_rgba(165,243,252,0.3)]">${getIcono(main.nombre)}</span>
                            <span class="font-black uppercase text-lg tracking-tighter italic">${main.nombre}</span>
                        </div>
                        <div class="flex items-center gap-4">
                            <span class="text-[var(--tecnico)] font-black text-sm">${main.contador}</span>
                            <i id="icon-${mId}" class="fa fa-plus text-slate-600 text-base icon-plus"></i>
                        </div>
                    </button>
                    <div id="${mId}" class="hidden mt-3 grid grid-cols-2 gap-2.5 pb-6"></div>
                `;
                contenedor.appendChild(mDiv);
                const mContent = mDiv.querySelector(`#${mId}`);

                // Renderizado de las Etiquetas (Grid)
                const todosLosItems = [];
                main.subs.forEach(sub => sub.items.forEach(i => todosLosItems.push(i)));
                main.items.forEach(i => { if (!todosLosItems.includes(i)) todosLosItems.push(i); });

                todosLosItems.forEach(repuesto => {
                    const [nombre, precio] = repuesto;
                    const card = document.createElement('a');
                    card.href = `https://wa.me/50661073855?text=Consulta: ${nombre}`;
                    card.className = `tag-repuesto p-4 rounded-xl flex flex-col items-center text-center justify-between shadow-sm transition active:scale-95`;
                    card.innerHTML = `
                        <span class="text-[10px] font-bold uppercase mb-2 opacity-90 leading-tight">${nombre}</span>
                        <div class="flex items-center gap-3">
                            <span class="text-[var(--verde-repuesto)] font-black text-xs tracking-tight">${precio}</span>
                            <i class="fab fa-whatsapp text-green-500 text-sm"></i>
                        </div>
                    `;
                    mContent.appendChild(card);
                });
            });
            document.getElementById('contador-items').innerText = `${totalGeneral} TOTAL REPUESTOS`;
        }

        // Función toggle actualizada (Gira la crucita + a equis x)
        function toggle(id) {
            document.getElementById(id).classList.toggle('hidden');
            document.getElementById(`icon-${id}`).classList.toggle('rotate-icon');
        }
        buscador.addEventListener('input', (e) => renderizar(e.target.value));
        renderizar();
    </script>
</body>
</html>
