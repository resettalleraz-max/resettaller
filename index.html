<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Taller - Catálogo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-900 text-white font-sans min-h-screen pb-20">

    <header class="p-6 text-center">
        <h1 class="text-3xl font-black italic text-orange-500 tracking-tighter uppercase">RESET TALLER</h1>
        <p class="text-blue-400 text-[10px] font-bold tracking-[0.3em] uppercase">Expertos en Microelectrónica</p>
    </header>

    <div class="px-4 mb-6">
        <div class="relative">
            <i class="fa fa-search absolute left-4 top-3.5 text-slate-500"></i>
            <input type="text" id="buscador" placeholder="¿Qué modelo buscás?..." 
                class="w-full bg-slate-800 border-none rounded-2xl py-3 pl-12 pr-4 text-sm focus:ring-2 focus:ring-orange-500 outline-none">
        </div>
    </div>

    <main id="lista-repuestos" class="px-4 space-y-3"></main>

    <nav class="fixed bottom-0 left-0 right-0 bg-slate-800/95 backdrop-blur border-t border-slate-700 flex justify-around py-3 text-[10px] font-bold uppercase text-slate-400">
        <div class="text-center text-orange-500">
            <i class="fa fa-box text-lg mb-1"></i><br>
            <span id="contador-items">0 Items</span>
        </div>
        <a href="https://wa.me/50661073855" class="text-center">
            <i class="fab fa-whatsapp text-lg mb-1"></i><br>Consultas
        </a>
        <div class="text-center">
            <i class="fa fa-tools text-lg mb-1"></i><br>Reset Taller
        </div>
    </nav>

    <script src="datos.js"></script>
    <script>
        const contenedor = document.getElementById('lista-repuestos');
        const buscador = document.getElementById('buscador');

        function renderizar(filtro = '') {
            contenedor.innerHTML = '';
            let total = 0;
            let currentFolder = null;

            PANTALLAS.forEach((item, index) => {
                const [nombre, precio] = item;

                if (nombre === "TITULO") {
                    const id = `f-${index}`;
                    const folder = document.createElement('div');
                    folder.innerHTML = `
                        <button onclick="document.getElementById('${id}').classList.toggle('hidden')" class="w-full bg-slate-800 p-4 rounded-2xl flex justify-between items-center mb-2 border-l-4 border-orange-500">
                            <span class="font-black text-slate-200 uppercase tracking-wide text-sm">${precio}</span>
                            <i class="fa fa-chevron-down text-slate-500"></i>
                        </button>
                        <div id="${id}" class="hidden space-y-2 mb-4"></div>
                    `;
                    contenedor.appendChild(folder);
                    currentFolder = folder.querySelector(`#${id}`);
                } else {
                    if (nombre.toLowerCase().includes(filtro.toLowerCase())) {
                        total++;
                        const card = document.createElement('div');
                        card.className = "bg-slate-800/40 p-3 rounded-xl flex justify-between items-center border border-slate-700/50 mx-1";
                        card.innerHTML = `
                            <span class="text-xs font-semibold text-slate-300 uppercase">${nombre}</span>
                            <div class="flex items-center gap-3">
                                <span class="text-orange-500 font-black text-sm">${precio}</span>
                                <a href="https://wa.me/50661073855?text=Hola, consulto por: ${nombre.replace(/<[^>]*>?/gm, '')}" class="bg-green-600 p-2 rounded-lg"><i class="fab fa-whatsapp"></i></a>
                            </div>
                        `;
                        currentFolder.appendChild(card);
                    }
                }
            });
            document.getElementById('contador-items').innerText = `${total} Items`;
        }
        buscador.addEventListener('input', (e) => renderizar(e.target.value));
        renderizar();
    </script>
</body>
</html>
