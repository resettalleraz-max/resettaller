<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Taller</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style> 
        .rotate-180 { transform: rotate(180deg); } 
        :root { --tecnico: #38bdf8; }
        .modo-claro { background-color: #f1f5f9; color: #1e293b; }
        .btn-brand:active { transform: scale(0.97); }
        .float-btn { position: fixed; bottom: 20px; z-index: 100; transition: all 0.3s; }
        .float-whatsapp { right: 20px; background-color: #22c55e; color: white; width: 55px; height: 55px; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.4); }
        .float-modo { left: 20px; background-color: #334155; color: white; width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; opacity: 0.8; }
        /* Brillo y borde para la foto de portada */
        .local-glow { filter: drop-shadow(0 0 15px rgba(56, 189, 248, 0.6)); border: 4px solid var(--tecnico); }
    </style>
</head>
<body id="cuerpo" class="bg-slate-950 text-white min-h-screen pb-10 transition-colors duration-300 font-sans">

    <header class="relative p-10 text-center border-b border-slate-800 mb-6 rounded-b-[3.5rem] shadow-2xl overflow-hidden bg-slate-900/40">
        <div class="relative z-10">
            <img src="WhatsApp Image 2026-03-30 at 8.47.32 PM.jpeg" alt="Reset Taller" 
                class="w-36 h-36 mx-auto rounded-full local-glow mb-5 object-cover shadow-2xl">
            
            <h1 class="text-4xl font-black italic text-[var(--tecnico)] uppercase tracking-tighter drop-shadow-lg">RESET TALLER</h1>
            <p class="text-slate-400 text-[10px] font-bold tracking-[0.3em] uppercase mt-1">Servicio Técnico Profesional</p>
            <div class="w-24 h-1 bg-gradient-to-r from-transparent via-[var(--tecnico)] to-transparent mx-auto mt-4 rounded-full shadow-[0_0_15px_#38bdf8]"></div>
        </div>
    </header>

    <div class="px-4 mb-6">
        <div class="relative mb-2 group">
            <i class="fa fa-search absolute left-4 top-3.5 text-slate-500 group-focus-within:text-[var(--tecnico)] transition-colors"></i>
            <input type="text" id="buscador" placeholder="Busca modelo, marca o repuesto..." 
                class="w-full bg-slate-900 border border-slate-800 rounded-xl py-3.5 pl-11 pr-4 text-sm outline-none focus:border-[var(--tecnico)] transition-all shadow-inner">
        </div>
        <div class="text-right px-1">
            <span id="contador-items" class="text-[9px] font-black text-[var(--tecnico)] bg-[var(--tecnico)]/10 px-3 py-1.5 rounded-full border border-[var(--tecnico)]/20 uppercase tracking-widest">0 TOTAL REPUESTOS</span>
        </div>
    </div>

    <main id="lista-repuestos" class="px-4 space-y-4"></main>

    <button onclick="cambiarModo()" class="float-btn float-modo shadow-xl active:scale-90 transition">
        <i id="icono-modo" class="fa fa-moon text-xl"></i>
    </button>

    <a href="https://wa.me/50661073855" class="float-btn float-whatsapp shadow-2xl animate-bounce">
        <i class="fab fa-whatsapp text-3xl"></i>
    </a>

    <script src="datos.js"></script>
    <script>
        const contenedor = document.getElementById('lista-repuestos');
        const buscador = document.getElementById('buscador');
        const cuerpo = document.getElementById('cuerpo');
        const iconoModo = document.getElementById('icono-modo');

        function cambiarModo() {
            cuerpo.classList.toggle('modo-claro');
            const esClaro = cuerpo.classList.contains('modo-claro');
            iconoModo.className = esClaro ? 'fa fa-sun text-xl' : 'fa fa-moon text-xl';
            renderizar(buscador.value);
        }

        // ICONOS AUTOMÁTICOS POR PALABRA CLAVE
        function getIcono(nombre) {
            const n = nombre.toUpperCase();
            if (n.includes("IPHONE")) return '<i class="fab fa-apple"></i>';
            if (n.includes("SAMSUNG")) return '<i class="fa fa-mobile-screen-button"></i>';
            if (n.includes("HUAWEI")) return '<i class="fa fa-microchip"></i>';
            if (n.includes("XIAOMI")) return '<i class="fa fa-bolt-lightning"></i>';
            if (n.includes("MOTOROLA") || n.includes("MOTO ")) return '<i class="fa fa-m"></i>';
            if (n.includes("HONOR")) return '<i class="fa fa-medal"></i>';
            if (n.includes("BATER")) return '<i class="fa fa-battery-three-quarters"></i>';
            if (n.includes("FLEX") || n.includes("PIN ")) return '<i class="fa fa-usb"></i>';
            if (n.includes("TAPA")) return '<i class="fa fa-clone"></i>';
            if (n.includes("TABLET")) return '<i class="fa fa-tablet-screen-button"></i>';
            if (n.includes("INSUMO") || n.includes("HERRAMIENTA")) return '<i class="fa fa-screwdriver-wrench"></i>';
            if (n.includes("ACCESORIO") || n.includes("CARGA")) return '<i class="fa fa-headset"></i>';
            if (n.includes("WATCH") || n.includes("RELOJ")) return '<i class="fa fa-clock"></i>';
            return '<i class="fa fa-folder-open"></i>';
        }

        function renderizar(filtro = '') {
            contenedor.innerHTML = '';
            let totalGeneral = 0;
            let estructura = [];
            const todasLasListas = [...PANTALLAS];
            if (typeof HERRAMIENTAS !== 'undefined') todasLasListas.push(...HERRAMIENTAS);

            let mainFolder = null;
            let subFolder = null;

            todasLasListas.forEach((item) => {
                const [tipo, valor] = item;
                if (tipo === "TITULO") {
                    mainFolder = { nombre: valor, subs: [], items: [], contador: 0 };
                    estructura.push(mainFolder);
                    subFolder = null;
                } else if (tipo === "SUBTITULO") {
                    subFolder = { nombre: valor, items: [], contador: 0 };
                    if (mainFolder) mainFolder.subs.push(subFolder);
                } else {
                    if (tipo.toLowerCase().includes(filtro.toLowerCase())) {
                        totalGeneral++;
                        if (subFolder) {
                            subFolder.items.push(item);
                            subFolder.contador++;
                            mainFolder.contador++;
                        } else if (mainFolder) {
                            mainFolder.items.push(item);
                            mainFolder.contador++;
                        }
                    }
                }
            });

            const esClaro = cuerpo.classList.contains('modo-claro');

            estructura.forEach((main, mIdx) => {
                if (main.contador === 0 && filtro !== '') return;
                const mId = `m-${mIdx}`;
                const mDiv = document.createElement('div');
                mDiv.innerHTML = `
                    <button onclick="toggle('${mId}')" class="btn-brand w-full bg-slate-900 border border-slate-800 p-4.5 rounded-2xl flex justify-between items-center mb-2.5 shadow-lg">
                        <div class="flex items-center gap-3.5">
                            <span class="text-[var(--tecnico)] text-2xl">${getIcono(main.nombre)}</span>
                            <span class="font-black uppercase text-slate-100 text-lg tracking-tight">${main.nombre}</span>
                        </div>
                        <div class="flex items-center gap-4">
                            <span class="text-[var(--tecnico)] font-black text-sm">${main.contador}</span>
                            <i id="icon-${mId}" class="fa fa-chevron-down text-slate-600 text-xs transition-transform"></i>
                        </div>
                    </button>
                    <div id="${mId}" class="hidden space-y-2 mb-5 px-1"></div>
                `;
                contenedor.appendChild(mDiv);
                const mContent = mDiv.querySelector(`#${mId}`);

                main.subs.forEach((sub, sIdx) => {
                    if (sub.contador === 0 && filtro !== '') return;
                    const sId = `s-${mIdx}-${sIdx}`;
                    const sDiv = document.createElement('div');
                    sDiv.innerHTML = `
                        <button onclick="toggle('${sId}')" class="w-full ${esClaro ? 'bg-slate-200' : 'bg-slate-800/40'} p-2.5 rounded-xl flex justify-between items-center mb-1.5 border ${esClaro ? 'border-slate-300' : 'border-slate-700/50'}">
                            <span class="font-bold text-[10px] uppercase text-slate-400 tracking-wider">${sub.nombre}</span>
                            <span class="text-[var(--tecnico)] font-bold text-[10px] bg-[var(--tecnico)]/10 px-2 py-0.5 rounded">${sub.contador}</span>
                        </button>
                        <div id="${sId}" class="hidden space-y-1 mt-1 ml-3 border-l-2 border-slate-800 pl-4"></div>
                    `;
                    mContent.appendChild(sDiv);
                    const sContent = sDiv.querySelector(`#${sId}`);
                    sub.items.forEach(repuesto => sContent.appendChild(crearCard(repuesto, esClaro)));
                });

                main.items.forEach(repuesto => {
                    if (!main.subs.some(s => s.items.includes(repuesto))) {
                        mContent.appendChild(crearCard(repuesto, esClaro));
                    }
                });
            });
            document.getElementById('contador-items').innerText = `${totalGeneral} TOTAL REPUESTOS`;
        }

        function crearCard(item, esClaro) {
            const [tipo, valor] = item;
            const card = document.createElement('div');
            card.className = `${esClaro ? 'bg-white border-slate-200' : 'bg-slate-900/40 border-slate-800'} p-4 rounded-xl flex justify-between items-center border mx-1 shadow-sm transition-all`;
            card.innerHTML = `
                <span class="text-[11px] font-bold ${esClaro ? 'text-slate-700' : 'text-slate-200'} uppercase">${tipo}</span>
                <div class="flex items-center gap-4">
                    <span class="text-[var(--tecnico)] font-black text-sm tracking-tight">${valor}</span>
                    <a href="https://wa.me/50661073855?text=Consulta: ${tipo}" class="text-green-500 hover:scale-110 transition"><i class="fab fa-whatsapp text-xl"></i></a>
                </div>`;
            return card;
        }

        function toggle(id) {
            document.getElementById(id).classList.toggle('hidden');
            document.getElementById(`icon-${id}`).classList.toggle('rotate-180');
        }
        buscador.addEventListener('input', (e) => renderizar(e.target.value));
        renderizar();
    </script>
</body>
</html>
