<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RESET TALLER - Catálogo Oficial</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0a0f18; --card: #161e2d; --neon: #38bdf8; --green: #22c55e; --text: #f8fafc; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 10px; line-height: 1.4; }
        .header { text-align: center; padding: 25px 15px; background: #111827; border-bottom: 4px solid var(--neon); border-radius: 0 0 25px 25px; margin-bottom: 10px; }
        .logo-img { width: 115px; height: 115px; border-radius: 50%; border: 3px solid var(--neon); margin: 0 auto 10px; display: block; object-fit: cover; box-shadow: 0 0 20px rgba(56, 189, 248, 0.3); }
        .aviso-importante { background: rgba(34, 197, 94, 0.15); border: 2px solid var(--green); color: var(--green); padding: 12px; border-radius: 12px; font-size: 0.85em; margin: 10px 0 20px 0; text-align: center; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
        #buscador { width: 100%; padding: 15px; border-radius: 30px; border: 2px solid var(--neon); margin-bottom: 20px; box-sizing: border-box; font-weight: 600; outline: none; background: #fff; color: #000; font-size: 16px; }
        .acordeon { background: var(--card); color: var(--neon); cursor: pointer; padding: 18px; width: 100%; border: 1px solid rgba(56,189,248,0.2); text-align: left; font-size: 1em; font-weight: 700; border-radius: 12px; margin-top: 10px; display: flex; justify-content: space-between; align-items: center; outline: none; }
        .panel { padding: 0 5px; max-height: 0; overflow: hidden; transition: max-height 0.3s ease-out; background: #0d1421; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; padding: 15px 5px; }
        .caja { background: var(--card); padding: 12px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.05); text-align: center; display: flex; flex-direction: column; justify-content: space-between; }
        .caja h3 { font-size: 0.75em; margin: 0; text-transform: uppercase; min-height: 35px; color: #cbd5e1; }
        .precio { color: var(--green); font-size: 1.25em; font-weight: 800; margin: 8px 0; display: block; }
        .btn-wa { background: var(--green); color: #000; text-decoration: none; padding: 10px; border-radius: 8px; font-weight: 700; text-transform: uppercase; font-size: 0.75em; }
        .acordeon:after { content: '\002B'; font-size: 1.4em; } .active:after { content: "\2212"; }
        .badge { background: #ffd700; color: #000; font-size: 0.65em; padding: 2px 5px; border-radius: 4px; margin-left: 4px; font-weight: 900; }
    </style>
</head>
<body>
    <div class="header">
        <img src="WhatsApp Image 2026-03-30 at 8.47.32 PM.jpeg" class="logo-img" alt="Reset Taller Logo">
        <h1>RESET TALLER</h1>
        <p>Aguas Zarcas, San Carlos | 6107-3855</p>
    </div>

    <div class="aviso-importante">
        ✅ PRECIOS INCLUYEN REPUESTO E INSTALACIÓN
    </div>

    <input type="text" id="buscador" onkeyup="buscar()" placeholder="🔍 BUSCAR MODELO (EJ: A54, Y9, P30)...">

    <h2 style="color:var(--green); margin: 20px 10px 10px 10px; font-size: 1.2em; border-left: 4px solid var(--green); padding-left: 10px;">SAMSUNG</h2>
    <button class="acordeon" onclick="toggle(this)">SAMSUNG: SOLO PANTALLAS (29)</button>
    <div class="panel"><div class="grid" id="s-s"></div></div>
    <button class="acordeon" onclick="toggle(this)">SAMSUNG: CON MARCO (70)</button>
    <div class="panel"><div class="grid" id="s-m"></div></div>

    <button class="acordeon" onclick="toggle(this)">HUAWEI: SOLO PANTALLAS (37)</button>
    <div class="panel"><div class="grid" id="h-s"></div></div>
    <button class="acordeon" onclick="toggle(this)">HUAWEI: CON MARCO (16)</button>
    <div class="panel"><div class="grid" id="h-m"></div></div>

    <script>

        const huaMarco = [["P SMART","24,000"],["P SMART 2019","25,000"],["P20 LITE","26,000"],["P30 LITE","30,000"],["P40 LITE","30,000"],["Y6 PRIME 2019","24,000"],["Y7 2018","24,000"],["Y7 PRIME 2019","25,000"],["Y7P","28,500"],["Y8S","30,000"],["Y9 2019","30,000"],["Y9 PRIME 2019","32,000"],["Y9S","36,000"],["Y9A","38,000"],["MATE 20 LITE","32,000"],["NOVA 5T","32,000"]];

        function fill(data, id) {
            const container = document.getElementById(id);
            data.forEach(item => {
                container.innerHTML += `<div class="caja producto"><h3>${item[0]}</h3><span class="precio">₡${item[1]}</span><a href="https://wa.me/50661073855?text=Hola,+consulto+por+instalar+${item[0].replace(/ /g,'+')}" class="btn-wa">INSTALAR</a></div>`;
            });
        }
        fill(samSolo, 's-s'); fill(samMarco, 's-m'); fill(huaSolo, 'h-s'); fill(huaMarco, 'h-m');

        function toggle(btn) {
            btn.classList.toggle("active");
            const panel = btn.nextElementSibling;
            panel.style.maxHeight = panel.style.maxHeight ? null : panel.scrollHeight + "px";
        }

        function buscar() {
            const input = document.getElementById('buscador').value.toLowerCase();
            const prods = document.getElementsByClassName('producto');
            for (let i = 0; i < prods.length; i++) {
                const match = prods[i].innerText.toLowerCase().includes(input);
                prods[i].style.display = match ? "flex" : "none";
                if(input !== "" && match) { 
                    const panel = prods[i].parentElement.parentElement;
                    panel.style.maxHeight = "none";
                    panel.previousElementSibling.classList.add("active");
                }
            }
        }
    </script>
</body>
</html>
