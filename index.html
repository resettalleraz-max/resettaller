<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RESET TALLER</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg: #0a1118; --card: #161e2d; --neon: #38bdf8; 
            --green: #22c55e; --text: #f8fafc; --gold: #eab308; 
        }
        .light-mode { 
            --bg: #f1f5f9; --card: #ffffff; --neon: #0284c7; 
            --text: #1e293b; --green: #16a34a; 
        }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; transition: 0.3s; }
        
        /* BOTÓN MODO NOCHE */
        .theme-toggle { position: fixed; top: 20px; right: 20px; background: var(--card); border: 2px solid var(--neon); color: var(--neon); padding: 10px; border-radius: 50%; cursor: pointer; z-index: 1000; font-size: 1.2em; box-shadow: 0 0 10px rgba(0,0,0,0.3); }

        .header { text-align: center; padding: 30px 10px; border-bottom: 4px solid var(--neon); border-radius: 0 0 25px 25px; margin-bottom: 25px; background: var(--card); box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
        .logo-img { width: 90px; height: 90px; border-radius: 50%; border: 3px solid var(--neon); margin-bottom: 10px; object-fit: cover; }
        h1 { margin: 5px 0; font-size: 1.6em; letter-spacing: 2px; font-weight: 800; }

        #buscador { width: 100%; max-width: 500px; padding: 15px 20px; border-radius: 30px; border: 2px solid var(--neon); background: var(--card); color: var(--text); margin: 10px auto 25px auto; display: block; outline: none; box-sizing: border-box; font-weight: 600; }

        .acordeon { background: var(--card); color: var(--neon); cursor: pointer; padding: 20px; width: 100%; max-width: 600px; border: 1px solid rgba(56,189,248,0.3); text-align: left; font-weight: 700; border-radius: 15px; margin: 12px auto; display: flex; justify-content: space-between; align-items: center; transition: 0.3s; font-size: 1.1em; }
        
        .panel { max-width: 600px; margin: 0 auto; max-height: 0; overflow: hidden; transition: max-height 0.3s ease-out; background: rgba(0,0,0,0.05); border-radius: 0 0 15px 15px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; padding: 20px 10px; }
        
        .caja { background: var(--card); padding: 15px; border-radius: 18px; text-align: center; border: 1px solid rgba(0,0,0,0.1); display: flex; flex-direction: column; height: 100%; box-sizing: border-box; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .caja h3 { font-size: 0.8em; margin: 0; min-height: 35px; text-transform: uppercase; }
        .precio { color: var(--green); font-size: 1.2em; font-weight: 800; margin: 10px 0; display: block; }
        .btn-wa { background: var(--green); color: #fff; text-decoration: none; padding: 8px; border-radius: 8px; font-size: 0.75em; font-weight: 700; display: block; text-transform: uppercase; }
        
        .badge-count { background: var(--neon); color: #fff; font-size: 0.8em; padding: 2px 12px; border-radius: 20px; font-weight: 800; }
        .separador-marca { grid-column: 1 / -1; background: rgba(56,189,248,0.1); color: var(--neon); padding: 8px; font-weight: 800; font-size: 0.85em; margin: 10px 0; text-align: center; border-radius: 8px; border-left: 4px solid var(--neon); }
    </style>
</head>
<body>

<button class="theme-toggle" onclick="toggleTheme()">🌓</button>

<div class="header">
    <img src="WhatsApp Image 2026-03-30 at 8.47.32 PM.jpeg" class="logo-img">
    <h1>RESET TALLER</h1>
    <p>📲 6107-3855</p>
</div>

<input type="text" id="buscador" onkeyup="buscar()" placeholder="🔍 Buscar modelo...">

<button class="acordeon" onclick="toggle(this)">📱 PANTALLAS <span id="count-pantallas" class="badge-count">0</span></button>
<div class="panel"><div class="grid" id="pantallas"></div></div>

<button class="acordeon" onclick="toggle(this)">🔌 CARGA Y FLEX <span id="count-flex" class="badge-count">0</span></button>
<div class="panel"><div class="grid" id="flex"></div></div>

<button class="acordeon" onclick="toggle(this)">🛠️ HERRAMIENTAS <span id="count-herramientas" class="badge-count">0</span></button>
<div class="panel"><div class="grid" id="herramientas"></div></div>

<script src="datos.js"></script>
<script>
    function toggleTheme() { document.body.classList.toggle('light-mode'); }

    const render = (lista, contenedorId, contadorId) => {
        const cont = document.getElementById(contenedorId);
        const badge = document.getElementById(contadorId);
        if (!cont || !lista) return;
        let html = ''; let total = 0;
        lista.forEach(p => {
            if (p[0] === "TITULO") html += `<div class="separador-marca">${p[1]}</div>`;
            else {
                total++;
                let oro = (p[0].toUpperCase().includes("ORIGINAL") || p[0].toUpperCase().includes("SOFT")) ? 'style="color:var(--gold)"' : '';
                html += `<div class="caja"><h3 ${oro}>${p[0]}</h3><span class="precio">${p[1]}</span><a href="https://wa.me/50661073855?text=Consulta+por+${p[0]}" class="btn-wa">Pedir</a></div>`;
            }
        });
        cont.innerHTML = html;
        if (badge) badge.innerText = total;
    };

    render(PANTALLAS, 'pantallas', 'count-pantallas');
    render(FLEX, 'flex', 'count-flex');
    render(HERRAMIENTAS, 'herramientas', 'count-herramientas');

    function toggle(b) {
        let p = b.nextElementSibling;
        p.style.maxHeight = p.style.maxHeight ? null : p.scrollHeight + "px";
    }

    function buscar() {
        let v = document.getElementById('buscador').value.toLowerCase();
        let c = document.getElementsByClassName('caja');
        for (let i = 0; i < c.length; i++) {
            c[i].style.display = c[i].innerText.toLowerCase().includes(v) ? "flex" : "none";
        }
    }
</script>
</body>
</html>
