<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Taller | Inventario Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style> 
        :root { --accent: #22d3ee; --price: #4ade80; --bg: #0b1120; }
        body { background-color: var(--bg); transition: background-color 0.4s; }
        
        /* MODO DÍA */
        body.light { background-color: #f1f5f9; color: #1e293b; }
        body.light .glass { background: white; border-color: #e2e8f0; color: #1e293b; }
        body.light .btn-categoria { background: white; color: #0f172a; border-color: #cbd5e1; }

        /* ESTILO PORTADA TIPO FACEBOOK */
        .portada-contenedor {
            position: relative;
            height: 250px;
            background-image: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.7)), url('https://images.unsplash.com/photo-1597733336794-12d05021d510?q=80&w=1000&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            border-radius: 0 0 2.5rem 2.5rem;
        }

        .perfil-posicion {
            position: absolute;
            bottom: -50px;
            left: 20px;
            display: flex;
            align-items: flex-end;
            gap: 15px;
            text-align: left;
        }

        .img-perfil {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            border: 4px solid var(--bg);
            object-fit: cover;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }

        .glass { background: rgba(30, 41, 59, 0.6); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .rotate-icon { transform: rotate(135deg); color: #f87171 !important; }
        .icon-plus { transition: transform 0.3s ease; }
        .tag-repuesto { transition: all 0.2s; border: 1px solid rgba(255, 255, 255, 0.05); }
    </style>
</head>
<body class="dark text-slate-200 min-h-screen pb-12 font-sans">

    <header class="portada-contenedor shadow-2xl mb-20">
        <button onclick="toggleTheme()" class="absolute top-6 right-6 z-50 glass p-3 rounded-full w-12 h-12">
            <i id="theme-icon" class="fa fa-moon text-[var(--accent)] text-lg"></i>
        </button>

        <div class="perfil-posicion">
            <img src="WhatsApp Image 2026-03-30 at 8.47.32 PM.jpeg" alt="Logo" class="img-perfil">
            <div class="mb-4">
                <h1 class="text-3xl font-black italic text-white uppercase tracking-tighter drop-shadow-lg">RESET TALLER</h1>
                <p class="text-[var(--accent)] text-[10px] font-bold tracking-widest uppercase drop-shadow-md">San Carlos, Aguas Zarcas</p>
            </div>
        </div>
    </header>

    <div class="px-6 space-y-4">
        <p class="text-xs italic opacity-80 border-l-2 border-[var(--accent)] pl-3">
            "Todo lo puedo en Cristo que me fortalece." <br>
            <span class="font-bold not-italic text-[9px] uppercase tracking-tighter">— Filipenses 4:13 —</span>
        </p>

        <div class="bg-green-500/10 border border-green-500/20 p-4 rounded-2xl flex items-center gap-4">
            <i class="fa fa-check-circle text-green-500 text-xl"></i>
            <div>
                <h4 class="font-black text-xs uppercase text-green-400">Precios Finales</h4>
                <p class="text-[10px] opacity-80">El costo ya incluye el repuesto puesto y garantizado.</p>
            </div>
        </div>
    </div>

    <div class="px-6 mt-8 mb-6">
        <div class="relative">
            <i class="fa fa-search absolute left-4 top-4 text-slate-500"></i>
            <input type="text" id="buscador" placeholder="Busca tu modelo..." 
                class="glass w-full rounded-2xl py-4 pl-12 pr-4 text-sm outline-none focus:border-[var(--accent)] transition-all">
        </div>
    </div>

    <main id="lista-repuestos" class="px-6 space-y-4"></main>

    <script src="datos.js"></script>
    <script>
        const contenedor = document.getElementById('lista-repuestos');
        const buscador = document.getElementById('buscador');
        const body = document.body;

        function toggleTheme() {
            body.classList.toggle('light');
            const icon = document.getElementById('theme-icon');
            icon.classList.toggle('fa-moon');
            icon.classList.toggle('fa-sun');
            renderizar(buscador.value);
        }

        function renderizar(filtro = '') {
            contenedor.innerHTML = '';
            let estructura = [];
            const listas = (typeof PANTALLAS !== 'undefined') ? PANTALLAS : [];
            let mainFolder = null;
            let subFolder = null;

            listas.forEach((item) => {
                const [tipo, valor] = item;
                if (tipo === "TITULO") {
                    mainFolder = { nombre: valor, subs: [], items: [], contador: 0 };
                    estructura.push(mainFolder);
                    subFolder = null;
                } else if (tipo === "SUBTITULO") {
                    subFolder = { nombre: valor, items: [], contador: 0 };
                    if (mainFolder) mainFolder.subs.push(subFolder);
                } else if (tipo.toLowerCase().includes(filtro.toLowerCase())) {
                    if (subFolder) { subFolder.items.push(item); subFolder.contador++; mainFolder.contador++; }
                    else if (mainFolder) { mainFolder.items.push(item); mainFolder.contador++; }
                }
            });

            estructura.forEach((main, mIdx) => {
                if (main.contador === 0 && filtro !== '') return;
                const mId = `m-${mIdx}`;
                const mDiv = document.createElement('div');
                mDiv.innerHTML = `
                    <button onclick="toggle('${mId}')" class="glass w-full p-5 rounded-2xl flex justify-between items-center mb-3">
                        <span class="font-black text-lg uppercase italic">${main.nombre}</span>
                        <div class="flex items-center gap-4">
                            <span class="text-[10px] font-bold text-[var(--accent)]">${main.contador}</span>
                            <i id="icon-${mId}" class="fa fa-plus text-slate-500 text-sm icon-plus"></i>
                        </div>
                    </button>
                    <div id="${mId}" class="hidden space-y-5 pb-6"></div>
                `;
                contenedor.appendChild(mDiv);
                const mContent = mDiv.querySelector(`#${mId}`);

                main.subs.forEach(sub => {
                    if (sub.contador === 0) return;
                    const subDiv = document.createElement('div');
                    subDiv.innerHTML = `<h3 class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-2 px-2">${sub.nombre}</h3>
                                      <div class="grid grid-cols-2 gap-3"></div>`;
                    mContent.appendChild(subDiv);
                    sub.items.forEach(item => subDiv.querySelector('div').appendChild(crearCard(item)));
                });

                if (main.items.length > 0) {
                    const extraGrid = document.createElement('div');
                    extraGrid.className = "grid grid-cols-2 gap-3";
                    mContent.appendChild(extraGrid);
                    main.items.forEach(item => extraGrid.appendChild(crearCard(item)));
                }
            });
        }

        function crearCard(item) {
            const [nombre, precio] = item;
            const card = document.createElement('a');
            card.href = `https://wa.me/50661073855?text=Consulta por: ${nombre}`;
            card.className = `tag-repuesto glass p-4 rounded-2xl flex flex-col items-center text-center justify-between transition active:scale-95`;
            card.innerHTML = `<span class="text-[10px] font-bold uppercase mb-3 opacity-80">${nombre}</span>
                            <div class="w-full pt-3 border-t border-white/5 flex items-center justify-center gap-2">
                                <span class="text-[var(--price)] font-black text-sm tracking-tighter">${precio}</span>
                                <i class="fab fa-whatsapp text-green-500"></i>
                            </div>`;
            return card;
        }

        function toggle(id) {
            document.getElementById(id).classList.toggle('hidden');
            document.getElementById(`icon-${id}`).classList.toggle('rotate-icon');
        }
        buscador.addEventListener('input', (e) => renderizar(e.target.value));
        renderizar();
    </script>
</body>
</html>
