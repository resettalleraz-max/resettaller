<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Taller - Catálogo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .rotate-180 { transform: rotate(180deg); }
    </style>
</head>
<body class="bg-slate-900 text-white font-sans min-h-screen pb-24">

    <header class="p-8 text-center">
        <h1 class="text-4xl font-black italic text-orange-500 tracking-tighter uppercase">RESET TALLER</h1>
        <p class="text-blue-400 text-[10px] font-bold tracking-[0.4em] uppercase mt-1">Electronics & Micro Repair</p>
    </header>

    <div class="px-4 mb-8">
        <div class="relative">
            <i class="fa fa-search absolute left-4 top-3.5 text-slate-500"></i>
            <input type="text" id="buscador" placeholder="Busca tu modelo aquí..." 
                class="w-full bg-slate-800 border-none rounded-2xl py-4 pl-12 pr-4 text-sm focus:ring-2 focus:ring-orange-500 outline-none shadow-xl">
        </div>
    </div>

    <main id="lista-repuestos" class="px-4 space-y-4"></main>

    <nav class="fixed bottom-0 left-0 right-0 bg-slate-800/95 backdrop-blur-md border-t border-slate-700 flex justify-around py-4 text-[10px] font-bold uppercase text-slate-400 shadow-2xl">
        <div class="text-center text-orange-500">
            <i class="fa fa-box-open text-xl mb-1"></i><br>
            <span id="contador-items">0 Items</span>
        </div>
        <a href="https://wa.me/50661073855" class="text-center hover:text-green-400 transition">
            <i class="fab fa-whatsapp text-xl mb-1"></i><br>Escribir
        </a>
        <div class="text-center">
            <i class="fa fa-microchip text-xl mb-1"></i><br>61073855
        </div>
    </nav>

    <script src="datos.js"></script>
    <script>
        const contenedor = document.getElementById('lista-repuestos');
        const buscador = document.getElementById('buscador');

        function renderizar(filtro = '') {
            contenedor.innerHTML = '';
            let total = 0;
            let currentMainFolder = null;
            let currentSubFolder = null;

            PANTALLAS.forEach((item, index) => {
                const [tipo, valor] = item;

                if (tipo === "TITULO") {
                    const id = `main-${index}`;
                    const mainDiv = document.createElement('div');
                    mainDiv.innerHTML = `
                        <button onclick="toggle('${id}')" class="w-full bg-slate-800 p-5 rounded-2xl flex justify-between items-center mb-2 border-b-4 border-orange-600 shadow-lg">
                            <span class="font-black text-slate-100 uppercase tracking-widest text-base">${valor}</span>
                            <i id="icon-${id}" class="fa fa-chevron-down text-orange-500 transition-transform duration-300"></i>
                        </button>
                        <div id="${id}" class="hidden space-y-3 mb-6 px-1"></div>
                    `;
                    contenedor.appendChild(mainDiv);
                    currentMainFolder = mainDiv.querySelector(`#${id}`);
                    currentSubFolder = null;
                } 
                else if (tipo === "SUBTITULO") {
                    const subId = `sub-${index}`;
                    const subDiv = document.createElement('div');
                    subDiv.className = "mt-2";
                    subDiv.innerHTML = `
                        <button onclick="toggle('${subId}')" class="w-full bg-slate-700/40 p-3 rounded-xl flex justify-between items-center mb-1 border border-slate-600">
                            <span class="font-bold text-blue-300 text-xs uppercase tracking-wider italic">${valor}</span>
                            <i id="icon-${subId}" class="fa fa-plus text-[10px] text-slate-400 transition-transform"></i>
                        </button>
                        <div id="${subId}" class="hidden space-y-2 mt-2 ml-3 border-l-2 border-slate-700 pl-3"></div>
                    `;
                    currentMainFolder.appendChild(subDiv);
                    currentSubFolder = subDiv.querySelector(`#${subId}`);
                } 
                else {
                    if (valor && tipo.toLowerCase().includes(filtro.toLowerCase())) {
                        total++;
                        const card = document.createElement('div');
                        card.className = "bg-slate-800/60 p-3 rounded-xl flex justify-between items-center border border-slate-700/30";
                        card.innerHTML = `
                            <span class="text-xs font-bold text-slate-200 uppercase">${tipo}</span>
                            <div class="flex items-center gap-3">
                                <span class="text-orange-500 font-black text-sm tracking-tighter">${valor}</span>
                                <a href="https://wa.me/50661073855?text=Hola, consulto por: ${tipo.replace(/<[^>]*>?/gm, '')}" class="bg-green-600 p-2 rounded-lg shadow-lg active:scale-95 transition">
                                    <i class="fab fa-whatsapp text-white text-sm"></i>
                                </a>
                            </div>
                        `;
                        if (currentSubFolder) currentSubFolder.appendChild(card);
                        else if (currentMainFolder) currentMainFolder.appendChild(card);
                    }
                }
            });
            document.getElementById('contador-items').innerText = `${total} Items`;
        }

        function toggle(id) {
            const el = document.getElementById(id);
            const icon = document.getElementById(`icon-${id}`);
            el.classList.toggle('hidden');
            icon.classList.toggle('rotate-180');
        }

        buscador.addEventListener('input', (e) => renderizar(e.target.value));
        renderizar();
    </script>
</body>
</html>
