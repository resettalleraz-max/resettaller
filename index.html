<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Taller RST</title>
    <style>
        body { font-family: sans-serif; background: #0a101d; color: #fff; margin: 0; padding: 10px; }
        .header { text-align: center; padding: 20px; border-bottom: 3px solid #38bdf8; background: #111; border-radius: 0 0 20px 20px; }
        .logo { width: 120px; height: 120px; border-radius: 50%; border: 3px solid #38bdf8; object-fit: cover; box-shadow: 0 0 15px #38bdf8; }
        #buscador { width: 100%; padding: 15px; border-radius: 30px; border: 2px solid #38bdf8; margin: 20px 0; box-sizing: border-box; font-size: 16px; outline: none; background: #fff; color: #000; }
        
        .acordeon { background: #141b2a; color: #38bdf8; cursor: pointer; padding: 18px; width: 100%; border: 1px solid #38bdf844; text-align: left; font-size: 18px; font-weight: bold; border-radius: 10px; margin-top: 10px; display: flex; justify-content: space-between; align-items: center; outline: none; }
        .active:after { content: "\2212"; }
        .acordeon:after { content: '\002B'; }

        .panel { padding: 0 10px; background-color: #0a101d; max-height: 0; overflow: hidden; transition: max-height 0.3s ease-out; }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 15px; padding: 20px 0; }
        .caja { background: #141b2a; padding: 15px; border-radius: 12px; border: 1px solid #38bdf822; display: flex; flex-direction: column; justify-content: space-between; }
        .caja h3 { font-size: 0.85em; margin: 0; text-transform: uppercase; height: 35px; color: #38bdf8; }
        .precio { color: #22c55e; font-size: 1.4em; font-weight: bold; margin: 10px 0; }
        .btn-wa { background: #22c55e; color: #000; text-decoration: none; padding: 10px; text-align: center; border-radius: 8px; font-weight: bold; text-transform: uppercase; font-size: 0.8em; }
    </style>
</head>
<body>

    <div class="header">
        <img src="https://i.postimg.cc/9M349Y9k/1000985447.jpg" class="logo">
        <h1>RESET TALLER RST</h1>

    </div>
