<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>RESET TALLER - Reparación de Celulares y Pantallas en San Carlos</title>
    <meta name="description" content="Taller de reparación de celulares, pantallas y electrónica en Venecia, San Carlos. Catálogo de repuestos y servicio técnico profesional.">
    <meta name="keywords" content="reparación de celulares, San Carlos, Venecia, pantallas, repuestos celulares, Reset Taller, Aguas Zarcas">
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --color-principal: #2c5aa0;
            --emerald-green: #25d366; 
            --bg-color: #f8fafc; 
            --text-color: #0f172a;
            --card-bg: #ffffff;
            --border-color: #dee2e6;
        }
        
        body.modo-noche { 
            --bg-color: #0a0e17; 
            --text-color: #f8fafc;
            --card-bg: #1e293b;
            --border-color: #334155;
        }

        body { background-color: var(--bg-color); font-family: 'Segoe UI', sans-serif; color: var(--text-color); padding-bottom: 90px; transition: background-color 0.5s, color 0.5s; }
        
        .hero-section { 
            padding: 50px 0 30px; 
            text-align: center; 
            background-image: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('portada.jpg');
            background-size: cover;
            background-position: center;
            border-bottom: 5px solid var(--color-principal);
            color: white;
        }
        
        .hero-logo { 
            width: 110px; 
            height: 110px; 
            border-radius: 50%; 
            border: 3px solid white; 
            object-fit: cover; 
            margin-bottom: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            cursor: pointer;
            background-color: #fff;
        }

        .hero-title { font-size: 2.5rem; font-weight: 900; color: white; text-shadow: 2px 2px 6px rgba(0,0,0,0.8); margin: 0; }
        .hero-divider { width: 100px; height: 4px; background: var(--emerald-green); margin: 15px auto; border-radius: 10px; }
        
        .hero-bible { 
            font-size: 1.1rem; 
            font-style: italic; 
            text-shadow: 2px 2px 8px rgba(0,0,0,1); 
            max-width: 85%; 
            margin: 0 auto 10px; 
            font-weight: 500;
        }
        
        .hero-address { 
            font-size: 0.8rem; 
            text-transform: uppercase; 
            letter-spacing: 2px; 
            text-shadow: 2px 2px 4px rgba(0,0,0,1);
            margin-bottom: 25px;
            font-weight: bold;
        }

        .btn-catalog { background-color: var(--emerald-green); color: white !important; font-weight: bold; padding: 12px 25px; border-radius: 50px; text-decoration: none; display: inline-flex; align-items: center; gap: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); border: 2px solid white; }

        .search-box { background: var(--card-bg); border-radius: 15px; padding: 10px; margin: 25px 0; border: 1px solid var(--border-color); }
        .btn-home { background: #0d6efd; color: white; border-radius: 10px; border: none; width: 45px; height: 45px; }

        .accordion-item { border: none; background: var(--card-bg); margin-bottom: 10px; border-radius: 15px !important; border: 1px solid var(--border-color); }
        .accordion-button { font-weight: 700; text-transform: uppercase; color: var(--text-color); background: transparent; padding: 18px; display: flex; align-items: center; width: 100%; position: relative; }
        .accordion-button:not(.collapsed) { background-color: rgba(44, 90, 160, 0.1); color: var(--color-principal); }

        .badge-count { position: absolute; right: 40px; background: rgba(44, 90, 160, 0.1); color: var(--color-principal); padding: 4px 12px; border-radius: 20px; font-size: 0.8rem; font-weight: bold; border: 1px solid var(--color-principal); }

        .card-prod { background: var(--card-bg); border-radius: 12px; padding: 15px; margin-bottom: 10px; border: 1px solid var(--border-color); transition: all 0.3s; }
        .precio-tag { color: var(--color-principal); font-weight: 800; font-size: 1.3rem; }
        .btn-ws { background-color: var(--emerald-green); color: white; border-radius: 8px; padding: 8px 15px; text-decoration: none; font-weight: bold; font-size: 0.85rem; }
        .btn-share { background-color: #0d6efd; color: white; border-radius: 8px; width: 40px; height: 40px; display: inline-flex; align-items: center; justify-content: center; border: none; }

        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: var(--card-bg); display: flex; justify-content: space-around; padding: 12px; border-top: 1px solid var(--border-color); z-index: 1000; }
        .nav-item { display: flex; flex-direction: column; align-items: center; font-size: 0.75rem; color: var(--text-color); text-decoration: none; }
        .nav-item i { font-size: 1.2rem; margin-bottom: 3px; color: var(--color-principal); }
        .clickable { cursor: pointer; }
    </style>
</head>
<body>

<div class="container-fluid hero-section">
    <img src="portada.jpg" class="hero-logo" onclick="irAlInicio()" title="Ir al Inicio">
    <h1 class="hero-title">RESET TALLER</h1>
    <div class="hero-divider"></div>
    <p class="hero-bible">"Mira que te mando que te esfuerces y seas valiente..." - Josué 1:9</p>
    <p class="hero-address">Alajuela, San Carlos, Aguas Zarcas</p>
    <a href="https://wa.me/c/50661073855" class="btn-catalog" target="_blank"><i class="fab fa-whatsapp"></i> VER CATÁLOGO CON FOTOS</a>
</div>

<div class="container my-4">
    <div class="search-box d-flex gap-2">
        <input type="text" id="bus" class="form-control bg-transparent border-0" placeholder="Escribí modelo (G7, P30, Pantalla)..." onkeyup="buscar()">
        <button class="btn-home" onclick="irAlInicio()"><i class="fas fa-home"></i></button>
    </div>
    <div class="accordion" id="mainAcc"></div>
</div>

<div class="bottom-nav">
    <div class="nav-item"><i class="fas fa-box-open"></i><span id="txtItems">...</span></div>
    <a href="https://wa.me/50661073855" class="nav-item clickable" target="_blank"><i class="fab fa-whatsapp"></i><span>WhatsApp</span></a>
    <div class="nav-item clickable" onclick="cambiarModo()"><i id="iconoModo" class="fas fa-moon"></i><span id="txtModo">Noche</span></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="datos.js"></script>
<script>
    const whatsapp = "50661073855";
    const categoriasBase = ["HUAWEI", "SAMSUNG", "IPHONE", "MOTOROLA", "XIAOMI", "HONOR", "TACTIL", "RAM CARGA", "TARJETA CARGA", "FLEX PRINCIPAL", "CARGADORES", "AUDIFONOS", "TAPAS"];

    function irAlInicio() {
        window.location.href = window.location.pathname; 
    }

    function cambiarModo() {
        document.body.classList.toggle('modo-noche');
        const icono = document.getElementById('iconoModo');
        const texto = document.getElementById('txtModo');
        if(document.body.classList.contains('modo-noche')) {
            icono.className = 'fas fa-sun'; texto.innerText = "Día";
        } else {
            icono.className = 'fas fa-moon'; texto.innerText = "Noche";
        }
    }

    function buscar() {
        const q = document.getElementById('bus').value.trim().toUpperCase();
        const f = datos.filter(p => (`${p.categoria} ${p.modelos} ${p.subcategoria}`).toUpperCase().includes(q));
        render(f, q !== "");
    }

    function render(lista, expandir) {
        const h = document.getElementById('mainAcc');
        h.innerHTML = "";
        document.getElementById('txtItems').innerText = datos.length + " Items";
        categoriasBase.forEach((c, i) => {
            const items = lista.filter(p => p.categoria === c);
            if(items.length > 0) {
                const id = "cat" + i;
                let subHtml = "";
                const categoriasUnicas = [...new Set(items.map(p => p.subcategoria))];
                if(categoriasUnicas.length > 1 || (categoriasUnicas.length === 1 && categoriasUnicas[0] !== "SIN MARCO" && categoriasUnicas[0] !== "CON MARCO")) {
                    subHtml = `<div class="accordion">`;
                    categoriasUnicas.forEach((subCat, j) => {
                        const itemsSub = items.filter(p => p.subcategoria === subCat);
                        subHtml += genSub(i, j, subCat, itemsSub, expandir);
                    });
                    subHtml += `</div>`;
                } else {
                    subHtml = `<div class="row">${items.map(p => card(p)).join('')}</div>`;
                }
                h.innerHTML += `<div class="accordion-item shadow-sm"><h2 class="accordion-header"><button class="accordion-button ${expandir ? '' : 'collapsed'}" type="button" data-bs-toggle="collapse" data-bs-target="#${id}"><span>${c}</span><span class="badge-count">${items.length}</span></button></h2><div id="${id}" class="accordion-collapse collapse ${expandir ? 'show' : ''}" data-bs-parent="#mainAcc"><div class="accordion-body">${subHtml}</div></div></div>`;
            }
        });
    }

    function genSub(idx, tipo, tit, lista, exp) {
        if(lista.length === 0) return "";
        const id = `s${idx}${tipo}`;
        return `<div class="accordion-item border-0"><h2 class="accordion-header"><button class="accordion-button ${exp ? '' : 'collapsed'} py-2" style="font-size:0.85rem" type="button" data-bs-toggle="collapse" data-bs-target="#${id}"><span>${tit}</span><span class="badge-count">${lista.length}</span></button></h2><div id="${id}" class="accordion-collapse collapse ${exp ? 'show' : ''}"><div class="accordion-body"><div class="row">${lista.map(p => card(p)).join('')}</div></div></div></div>`;
    }

    function card(p) {
        const idUnico = p.modelos.replace(/\s+/g, '-').replace(/[^a-zA-Z0-9-]/g, '').toLowerCase();
        return `<div class="col-12 col-md-6 px-1" id="${idUnico}"><div class="card-prod d-flex justify-content-between align-items-center mb-2"><div><div class="fw-bold" style="font-size:0.9rem; color:var(--text-color)">${p.modelos}</div><div class="precio-tag">₡${p.precios}</div></div><div class="d-flex align-items-center"><a href="https://wa.me/${whatsapp}?text=Hola Reset Taller, consulto por: ${p.modelos}" class="btn-ws" target="_blank">PEDIR</a><button class="btn-share" onclick="compartirProducto('${p.modelos}', '${idUnico}')"><i class="fas fa-share"></i></button></div></div></div>`;
    }

    function compartirProducto(modelo, idUnico) {
        const urlConAnclaje = window.location.origin + window.location.pathname + "#" + idUnico;
        const texto = `Mira este artículo en Reset Taller: ${modelo}`;
        if (navigator.share) {
            navigator.share({ title: 'Reset Taller', text: texto, url: urlConAnclaje });
        } else {
            navigator.clipboard.writeText(urlConAnclaje);
            alert('¡Enlace copiado!');
        }
    }

    window.onload = () => {
        render(datos, false);
        setTimeout(() => {
            const hash = decodeURIComponent(window.location.hash);
            if (hash && hash !== "#") {
                const elemento = document.querySelector(hash);
                if (elemento) {
                    let parent = elemento.closest('.accordion-collapse');
                    while (parent) {
                        new bootstrap.Collapse(parent, { toggle: false }).show();
                        parent = parent.parentElement.closest('.accordion-collapse');
                    }
                    setTimeout(() => {
                        elemento.scrollIntoView({ behavior: 'smooth', block: 'center' });
                        elemento.querySelector('.card-prod').style.boxShadow = "0 0 20px #2c5aa0";
                        elemento.querySelector('.card-prod').style.border = "2px solid #2c5aa0";
                    }, 600);
                }
            }
        }, 500);
    };
</script>
</body>
</html>
