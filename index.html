    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style> 
        .rotate-180 { transform: rotate(180deg); } 
        :root { --tecnico: #38bdf8; --bg-brand: #1e293b; }
        .modo-claro { background-color: #f1f5f9; color: #1e293b; }
        /* Animación suave para los botones */
        .btn-brand:active { transform: scale(0.97); }
    </style>
</head>
<body id="cuerpo" class="bg-slate-950 text-white min-h-screen pb-24 transition-colors duration-300 font-sans">

    <header class="relative p-10 text-center border-b border-slate-800 mb-6 rounded-b-3xl shadow-2xl overflow-hidden bg-slate-900/50">
        <div class="absolute inset-0 z-0 opacity-10">
            <img src="https://images.unsplash.com/photo-1581092918056-0c4c3acd3789?q=80&w=600&auto=format&fit=crop" class="w-full h-full object-cover">
        </div>
        <div class="relative z-10">
            <h1 class="text-4xl font-black italic text-[var(--tecnico)] uppercase tracking-tighter">RESET TALLER</h1>
            <p class="text-slate-400 text-xs font-bold tracking-[0.3em] uppercase mt-2">Servicio Técnico Profesional</p>
            <div class="w-24 h-1 bg-gradient-to-r from-transparent via-[var(--tecnico)] to-transparent mx-auto mt-4 rounded-full shadow-[0_0_15px_#38bdf8]"></div>
        </div>
    </header>

    <div class="px-4 mb-8">
        <div class="relative group">
            <i class="fa fa-search absolute left-4 top-4 text-slate-500 group-focus-within:text-[var(--tecnico)] transition-colors"></i>
            <input type="text" id="buscador" placeholder="Busca modelo, marca o repuesto..." 
                class="w-full bg-slate-900/80 border border-slate-800 rounded-2xl py-4 pl-12 pr-4 text-sm outline-none focus:ring-2 focus:ring-[var(--tecnico)]/50 focus:border-[var(--tecnico)] shadow-xl transition-all">
        </div>
    </div>

    <main id="lista-repuestos" class="px-4 space-y-5"></main>

    <nav class="fixed bottom-0 left-0 right-0 bg-slate-950/90 backdrop-blur-md border-t border-slate-800 flex justify-around items-center py-4 text-[10px] font-bold text-slate-500 shadow-[0_-10px_25px_rgba(0,0,0,0.5)] rounded-t-3xl transition-colors">
        <div class="text-center text-[var(--tecnico)] w-1/3">
            <i class="fa fa-box-open text-2xl mb-1"></i><br>
            <span id="contador-items" class="tracking-widest">0 TOTAL</span>
        </div>
        <div class="w-1/3 flex justify-center">
            <a href="https://wa.me/50661073855" class="text-center hover:text-green-400 transition transform hover:scale-110">
                <i class="fab fa-whatsapp text-3xl mb-1 text-green-500"></i><br>WHATSAPP
            </a>
        </div>
        <div class="w-1/3 flex justify-center">
            <button onclick="cambiarModo()" class="text-center hover:text-[var(--tecnico)] transition p-2">
                <i id="icono-modo" class="fa fa-moon text-2xl mb-1"></i><br>MODO
            </button>
        </div>
    </nav>

    <script src="datos.js"></script>
    <script>
        const contenedor = document.getElementById('lista-repuestos');
        const buscador = document.getElementById('buscador');
        const cuerpo = document.getElementById('cuerpo');
        const iconoModo = document.getElementById('icono-modo');

        function cambiarModo() {
            cuerpo.classList.toggle('modo-claro');
            const esClaro = cuerpo.classList.contains('modo-claro');
            iconoModo.className = esClaro ? 'fa fa-sun text-2xl mb-1' : 'fa fa-moon text-2xl mb-1';
            renderizar(buscador.value);
        }

        function getIcono(nombre) {
            const n = nombre.toUpperCase();
            if (n.includes("IPHONE")) return '<i class="fab fa-apple"></i>';
            if (n.includes("SAMSUNG")) return '<i class="fa fa-mobile-screen"></i>';
            if (n.includes("HUAWEI")) return '<i class="fa fa-microchip"></i>';
            if (n.includes("XIAOMI")) return '<i class="fa fa-bolt"></i>';
            if (n.includes("MOTOROLA")) return '<i class="fa fa-m"></i>';
            if (n.includes("HONOR")) return '<i class="fa fa-medal"></i>';
            if (n.includes("BATERÍAS")) return '<i class="fa fa-battery-bolt"></i>';
            if (n.includes("FLEX")) return '<i class="fa fa-plug-circle-bolt"></i>';
            if (n.includes("TAPAS")) return '<i class="fa fa-square-full"></i>';
            if (n.includes("TABLETS")) return '<i class="fa fa-tablet-screen-button"></i>';
            if (n.includes("INSUMOS") || n.includes("HERRAMIENTAS")) return '<i class="fa fa-screwdriver-wrench"></i>';
            if (n.includes("ACCESORIOS")) return '<i class="fa fa-headset"></i>';
            if (n.includes("WATCH")) return '<i class="fa fa-clock"></i>';
            if (n.includes("SERVICIOS")) return '<i class="fa fa-gears"></i>';
            return '<i class="fa fa-folder-tree"></i>';
        }

        function renderizar(filtro = '') {
            contenedor.innerHTML = '';
            let totalGeneral = 0;
            let estructura = [];
            const todasLasListas = [...PANTALLAS];
            if (typeof HERRAMIENTAS !== 'undefined') todasLasListas.push(...HERRAMIENTAS);

            let mainFolder = null;
            let subFolder = null;

            todasLasListas.forEach((item) => {
                const [tipo, valor] = item;
                if (tipo === "TITULO") {
                    mainFolder = { nombre: valor, subs: [], items: [], contador: 0 };
                    estructura.push(mainFolder);
                    subFolder = null;
                } else if (tipo === "SUBTITULO") {
                    subFolder = { nombre: valor, items: [], contador: 0 };
                    if (mainFolder) mainFolder.subs.push(subFolder);
                } else {
                    if (tipo.toLowerCase().includes(filtro.toLowerCase())) {
                        totalGeneral++;
                        if (subFolder) {
                            subFolder.items.push(item);
                            subFolder.contador++;
                            mainFolder.contador++;
                        } else if (mainFolder) {
                            mainFolder.items.push(item);
                            mainFolder.contador++;
                        }
                    }
                }
            });

            const esClaro = cuerpo.classList.contains('modo-claro');

            estructura.forEach((main, mIdx) => {
                if (main.contador === 0 && filtro !== '') return;
                const mId = `m-${mIdx}`;
                const mDiv = document.createElement('div');
                
                // DISEÑO PROFESIONAL OSCURO CON BORDE AZUL
                mDiv.innerHTML = `
                    <button onclick="toggle('${mId}')" class="btn-brand w-full bg-slate-900 border border-slate-800 p-5 rounded-2xl flex justify-between items-center mb-3 shadow-lg hover:border-[var(--tecnico)] transition-all">
                        <div class="flex items-center gap-4">
                            <span class="text-[var(--tecnico)] text-2xl drop-shadow-[0_0_8px_rgba(56,189,248,0.5)]">${getIcono(main.nombre)}</span>
                            <span class="font-black uppercase text-slate-100 text-xl tracking-tight">${main.nombre}</span>
                        </div>
                        <div class="flex items-center gap-4">
                            <span class="bg-slate-800 text-[var(--tecnico)] px-4 py-1.5 rounded-xl font-black text-sm border border-slate-700 shadow-inner">${main.contador}</span>
                            <i id="icon-${mId}" class="fa fa-chevron-down text-slate-600 transition-transform"></i>
                        </div>
                    </button>
                    <div id="${mId}" class="hidden space-y-2 mb-8 px-1"></div>
                `;
                contenedor.appendChild(mDiv);
                const mContent = mDiv.querySelector(`#${mId}`);

                main.subs.forEach((sub, sIdx) => {
                    if (sub.contador === 0 && filtro !== '') return;
                    const sId = `s-${mIdx}-${sIdx}`;
                    const sDiv = document.createElement('div');
                    sDiv.innerHTML = `
                        <button onclick="toggle('${sId}')" class="w-full ${esClaro ? 'bg-slate-200' : 'bg-slate-800/40'} p-3 rounded-xl flex justify-between items-center mb-2 border ${esClaro ? 'border-slate-300' : 'border-slate-700/50'}">
                            <span class="font-bold ${esClaro ? 'text-slate-600' : 'text-slate-400'} text-xs uppercase tracking-widest">${sub.nombre}</span>
                            <span class="text-[var(--tecnico)] font-bold text-xs bg-[var(--tecnico)]/10 px-2 py-0.5 rounded">${sub.contador}</span>
                        </button>
                        <div id="${sId}" class="hidden space-y-1 mt-1 ml-3 border-l-2 border-slate-800 pl-4"></div>
                    `;
                    mContent.appendChild(sDiv);
                    const sContent = sDiv.querySelector(`#${sId}`);
                    sub.items.forEach(repuesto => sContent.appendChild(crearCard(repuesto, esClaro)));
                });

                main.items.forEach(repuesto => {
                    if (!main.subs.some(s => s.items.includes(repuesto))) {
                        mContent.appendChild(crearCard(repuesto, esClaro));
                    }
                });
            });
            document.getElementById('contador-items').innerText = `${totalGeneral} TOTAL`;
        }

        function crearCard(item, esClaro) {
            const [tipo, valor] = item;
            const card = document.createElement('div');
            card.className = `${esClaro ? 'bg-white border-slate-200' : 'bg-slate-900/40 border-slate-800'} p-4 rounded-xl flex justify-between items-center border mx-1 shadow-sm hover:border-slate-700 transition-all`;
            card.innerHTML = `
                <span class="text-xs font-bold ${esClaro ? 'text-slate-700' : 'text-slate-300'} uppercase">${tipo}</span>
                <div class="flex items-center gap-5">
                    <span class="text-[var(--tecnico)] font-black text-base tracking-tight">${valor}</span>
                    <a href="https://wa.me/50661073855?text=Consulta: ${tipo}" class="bg-green-600/20 text-green-500 p-2.5 rounded-xl border border-green-500/30 hover:bg-green-600 hover:text-white transition-all active:scale-90"><i class="fab fa-whatsapp text-lg"></i></a>
                </div>`;
            return card;
        }

        function toggle(id) {
            document.getElementById(id).classList.toggle('hidden');
            document.getElementById(`icon-${id}`).classList.toggle('rotate-180');
        }
        buscador.addEventListener('input', (e) => renderizar(e.target.value));
        renderizar();
    </script>
</body>

            <i class="fa fa-box-open text-2xl mb-1"></i><br>
            <span id="contador-items" class="tracking-widest">0 TOTAL</span>
        </div>
        <div class="w-1/3 flex justify-center">
            <a href="https://wa.me/50661073855" class="text-center hover:text-green-400 transition transform hover:scale-110">
                <i class="fab fa-whatsapp text-3xl mb-1 text-green-500"></i><br>WHATSAPP
            </a>
        </div>
        <div class="w-1/3 flex justify-center">
            <button onclick="cambiarModo()" class="text-center hover:text-[var(--tecnico)] transition p-2">
                <i id="icono-modo" class="fa fa-moon text-2xl mb-1"></i><br>MODO
            </button>
        </div>
    </nav>

    <script src="datos.js"></script>
    <script>
        const contenedor = document.getElementById('lista-repuestos');
        const buscador = document.getElementById('buscador');
        const cuerpo = document.getElementById('cuerpo');
        const iconoModo = document.getElementById('icono-modo');

        function cambiarModo() {
            cuerpo.classList.toggle('modo-claro');
            const esClaro = cuerpo.classList.contains('modo-claro');
            iconoModo.className = esClaro ? 'fa fa-sun text-2xl mb-1' : 'fa fa-moon text-2xl mb-1';
            renderizar(buscador.value);
        }

        function getIcono(nombre) {
            const n = nombre.toUpperCase();
            if (n.includes("IPHONE")) return '<i class="fab fa-apple"></i>';
            if (n.includes("SAMSUNG")) return '<i class="fa fa-mobile-screen"></i>';
            if (n.includes("HUAWEI")) return '<i class="fa fa-microchip"></i>';
            if (n.includes("XIAOMI")) return '<i class="fa fa-bolt"></i>';
            if (n.includes("MOTOROLA")) return '<i class="fa fa-m"></i>';
            if (n.includes("HONOR")) return '<i class="fa fa-medal"></i>';
            if (n.includes("BATERÍAS")) return '<i class="fa fa-battery-bolt"></i>';
            if (n.includes("FLEX")) return '<i class="fa fa-plug-circle-bolt"></i>';
            if (n.includes("TAPAS")) return '<i class="fa fa-square-full"></i>';
            if (n.includes("TABLETS")) return '<i class="fa fa-tablet-screen-button"></i>';
            if (n.includes("INSUMOS") || n.includes("HERRAMIENTAS")) return '<i class="fa fa-screwdriver-wrench"></i>';
            if (n.includes("ACCESORIOS")) return '<i class="fa fa-headset"></i>';
            if (n.includes("WATCH")) return '<i class="fa fa-clock"></i>';
            if (n.includes("SERVICIOS")) return '<i class="fa fa-gears"></i>';
            return '<i class="fa fa-folder-tree"></i>';
        }

        function renderizar(filtro = '') {
            contenedor.innerHTML = '';
            let totalGeneral = 0;
            let estructura = [];
            const todasLasListas = [...PANTALLAS];
            if (typeof HERRAMIENTAS !== 'undefined') todasLasListas.push(...HERRAMIENTAS);

            let mainFolder = null;
            let subFolder = null;

            todasLasListas.forEach((item) => {
                const [tipo, valor] = item;
                if (tipo === "TITULO") {
                    mainFolder = { nombre: valor, subs: [], items: [], contador: 0 };
                    estructura.push(mainFolder);
                    subFolder = null;
                } else if (tipo === "SUBTITULO") {
                    subFolder = { nombre: valor, items: [], contador: 0 };
                    if (mainFolder) mainFolder.subs.push(subFolder);
                } else {
                    if (tipo.toLowerCase().includes(filtro.toLowerCase())) {
                        totalGeneral++;
                        if (subFolder) {
                            subFolder.items.push(item);
                            subFolder.contador++;
                            mainFolder.contador++;
                        } else if (mainFolder) {
                            mainFolder.items.push(item);
                            mainFolder.contador++;
                        }
                    }
                }
            });

            const esClaro = cuerpo.classList.contains('modo-claro');

            estructura.forEach((main, mIdx) => {
                if (main.contador === 0 && filtro !== '') return;
                const mId = `m-${mIdx}`;
                const mDiv = document.createElement('div');
                
                // DISEÑO PROFESIONAL OSCURO CON BORDE AZUL
                mDiv.innerHTML = `
                    <button onclick="toggle('${mId}')" class="btn-brand w-full bg-slate-900 border border-slate-800 p-5 rounded-2xl flex justify-between items-center mb-3 shadow-lg hover:border-[var(--tecnico)] transition-all">
                        <div class="flex items-center gap-4">
                            <span class="text-[var(--tecnico)] text-2xl drop-shadow-[0_0_8px_rgba(56,189,248,0.5)]">${getIcono(main.nombre)}</span>
                            <span class="font-black uppercase text-slate-100 text-xl tracking-tight">${main.nombre}</span>
                        </div>
                        <div class="flex items-center gap-4">
                            <span class="bg-slate-800 text-[var(--tecnico)] px-4 py-1.5 rounded-xl font-black text-sm border border-slate-700 shadow-inner">${main.contador}</span>
                            <i id="icon-${mId}" class="fa fa-chevron-down text-slate-600 transition-transform"></i>
                        </div>
                    </button>
                    <div id="${mId}" class="hidden space-y-2 mb-8 px-1"></div>
                `;
                contenedor.appendChild(mDiv);
                const mContent = mDiv.querySelector(`#${mId}`);

                main.subs.forEach((sub, sIdx) => {
                    if (sub.contador === 0 && filtro !== '') return;
                    const sId = `s-${mIdx}-${sIdx}`;
                    const sDiv = document.createElement('div');
                    sDiv.innerHTML = `
                        <button onclick="toggle('${sId}')" class="w-full ${esClaro ? 'bg-slate-200' : 'bg-slate-800/40'} p-3 rounded-xl flex justify-between items-center mb-2 border ${esClaro ? 'border-slate-300' : 'border-slate-700/50'}">
                            <span class="font-bold ${esClaro ? 'text-slate-600' : 'text-slate-400'} text-xs uppercase tracking-widest">${sub.nombre}</span>
                            <span class="text-[var(--tecnico)] font-bold text-xs bg-[var(--tecnico)]/10 px-2 py-0.5 rounded">${sub.contador}</span>
                        </button>
                        <div id="${sId}" class="hidden space-y-1 mt-1 ml-3 border-l-2 border-slate-800 pl-4"></div>
                    `;
                    mContent.appendChild(sDiv);
                    const sContent = sDiv.querySelector(`#${sId}`);
                    sub.items.forEach(repuesto => sContent.appendChild(crearCard(repuesto, esClaro)));
                });

                main.items.forEach(repuesto => {
                    if (!main.subs.some(s => s.items.includes(repuesto))) {
                        mContent.appendChild(crearCard(repuesto, esClaro));
                    }
                });
            });
            document.getElementById('contador-items').innerText = `${totalGeneral} TOTAL`;
        }

        function crearCard(item, esClaro) {
            const [tipo, valor] = item;
            const card = document.createElement('div');
            card.className = `${esClaro ? 'bg-white border-slate-200' : 'bg-slate-900/40 border-slate-800'} p-4 rounded-xl flex justify-between items-center border mx-1 shadow-sm hover:border-slate-700 transition-all`;
            card.innerHTML = `
                <span class="text-xs font-bold ${esClaro ? 'text-slate-700' : 'text-slate-300'} uppercase">${tipo}</span>
                <div class="flex items-center gap-5">
                    <span class="text-[var(--tecnico)] font-black text-base tracking-tight">${valor}</span>
                    <a href="https://wa.me/50661073855?text=Consulta: ${tipo}" class="bg-green-600/20 text-green-500 p-2.5 rounded-xl border border-green-500/30 hover:bg-green-600 hover:text-white transition-all active:scale-90"><i class="fab fa-whatsapp text-lg"></i></a>
                </div>`;
            return card;
        }

        function toggle(id) {
            document.getElementById(id).classList.toggle('hidden');
            document.getElementById(`icon-${id}`).classList.toggle('rotate-180');
        }
        buscador.addEventListener('input', (e) => renderizar(e.target.value));
        renderizar();
    </script>
</body>
</html>
