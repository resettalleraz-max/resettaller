<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RESET TALLER</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root { --bg: #0a0f18; --card: #161e2d; --neon: #38bdf8; --green: #22c55e; --orange: #f97316; --red: #e11d48; --gold: #eab308; --purple: #a855f7; --text: #f8fafc; }
.light-mode { --bg: #f1f5f9; --card: #ffffff; --neon: #0284c7; --green: #16a34a; --orange: #ea580c; --red: #be123c; --gold: #ca8a04; --purple: #9333ea; --text: #1e293b; }
body { font-family: 'Poppins', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 10px; transition: 0.3s; }
.btn-tema { position: fixed; top: 15px; right: 15px; background: var(--card); border: 2px solid var(--neon); color: var(--neon); padding: 8px 12px; border-radius: 20px; font-size: 0.75em; font-weight: 700; z-index: 1000; cursor: pointer; }
.header { text-align: center; padding: 25px 20px; background: var(--card); border-bottom: 4px solid var(--neon); border-radius: 0 0 25px 25px; margin-bottom: 20px; }
.logo-img { width: 100px; height: 100px; border-radius: 50%; border: 3px solid var(--neon); margin-bottom: 12px; object-fit: cover; }
.header h1 { font-size: 1.7em; margin: 0; letter-spacing: 1px; }
.header p { font-size: 1.1em; margin: 5px 0; color: var(--neon); font-weight: 700; }
.header span { font-size: 0.8em; opacity: 0.8; display: block; margin-bottom: 8px; }
.biblia { font-style: italic; font-size: 0.75em; color: var(--gold); font-weight: 600; margin-top: 5px; display: block; }
.aviso { background: rgba(34, 197, 94, 0.15); border: 2px solid var(--green); color: var(--green); padding: 10px; border-radius: 12px; font-size: 0.8em; text-align: center; font-weight: 700; margin-bottom: 20px; }
#buscador { width: 100%; padding: 15px; border-radius: 30px; border: 2px solid var(--neon); box-sizing: border-box; font-weight: 600; margin-bottom: 20px; outline: none; }
.acordeon { background: var(--card); color: var(--neon); cursor: pointer; padding: 18px; width: 100%; border: 1px solid rgba(56,189,248,0.2); text-align: left; font-weight: 700; border-radius: 12px; margin-top: 10px; display: flex; justify-content: space-between; align-items: center; }
.panel { padding: 0 5px; max-height: 0; overflow: hidden; transition: max-height 0.3s ease-out; background: rgba(0,0,0,0.1); border-radius: 0 0 12px 12px; }
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; padding: 15px 5px; }
.caja { background: var(--card); padding: 12px; border-radius: 15px; text-align: center; border: 1px solid rgba(255,255,255,0.05); }
.caja h3 { font-size: 0.7em; margin: 0; color: var(--text); text-transform: uppercase; min-height: 35px; }
.precio { color: var(--green); font-size: 1.1em; font-weight: 800; margin: 8px 0; display: block; }
.btn-wa { background: var(--green); color: #fff; text-decoration: none; padding: 8px; border-radius: 8px; font-size: 0.7em; font-weight: 700; display: block; }
.badge { background: #ffd700; color: #000; font-size: 0.6em; padding: 2px 4px; border-radius: 4px; font-weight: 900; }
.acordeon:after { content: '\002B'; } .active:after { content: "\2212"; }
</style>
</head>
<body>
<button class="btn-tema" onclick="cambiarTema()">🌓 MODO DÍA</button>
<div class="header">
  <img src="WhatsApp Image 2026-03-30 at 8.47.32 PM.jpeg" class="logo-img">
  <h1>RESET TALLER</h1>
  <p>6107-3855</p>
  <span>Costa Rica, Alajuela, San Carlos, Aguas Zarcas</span>
  <span class="biblia">"Pon en manos del Señor todas tus obras, y tus proyectos se cumplirán" - Prov. 16:3</span>
</div>
<div class="aviso">✅ PRECIOS INCLUYEN REPUESTO E INSTALACIÓN</div>
<input type="text" id="buscador" onkeyup="buscar()" placeholder="🔍 BUSCAR MODELO (EJ: IPHONE 13, A34, REDMI 13C)...">

<h2 style="color:#cbd5e1">📱 IPHONE</h2>
<button class="acordeon" onclick="toggle(this)">IPHONE: PANTALLAS (56)</button>
<div class="panel"><div class="grid" id="ip_all"></div></div>

<h2 style="color:var(--purple)">🛠️ CARGA Y TACTIL</h2>
<button class="acordeon" onclick="toggle(this)">PUERTOS Y TÁCTILES (31)</button>
<div class="panel"><div class="grid" id="repara"></div></div>

<h2 style="color:var(--gold)">📱 HONOR</h2>
<button class="acordeon" onclick="toggle(this)">HONOR: PANTALLAS (35)</button>
<div class="panel"><div class="grid" id="hon_all"></div></div>

<h2 style="color:var(--red)">📱 XIAOMI</h2>
<button class="acordeon" onclick="toggle(this)">XIAOMI: PANTALLAS (44)</button>
<div class="panel"><div class="grid" id="xia_all"></div></div>

<h2 style="color:var(--green)">📱 SAMSUNG</h2>
<button class="acordeon" onclick="toggle(this)">SAMSUNG: PANTALLAS (99)</button>
<div class="panel"><div class="grid" id="sam_all"></div></div>

<h2 style="color:var(--neon)">📱 HUAWEI</h2>
<button class="acordeon" onclick="toggle(this)">HUAWEI: PANTALLAS (53)</button>
<div class="panel"><div class="grid" id="hua_all"></div></div>

<h2 style="color:var(--orange)">📱 MOTOROLA</h2>
<button class="acordeon" onclick="toggle(this)">MOTOROLA: PANTALLAS (42)</button>
<div class="panel"><div class="grid" id="mot_all"></div></div>

<script>
const fill=(d,id)=>{const c=document.getElementById(id);d.forEach(i=>{c.innerHTML+=`<div class="caja producto"><h3>${i[0]}</h3><span class="precio">${i[1]}</span><a href="https://wa.me/50661073855?text=Instalar+${i[0]}" class="btn-wa">INSTALAR</a></div>`})}

// --- IPHONE ---
fill([["iPhone 6G","₡22,000"],["iPhone 7 Plus","₡28,000"],["iPhone X OLED","₡45,000"],["iPhone XR <span class='badge'>ORIG</span>","₡45,000"],["iPhone 11 <span class='badge'>ORIG</span>","₡48,000"],["iPhone 12 Pro Max OLED","₡85,000"],["iPhone 13 Pro Max SOFT","₡155,000"],["iPhone 14 Pro Max <span class='badge'>ORIG</span>","₡220,000"],["iPhone 15 Pro Max OLED","₡245,000"],["iPhone 16 Pro Max SOFT","₡345,000"]],'ip_all');

// --- CARGA Y TACTIL ---
fill([["Puerto Huawei Y7","₡15,000"],["Puerto Samsung A10S","₡15,000"],["Puerto Moto G20","₡18,000"],["Táctil J2 Prime","₡12,000"],["Táctil Tablet China","₡15,000"]],'repara');

// --- HONOR ---
fill([["Honor X5 Plus","₡22,000"],["Honor X6 / X6S","₡22,000"],["Honor X7B","₡26,000"],["Honor X8B <span class='badge'>ORIG</span>","₡45,000"],["Honor Magic 6 Lite","₡65,000"]],'hon_all');

// --- XIAOMI ---
fill([["Redmi 13C","₡24,000"],["Redmi Note 11S OLED","₡48,000"],["Redmi Note 13 Pro","₡55,000"],["Poco X3 Pro","₡28,000"]],'xia_all');

// --- SAMSUNG ---
fill([["Samsung A10","₡19,000"],["Samsung A15 <span class='badge'>ORIG</span>","₡45,000"],["Samsung A34 <span class='badge'>ORIG</span>","₡55,000"],["Samsung A54 <span class='badge'>ORIG</span>","₡70,000"],["Samsung S23 Ultra <span class='badge'>ORIG</span>","₡145,000"]],'sam_all');

// --- HUAWEI ---
fill([["Huawei P30 Lite","₡25,000"],["Huawei Y9 Prime","₡26,000"],["Huawei Nova 5T","₡28,000"],["Tablet Huawei T3 7.0","₡25,000"]],'hua_all');

// --- MOTOROLA ---
fill([["Moto G8 Power Lite","₡22,000"],["Moto G22","₡24,000"],["Moto G60","₡28,000"],["Moto E20","₡22,000"]],'mot_all');

function toggle(b){b.classList.toggle("active");const p=b.nextElementSibling;p.style.maxHeight=p.style.maxHeight?null:p.scrollHeight+"px";}
function cambiarTema(){document.body.classList.toggle("light-mode");}
function buscar(){const v=document.getElementById('buscador').value.toLowerCase();const p=document.getElementsByClassName('producto');for(let i=0;i<p.length;i++){const m=p[i].innerText.toLowerCase().includes(v);p[i].style.display=m?"flex":"none";if(v!==""&&m){const pan=p[i].parentElement.parentElement;pan.style.maxHeight="none";pan.previousElementSibling.classList.add("active")}}}
</script>
</body>
</html>
