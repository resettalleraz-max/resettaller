<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RESET TALLER - Catálogo Oficial</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --neon-cyan: #00ffff; /* El celeste neón de tu nombre */
            --emerald-green: #25d366; /* El verde esmeralda que pediste */
            --bg-dark: #0a0e17;
            --card-bg: rgba(255,255,255,0.03);
            --text-main: #ffffff;
        }

        body.light-mode {
            --bg-dark: #f0f2f5;
            --card-bg: #ffffff;
            --text-main: #1a1a1a;
        }

        body { background-color: var(--bg-dark); font-family: 'Segoe UI', sans-serif; color: var(--text-main); transition: 0.3s; padding-bottom: 90px; }
        
        /* --- Portada --- */
        .hero-section {
            background-image: linear-gradient(rgba(0, 0, 0, 0.8), rgba(10, 14, 23, 1)), 
                              url('https://images.unsplash.com/photo-1581092160562-40aa08e78837?q=80&w=2070&auto=format&fit=crop');
            background-size: cover; background-position: center; padding: 50px 0 30px; text-align: center;
        }

        .hero-logo {
            width: 130px; height: 130px; border-radius: 50%; border: 4px solid var(--neon-cyan);
            box-shadow: 0 0 20px var(--neon-cyan); object-fit: cover; margin-bottom: 20px; cursor: pointer;
        }

        .hero-title { font-size: 3.5rem; font-weight: 900; color: var(--neon-cyan); text-shadow: 0 0 15px var(--neon-cyan); margin: 0; }
        .hero-subtitle { font-size: 1.2rem; font-weight: 500; color: white; margin-bottom: 10px; }
        
        /* Rayita Cian Neón */
        .hero-divider { width: 150px; height: 4px; background: var(--neon-cyan); margin: 15px auto; border-radius: 10px; box-shadow: 0 0 15px var(--neon-cyan); }

        .hero-bible { font-size: 0.95rem; font-style: italic; opacity: 0.8; margin: 15px auto; max-width: 600px; }
        .hero-address { font-size: 0.8rem; opacity: 0.6; text-transform: uppercase; letter-spacing: 2px; color: #94a3b8; }

        /* BOTÓN VERDE ESMERALDA */
        .btn-catalog { 
            background-color: var(--emerald-green); 
            color: white; 
            font-weight: bold; 
            padding: 12px 30px; 
            border-radius: 50px; 
            text-decoration: none; 
            display: inline-flex; 
            align-items: center; 
            gap: 10px; 
            margin-top: 25px; 
            box-shadow: 0 4px 15px rgba(37, 211, 102, 0.4);
            transition: 0.3s;
        }
        .btn-catalog:hover { transform: translateY(-3px); color: white; background-color: #1eb954; }

        /* --- Barra Inferior --- */
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; right: 0; height: 75px;
            background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(10px);
            display: flex; justify-content: space-around; align-items: center;
            border-top: 2px solid var(--neon-cyan); z-index: 1000;
        }

        .nav-item { text-align: center; color: white; text-decoration: none; cursor: pointer; flex: 1; border: none; background: none; }
        .nav-item i { font-size: 1.4rem; display: block; color: var(--neon-cyan); margin-bottom: 2px; }
        .nav-item span { font-size: 0.65rem; font-weight: bold; text-transform: uppercase; color: #94a3b8; }

        /* --- Buscador --- */
        .search-container { background: var(--card-bg); border-radius: 15px; padding: 12px; margin-bottom: 25px; border: 1px solid rgba(0,255,255,0.1); }
        .search-input { background: rgba(0,255,255,0.05) !important; color: var(--text-main) !important; border: 1px solid rgba(0,255,255,0.1) !important; padding: 12px; }

        /* --- Estilo de Acordeones --- */
        .accordion-item { border: none; background: var(--card-bg); margin-bottom: 8px; border-radius: 12px !important; overflow: hidden; }
        .accordion-button { font-weight: 700; color: var(--text-main); background: transparent; padding: 18px; font-size: 0.9rem; }
        .accordion-button:not(.collapsed) { background-color: var(--primary-blue); color: white; }
        .badge-count { background: rgba(0,255,255,0.1); color: var(--neon-cyan); padding: 4px 12px; border-radius: 20px; font-size: 0.75rem; margin-left: auto; }

        /* --- Productos --- */
        .card-producto { background: rgba(0,255,255,0.04); border-radius: 12px; padding: 15px; margin-bottom: 8px; border: 1px solid rgba(0,255,255,0.05); }
        .precio-tag { color: var(--neon-cyan); font-weight: 800; font-size: 1.2rem; }
    </style>
</head>
<body>

<div class="container hero-section">
    <img src="WhatsApp Image 2026-03-30 at 8.47.32 PM.jpeg" class="hero-logo" onclick="location.reload()">
    <h1 class="hero-title">RESET TALLER</h1>
    <p class="hero-subtitle">Servicio Técnico Profesional</p>
    <div class="hero-divider"></div>
    <p class="hero-bible">"Mira que te mando que te esfuerces y seas valiente..."<br><strong>Josué 1:9</strong></p>
    <p class="hero-address">Alajuela, San Carlos, Aguas Zarcas</p>

    <a href="https://wa.me/50661073855?text=Hola, quiero ver el catálogo con fotos." class="btn-catalog" target="_blank">
        <i class="fab fa-whatsapp"></i> VER CATÁLOGO CON FOTOS
    </a>
</div>

<div class="container my-4">
    <div class="search-container d-flex gap-2">
        <input type="text" id="searchInput" class="form-control search-input" placeholder="Escribe el modelo (G7, P30)..." onkeyup="filtrar()">
        <button class="btn btn-primary" onclick="location.reload()"><i class="fas fa-home"></i></button>
    </div>
    <div class="accordion" id="catPrincipal"></div>
</div>

<div class="bottom-nav">
    <button class="nav-item" onclick="mostrarTotal()">
        <i class="fas fa-box-open"></i>
        <span id="txtInventario">Inventario</span>
    </button>
    <a href="https://wa.me/50661073855" class="nav-item" target="_blank">
        <i class="fab fa-whatsapp"></i>
        <span>WhatsApp</span>
    </a>
    <button class="nav-item" onclick="cambiarModo()">
        <i id="modeIcon" class="fas fa-moon"></i>
        <span id="modeText">Noche</span>
    </button>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="datos.js"></script>
<script>
    const categoriasBase = ["HUAWEI", "SAMSUNG", "IPHONE", "MOTOROLA", "XIAOMI", "HONOR", "TACTIL", "RAM CARGA", "TARJETA CARGA", "FLEX PRINCIPAL", "CARGADORES", "AUDIFONOS", "TAPAS"];

    function cambiarModo() {
        document.body.classList.toggle('light-mode');
        const isL = document.body.classList.contains('light-mode');
        document.getElementById('modeIcon').className = isL ? 'fas fa-sun' : 'fas fa-moon';
        document.getElementById('modeText').innerText = isL ? 'Día' : 'Noche';
    }

    function mostrarTotal() {
        alert("El inventario total de Reset Taller es de: " + productos.length + " artículos.");
    }

    function filtrar() {
        const q = document.getElementById('searchInput').value.trim().toUpperCase();
        const f = productos.filter(p => p.modelo.toUpperCase().includes(q) || p.categoria.toUpperCase().includes(q));
        render(f, q !== "");
    }

    function render(lista, exp) {
        const h = document.getElementById('catPrincipal');
        h.innerHTML = "";
        categoriasBase.forEach((c, i) => {
            const items = lista.filter(p => p.categoria === c);
            if(items.length > 0) {
                const id = "c" + i;
                h.innerHTML += `
                <div class="accordion-item shadow-sm">
                    <h2 class="accordion-header">
                        <button class="accordion-button ${exp ? '' : 'collapsed'}" type="button" data-bs-toggle="collapse" data-bs-target="#${id}">
                            ${c} <span class="badge-count">${items.length}</span>
                        </button>
                    </h2>
                    <div id="${id}" class="accordion-collapse collapse ${exp ? 'show' : ''}" data-bs-parent="#catPrincipal">
                        <div class="accordion-body">
                            ${items.map(p => `
                                <div class="card-producto d-flex justify-content-between align-items-center">
                                    <div><h6 class="mb-0 fw-bold">${p.modelo}</h6><span class="precio-tag">₡${p.precio}</span></div>
                                    <a href="https://wa.me/50661073855?text=Cotizar: ${p.modelo}" class="btn btn-success btn-sm fw-bold px-3" target="_blank">PEDIR</a>
                                </div>`).join('')}
                        </div>
                    </div>
                </div>`;
            }
        });
    }

    window.onload = () => {
        document.getElementById('txtInventario').innerText = productos.length + " Items";
        render(productos, false);
    };
</script>
</body>
</html>
