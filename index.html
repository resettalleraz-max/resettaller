<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Taller - Catálogo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .sub-folder { display: none; }
        .sub-folder.active { display: block; }
        .rotate-icon { transform: rotate(180deg); }
    </style>
</head>
<body class="bg-slate-900 text-white font-sans min-h-screen pb-20">

    <header class="p-6 text-center">
        <h1 class="text-3xl font-black italic text-orange-500 tracking-tighter">RESET TALLER</h1>
        <p class="text-blue-400 text-xs font-bold tracking-widest uppercase">Expertos en Microelectrónica</p>
    </header>

    <div class="px-4 mb-6">
        <div class="relative">
            <i class="fa fa-search absolute left-4 top-3.5 text-slate-500"></i>
            <input type="text" id="buscador" placeholder="Buscar modelo (ej: iPhone 11)..." 
                class="w-full bg-slate-800 border-none rounded-2xl py-3 pl-12 pr-4 text-sm focus:ring-2 focus:ring-orange-500 outline-none">
        </div>
    </div>

    <main id="lista-repuestos" class="px-4 space-y-3"></main>

    <nav class="fixed bottom-0 left-0 right-0 bg-slate-800/95 backdrop-blur border-t border-slate-700 flex justify-around py-3 text-[10px] font-bold uppercase text-slate-400">
        <div class="text-center text-orange-500">
            <i class="fa fa-box text-lg mb-1"></i><br>
            <span id="contador-items">0 Items</span>
        </div>
        <a href="https://wa.me/50661073855" class="text-center hover:text-green-400 transition">
            <i class="fab fa-whatsapp text-lg mb-1"></i><br>
            Consulta General
        </a>
        <div class="text-center">
            <i class="fa fa-tools text-lg mb-1"></i><br>
            Reset Taller
        </div>
    </nav>

    <script src="datos.js"></script>
    <script>
        const contenedor = document.getElementById('lista-repuestos');
        const buscador = document.getElementById('buscador');
        let totalItems = 0;

        function renderizar(filtro = '') {
            contenedor.innerHTML = '';
            totalItems = 0;
            let currentFolder = null;
            let currentSubFolder = null;

            PANTALLAS.forEach((item, index) => {
                const [nombre, precio] = item;

                if (nombre === "TITULO") {
                    // Crear Carpeta Principal
                    const folderId = `folder-${index}`;
                    currentFolder = document.createElement('div');
                    currentFolder.innerHTML = `
                        <button onclick="toggle('${folderId}')" class="w-full bg-slate-800 p-4 rounded-2xl flex justify-between items-center mb-2">
                            <span class="font-black text-orange-400 uppercase tracking-tight text-sm">${precio}</span>
                            <i class="fa fa-chevron-down text-blue-500 transition-transform" id="icon-${folderId}"></i>
                        </button>
                        <div id="${folderId}" class="hidden space-y-2 mb-4 px-2"></div>
                    `;
                    contenedor.appendChild(currentFolder);
                    currentSubFolder = null;
                } else if (nombre === "SUBTITULO") {
                    // Crear Sub-carpeta
                    const subId = `sub-${index}`;
                    const subDiv = document.createElement('div');
                    subDiv.innerHTML = `
                        <button onclick="toggle('${subId}')" class="w-full bg-slate-700/50 p-3 rounded-xl flex justify-between items-center mb-1 border border-slate-700">
                            <span class="font-bold text-slate-300 text-xs uppercase">${precio}</span>
                            <i class="fa fa-plus text-xs text-slate-500" id="icon-${subId}"></i>
                        </button>
                        <div id="${subId}" class="hidden space-y-1 mb-2 ml-2 border-l-2 border-slate-700 pl-2"></div>
                    `;
                    currentFolder.querySelector('div').appendChild(subDiv);
                    currentSubFolder = subDiv.querySelector(`#${subId}`);
                } else {
                    if (nombre.toLowerCase().includes(filtro.toLowerCase())) {
                        totalItems++;
                        const card = document.createElement('div');
                        card.className = "bg-slate-800/40 p-3 rounded-xl flex justify-between items-center border border-slate-700/50";
                        card.innerHTML = `
                            <span class="text-sm font-medium">${nombre}</span>
                            <div class="flex items-center gap-3">
                                <span class="text-orange-500 font-black text-sm">${precio}</span>
                                <a href="https://wa.me/50661073855?text=Hola, consulto por: ${nombre}" class="bg-green-600 p-2 rounded-lg hover:bg-green-500">
                                    <i class="fab fa-whatsapp text-white"></i>
                                </a>
                            </div>
                        `;
                        if (currentSubFolder) {
                            currentSubFolder.appendChild(card);
                        } else if (currentFolder) {
                            currentFolder.querySelector('div').appendChild(card);
                        }
                    }
                }
            });
            document.getElementById('contador-items').innerText = `${totalItems} Items`;
        }

        function toggle(id) {
            const el = document.getElementById(id);
            const icon = document.getElementById(`icon-${id}`);
            el.classList.toggle('hidden');
            icon.classList.toggle('rotate-icon');
        }

        buscador.addEventListener('input', (e) => renderizar(e.target.value));
        renderizar();
    </script>
</body>
</html>
